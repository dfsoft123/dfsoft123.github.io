<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发动机增量游戏 | 优化版</title>
    <script src="OmegaNum.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: auto;
            min-height: 100vh;
        }
        h1 {
            text-align: center;
            color: #f7b731;
            margin-bottom: 20px;
        }
        .card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 20px;
            margin: 15px 0;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .stat-item {
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border-left: 3px solid #f7b731;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            word-break: break-word;
        }
        button {
            padding: 12px 20px;
            margin: 5px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        button:hover:not(.disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .disabled {
            opacity: 0.4;
            pointer-events: none;
            cursor: not-allowed;
        }
        .prestige-btn {
            background: linear-gradient(135deg, #f7b731, #f39c12);
            color: #1a1a2e;
        }
        .second-prestige-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }
        .third-prestige-btn {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
        }
        .fourth-prestige-btn {
            background: linear-gradient(135deg, #1abc9c, #16a085);
            color: white;
        }
        #status { 
            color: orange; 
            min-height: 20px; 
            text-align: center;
            margin: 10px 0;
        }
        .engine-list {
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>⚙️ 发动机增量</h1>
    <div id="status"></div>
    
    <div class="card">
        <h3 style="margin-top:0; color:#f7b731;">📊 状态</h3>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">💎 点数</div>
                <div class="stat-value" id="points">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">🔝 最高代数</div>
                <div class="stat-value" id="maxTier">1</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">⏱️ 时间</div>
                <div class="stat-value" id="time">0 秒</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">📈 倍率</div>
                <div class="stat-value" id="multiplier">1x</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; color:#f7b731;">🌟 声望等级</h3>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">🔄 一阶声望</div>
                <div class="stat-value" id="prestigeCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">🔥 二阶声望</div>
                <div class="stat-value" id="secondPrestigeCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">💜 三阶声望</div>
                <div class="stat-value" id="thirdPrestigeCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">💚 四阶声望</div>
                <div class="stat-value" id="fourthPrestigeCount">0</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; color:#f7b731;">🎮 操作</h3>
        <div class="prestige-section">
            <button id="prestigeBtn" class="prestige-btn disabled">🔄 一阶声望</button>
        </div>
        <div class="prestige-section">
            <button id="secondPrestigeBtn" class="second-prestige-btn disabled">🔥 二阶声望</button>
        </div>
        <div class="prestige-section">
            <button id="thirdPrestigeBtn" class="third-prestige-btn disabled">💜 三阶声望</button>
        </div>
        <div class="prestige-section">
            <button id="fourthPrestigeBtn" class="fourth-prestige-btn disabled">💚 四阶声望</button>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; color:#f7b731;">⚡ 发动机列表（仅显示前20代）</h3>
        <div class="engine-list" id="engineList">
            <div>暂无发动机</div>
        </div>
    </div>

    <script>
    (function() {
        if (typeof OmegaNum === 'undefined') {
            document.getElementById('status').innerText = '❌ OmegaNum 未加载';
            return;
        }

        function O(val) { return new OmegaNum(val); }

        let state = {
            prestigeCount: 0,
            secondPrestigeCount: 0,
            thirdPrestigeCount: 0,
            fourthPrestigeCount: 0,
            
            // 优化：使用紧凑数组存储发动机（索引0=最高代，索引n-1=1代）
            engines: [O(1)],
            startTier: O(1),        // 起始代数（声望后会变）
            ticks: O(0),            // 已进行的tick数
            points: O(0),
            gameTime: 0
        };
        
        let lastTickTime = Date.now();
        let pendingTicks = 0;
        let updateCounter = 0;

        function getTotalMultiplier() {
            let mult = O(1);
            mult = mult.add(state.secondPrestigeCount);
            mult = mult.mul(O(2).pow(state.thirdPrestigeCount));
            mult = mult.pow(O(1).add(O(0.5).mul(state.fourthPrestigeCount)));
            return mult;
        }

        function getMaxTier() {
            return state.startTier.add(state.ticks);
        }

        function save() {
            try {
                const data = {
                    p: state.prestigeCount,
                    sp: state.secondPrestigeCount,
                    tp: state.thirdPrestigeCount,
                    fp: state.fourthPrestigeCount,
                    eng: state.engines.map(e => e.toString()),
                    st: state.startTier.toString(),
                    tk: state.ticks.toString(),
                    pts: state.points.toString(),
                    gt: state.gameTime
                };
                localStorage.setItem('engine_opt', JSON.stringify(data));
            } catch(e) {}
        }

        function load() {
            try {
                const raw = localStorage.getItem('engine_opt');
                if (!raw) return false;
                const data = JSON.parse(raw);
                state.prestigeCount = data.p || 0;
                state.secondPrestigeCount = data.sp || 0;
                state.thirdPrestigeCount = data.tp || 0;
                state.fourthPrestigeCount = data.fp || 0;
                state.engines = data.eng.map(e => O(e));
                state.startTier = O(data.st);
                state.ticks = O(data.tk);
                state.points = O(data.pts);
                state.gameTime = data.gt || 0;
                lastTickTime = Date.now();
                return true;
            } catch(e) {
                return false;
            }
        }

        // 优化后的tick：使用数组循环，避免Object遍历
        function doTick() {
            const mult = getTotalMultiplier();
            const oldEngines = state.engines;
            
            // 新数组长度+1（新解锁一代）
            const newLen = oldEngines.length + 1;
            const newEngines = new Array(newLen);
            
            // 新最高代（索引0）初始为1
            newEngines[0] = O(1);
            
            // 批量计算生产（只遍历一次数组）
            for (let i = 1; i < newLen; i++) {
                // 由高一代（i-1）生产本代
                const producers = (i-1 < oldEngines.length) ? oldEngines[i-1] : O(0);
                const produced = producers.mul(mult);
                
                // 加上本代原有的（如果有）
                const existing = (i < oldEngines.length) ? oldEngines[i] : O(0);
                newEngines[i] = existing.add(produced);
            }
            
            state.engines = newEngines;
            state.ticks = state.ticks.add(1);
            
            // 1代发动机生产点数（数组最后一个元素）
            const oneTierEngines = newEngines[newEngines.length - 1];
            if (oneTierEngines && oneTierEngines.gt(0)) {
                state.points = state.points.add(oneTierEngines.mul(mult));
            }
            
            state.gameTime += 0.1;
        }

        // 优化：批量处理tick，减少函数调用开销
        function doTicks(count) {
            for (let i = 0; i < count; i++) {
                doTick();
            }
        }

        function processPending() {
            if (pendingTicks <= 0) {
                document.getElementById('status').innerText = '';
                return;
            }
            
            document.getElementById('status').innerText = '⏳ 追赶离线进度...';
            
            // 动态调整每批处理量，平衡性能和响应
            const batchSize = pendingTicks > 1000 ? 200 : 100;
            const steps = Math.min(pendingTicks, batchSize);
            
            doTicks(steps);
            pendingTicks -= steps;
            
            if (pendingTicks > 0) {
                // 使用requestAnimationFrame或setTimeout避免阻塞
                setTimeout(() => processPending(), 0);
            } else {
                document.getElementById('status').innerText = '';
                lastTickTime = Date.now();
            }
        }

        function catchUp() {
            const now = Date.now();
            const elapsed = now - lastTickTime;
            if (elapsed < 100) return;
            
            const ticks = Math.floor(elapsed / 100);
            if (ticks <= 0) return;
            
            // 限制最大追赶量，避免长时间离线导致大量计算
            const maxCatchUp = 50000;
            const addTicks = Math.min(ticks, maxCatchUp);
            
            lastTickTime += addTicks * 100;
            pendingTicks += addTicks;
            
            if (pendingTicks === addTicks) {
                processPending();
            }
        }

        function canPrestige() {
            const req = O(1000).mul(O(1 + state.prestigeCount * state.prestigeCount));
            return req.lte(getMaxTier());
        }

        function canSecondPrestige() {
            const req = O(100000).mul(O(1 + state.secondPrestigeCount * state.secondPrestigeCount));
            return req.lte(getMaxTier());
        }

        function canThirdPrestige() {
            const req = O(1e7).mul(O(10).pow(state.thirdPrestigeCount));
            return req.lte(getMaxTier());
        }

        function canFourthPrestige() {
            const req = O(1e10).mul(O(100).pow(state.fourthPrestigeCount));
            return req.lte(getMaxTier());
        }

        function resetEngineState(newStartTier) {
            state.engines = [O(1)];
            state.startTier = newStartTier;
            state.ticks = O(0);
            state.points = O(0);
            state.gameTime = Math.floor(state.gameTime);
            lastTickTime = Date.now();
            pendingTicks = 0;
        }

        function doPrestige() {
            if (!canPrestige()) return;
            state.prestigeCount++;
            resetEngineState(O(state.prestigeCount + 1));
            save();
        }

        function doSecondPrestige() {
            if (!canSecondPrestige()) return;
            state.secondPrestigeCount++;
            state.prestigeCount = 0;
            resetEngineState(O(1));
            save();
        }

        function doThirdPrestige() {
            if (!canThirdPrestige()) return;
            state.thirdPrestigeCount++;
            state.secondPrestigeCount = 0;
            state.prestigeCount = 0;
            resetEngineState(O(1));
            save();
        }

        function doFourthPrestige() {
            if (!canFourthPrestige()) return;
            state.fourthPrestigeCount++;
            state.thirdPrestigeCount = 0;
            state.secondPrestigeCount = 0;
            state.prestigeCount = 0;
            resetEngineState(O(1));
            save();
        }

        // 优化UI更新：降低更新频率
        function updateUI() {
            const mt = getMaxTier();
            const mult = getTotalMultiplier();
            
            document.getElementById('points').innerText = state.points.toString();
            document.getElementById('maxTier').innerText = mt.toString();
            document.getElementById('time').innerText = state.gameTime.toFixed(1) + ' 秒';
            document.getElementById('multiplier').innerText = mult.toString() + 'x';
            
            document.getElementById('prestigeCount').innerText = state.prestigeCount;
            document.getElementById('secondPrestigeCount').innerText = state.secondPrestigeCount;
            document.getElementById('thirdPrestigeCount').innerText = state.thirdPrestigeCount;
            document.getElementById('fourthPrestigeCount').innerText = state.fourthPrestigeCount;

            // 按钮更新
            updatePrestigeButton('prestigeBtn', canPrestige, '🔄 一阶声望', 1000, state.prestigeCount, true);
            updatePrestigeButton('secondPrestigeBtn', canSecondPrestige, '🔥 二阶声望', 100000, state.secondPrestigeCount, true);
            updatePrestigeButton('thirdPrestigeBtn', canThirdPrestige, '💜 三阶声望', 1e7, state.thirdPrestigeCount, false);
            updatePrestigeButton('fourthPrestigeBtn', canFourthPrestige, '💚 四阶声望', 1e10, state.fourthPrestigeCount, false);

            // 发动机列表（只显示前20代，减少DOM操作）
            const listDiv = document.getElementById('engineList');
            const maxShow = 20;
            let html = '';
            
            const totalGens = state.engines.length;
            const showCount = Math.min(totalGens, maxShow);
            
            // 计算起始代数
            const mtNum = Number(mt.toString());
            
            for (let i = 0; i < showCount; i++) {
                const tier = mtNum - i;
                const count = state.engines[i];
                if (count && count.gt(0)) {
                    html += '<div style="padding:3px 0;">代数 ' + tier + ' : ' + 
                            count.toString() + '</div>';
                }
            }
            
            if (totalGens > maxShow) {
                html += '<div>... 还有 ' + (totalGens - maxShow) + ' 代</div>';
            }
            
            listDiv.innerHTML = html;
        }

        function updatePrestigeButton(btnId, canFunc, name, base, count, isSquare) {
            const btn = document.getElementById(btnId);
            let req;
            if (isSquare) {
                req = O(base).mul(O(1 + count * count));
            } else {
                req = O(base).mul(O(base === 1e7 ? 10 : 100).pow(count));
            }
            
            btn.innerText = name + ' (需代数 ' + req.toString() + ')';
            
            if (canFunc()) {
                btn.classList.remove('disabled');
            } else {
                btn.classList.add('disabled');
            }
        }

        function mainLoop() {
            catchUp();
            
            // 降低UI更新频率：每2次循环更新一次
            updateCounter++;
            if (updateCounter >= 2) {
                updateUI();
                updateCounter = 0;
            }
            
            // 自动保存
            if (Date.now() - (state._lastSave || 0) > 5000) {
                save();
                state._lastSave = Date.now();
            }
        }

        // 初始化
        if (!load()) {
            resetEngineState(O(1));
            save();
        }
        state._lastSave = Date.now();
        
        document.getElementById('prestigeBtn').addEventListener('click', doPrestige);
        document.getElementById('secondPrestigeBtn').addEventListener('click', doSecondPrestige);
        document.getElementById('thirdPrestigeBtn').addEventListener('click', doThirdPrestige);
        document.getElementById('fourthPrestigeBtn').addEventListener('click', doFourthPrestige);
        window.addEventListener('beforeunload', save);
        
        setInterval(mainLoop, 100);
        updateUI();
    })();
    </script>
</body>
</html>
