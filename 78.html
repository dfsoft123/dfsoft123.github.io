<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发动机增量游戏 | 彻底修复版</title>
    <script src="OmegaNum.js"></script>
    <style>
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: sans-serif;
            padding: 20px;
            max-width: 700px;
            margin: auto;
        }
        .card {
            background: #16213e;
            padding: 20px;
            margin: 10px 0;
            border-radius: 10px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        .disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        #status { color: orange; min-height: 20px; }
    </style>
</head>
<body>
    <h1>⚙️ 发动机增量</h1>
    <div id="status"></div>
    <div class="card">
        <div>💎 点数: <span id="points">0</span></div>
        <div>🔝 最高代数: <span id="maxTier">1</span></div>
        <div>⏱️ 时间: <span id="time">0 秒</span></div>
        <div>🔄 声望次数: <span id="prestigeCount">0</span></div>
        <div>🌟 二阶声望次数: <span id="secondPrestigeCount">0</span></div>
    </div>
    <button id="prestigeBtn" class="disabled">🔁 声望 (需代数 1000)</button>
    <button id="secondPrestigeBtn" class="disabled">✨ 二阶声望 (需代数 10万)</button>
    <div class="card" id="engineList"></div>

    <script>
    (function() {
        if (typeof OmegaNum === 'undefined') {
            document.getElementById('status').innerText = '❌ OmegaNum 未加载，请检查本地文件路径。';
            return;
        }

        function O(val) { return new OmegaNum(val); }

        let state = {
            secondPrestige: 0,
            prestige: 0,
            // 直接用映射表存储：键=代数，值=发动机数量
            engines: {1: O(1)},
            maxTier: O(1),      // 当前最高代数
            points: O(0),       // 累计点数
            gameTime: 0         // 游戏总时间（秒）
        };
        let lastTickTime = Date.now();
        let pendingTicks = 0;

        function save() {
            const data = {
                sp: state.secondPrestige,
                p: state.prestige,
                eng: {},
                mt: state.maxTier.toString(),
                pts: state.points.toString(),
                gt: state.gameTime
            };
            // 序列化发动机映射表
            for (let tier in state.engines) {
                data.eng[tier] = state.engines[tier].toString();
            }
            localStorage.setItem('engine_v3', JSON.stringify(data));
        }

        function load() {
            const raw = localStorage.getItem('engine_v3');
            if (!raw) return false;
            try {
                const data = JSON.parse(raw);
                state.secondPrestige = data.sp;
                state.prestige = data.p;
                state.engines = {};
                for (let tier in data.eng) {
                    state.engines[tier] = O(data.eng[tier]);
                }
                state.maxTier = O(data.mt);
                state.points = O(data.pts);
                state.gameTime = data.gt;
                lastTickTime = Date.now();
                return true;
            } catch (e) {
                return false;
            }
        }

        function doTick() {
            const mult = O(state.secondPrestige + 1);
            
            // 解锁新代数
            state.maxTier = state.maxTier.add(1);
            const newTier = state.maxTier.toString();
            
            // 新代数的发动机初始为1个（由系统赠送）
            state.engines[newTier] = (state.engines[newTier] || O(0)).add(1);
            
            // 从高到低生产：高一代发动机生产低一代发动机
            const tiers = Object.keys(state.engines).sort((a, b) => Number(b) - Number(a));
            
            // 记录本轮生产量（避免重复计算）
            const produced = {};
            
            for (let i = 0; i < tiers.length; i++) {
                const tier = tiers[i];
                const tierNum = Number(tier);
                const count = state.engines[tier] || O(0);
                
                if (count.gt(0) && tierNum > 1) {
                    // 生产下一代（tier-1）发动机
                    const lowerTier = String(tierNum - 1);
                    produced[lowerTier] = (produced[lowerTier] || O(0)).add(count.mul(mult));
                }
            }
            
            // 应用生产
            for (let tier in produced) {
                state.engines[tier] = (state.engines[tier] || O(0)).add(produced[tier]);
            }
            
            // 点数生产：1代发动机生产点数
            const oneTierEngines = state.engines['1'] || O(0);
            if (oneTierEngines.gt(0)) {
                state.points = state.points.add(oneTierEngines.mul(mult));
            }
            
            state.gameTime += 0.1;
        }

        function processPending() {
            if (pendingTicks <= 0) {
                document.getElementById('status').innerText = '';
                return;
            }
            document.getElementById('status').innerText = '⏳ 追赶离线进度...';
            const steps = Math.min(pendingTicks, 500);
            for (let i = 0; i < steps; i++) doTick();
            pendingTicks -= steps;
            if (pendingTicks > 0) {
                setTimeout(processPending, 10);
            } else {
                document.getElementById('status').innerText = '';
                lastTickTime = Date.now();
            }
        }

        function catchUp() {
            const now = Date.now();
            const elapsed = now - lastTickTime;
            if (elapsed < 100) return;
            const ticks = Math.floor(elapsed / 100);
            if (ticks <= 0) return;
            const addTicks = Math.min(ticks, 30000);
            lastTickTime += addTicks * 100;
            pendingTicks += addTicks;
            if (pendingTicks === addTicks) processPending();
        }

        function canPrestige() {
            const req = O(1000).mul(O(1 + state.prestige * state.prestige));
            return req.lte(state.maxTier);
        }

        function canSecondPrestige() {
            const req = O(100000).mul(O(1 + state.secondPrestige * state.secondPrestige));
            return req.lte(state.maxTier);
        }

        function doPrestige() {
            if (!canPrestige()) return;
            state.prestige++;
            state.engines = {};
            state.maxTier = O(state.prestige + 1);
            state.engines[state.maxTier.toString()] = O(1);
            state.points = O(0);
            state.gameTime = Math.floor(state.gameTime);
            lastTickTime = Date.now();
            pendingTicks = 0;
            save();
        }

        function doSecondPrestige() {
            if (!canSecondPrestige()) return;
            state.secondPrestige++;
            state.prestige = 0;
            state.engines = {1: O(1)};
            state.maxTier = O(1);
            state.points = O(0);
            state.gameTime = Math.floor(state.gameTime);
            lastTickTime = Date.now();
            pendingTicks = 0;
            save();
        }

        function updateUI() {
            document.getElementById('points').innerText = state.points.toString();
            document.getElementById('maxTier').innerText = state.maxTier.toString();
            document.getElementById('time').innerText = state.gameTime.toFixed(1) + ' 秒';
            document.getElementById('prestigeCount').innerText = state.prestige;
            document.getElementById('secondPrestigeCount').innerText = state.secondPrestige;

            const pBtn = document.getElementById('prestigeBtn');
            const spBtn = document.getElementById('secondPrestigeBtn');
            const reqP = O(1000).mul(O(1 + state.prestige * state.prestige));
            const reqSP = O(100000).mul(O(1 + state.secondPrestige * state.secondPrestige));
            pBtn.innerText = '🔁 声望 (需代数 ' + reqP.toString() + ')';
            spBtn.innerText = '✨ 二阶声望 (需代数 ' + reqSP.toString() + ')';

            if (canPrestige()) pBtn.classList.remove('disabled');
            else pBtn.classList.add('disabled');
            if (canSecondPrestige()) spBtn.classList.remove('disabled');
            else spBtn.classList.add('disabled');

            // 发动机列表显示
            const listDiv = document.getElementById('engineList');
            const tiers = Object.keys(state.engines)
                .filter(tier => state.engines[tier].gt(0))
                .sort((a, b) => Number(a) - Number(b));
            
            let html = '';
            if (tiers.length === 0) {
                html = '<div>暂无发动机</div>';
            } else {
                const maxShow = 15;
                for (let i = 0; i < Math.min(tiers.length, maxShow); i++) {
                    const tier = tiers[i];
                    html += '<div>代数 ' + tier + ' : ' + state.engines[tier].toString() + '</div>';
                }
                if (tiers.length > maxShow) {
                    html += '<div>... 还有 ' + (tiers.length - maxShow) + ' 代</div>';
                }
            }
            listDiv.innerHTML = html;
        }

        function mainLoop() {
            catchUp();
            updateUI();
            if (Date.now() - (state._lastSave || 0) > 2000) {
                save();
                state._lastSave = Date.now();
            }
        }

        // 初始化
        if (!load()) {
            state.engines = {1: O(1)};
            state.maxTier = O(1);
            state.points = O(0);
            state.gameTime = 0;
            lastTickTime = Date.now();
            save();
        }
        state._lastSave = Date.now();
        document.getElementById('prestigeBtn').addEventListener('click', doPrestige);
        document.getElementById('secondPrestigeBtn').addEventListener('click', doSecondPrestige);
        window.addEventListener('beforeunload', save);
        setInterval(mainLoop, 100);
        updateUI();
    })();
    </script>
</body>
</html>
