<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发动机增量游戏</title>
    <!-- 双 CDN 容错加载 OmegaNum -->
    <script>
        // 第一个源
        var omegaScript = document.createElement('script');
        omegaScript.src = 'https://cdn.jsdelivr.net/npm/omega_num@1.3.0/omega_num.min.js';
        omegaScript.onerror = function() {
            // 如果第一个源失败，尝试备用源
            var fallback = document.createElement('script');
            fallback.src = 'https://unpkg.com/omega_num@1.3.0/omega_num.min.js';
            fallback.onerror = function() {
                document.getElementById('status').innerText = '❌ 库加载失败，请检查网络后刷新页面。';
            };
            document.head.appendChild(fallback);
        };
        document.head.appendChild(omegaScript);
    </script>
    <style>
        body { background: #1a1a2e; color: #eee; font-family: sans-serif; padding: 20px; }
        .card { background: #16213e; padding: 20px; margin: 10px 0; border-radius: 10px; }
        button { padding: 10px 20px; margin: 5px; font-weight: bold; }
        .disabled { opacity: 0.4; pointer-events: none; }
        #status { color: orange; min-height: 20px; }
    </style>
</head>
<body>
    <h1>⚙️ 发动机增量</h1>
    <div id="status">正在加载核心库...</div>
    <div class="card">
        <div>💎 点数: <span id="points">0</span></div>
        <div>🔝 最高代数: <span id="maxTier">1</span></div>
        <div>⏱️ 时间: <span id="time">0 秒</span></div>
        <div>🔄 声望次数: <span id="prestigeCount">0</span></div>
        <div>🌟 二阶声望次数: <span id="secondPrestigeCount">0</span></div>
    </div>
    <button id="prestigeBtn" class="disabled">🔁 声望 (需代数 1000)</button>
    <button id="secondPrestigeBtn" class="disabled">✨ 二阶声望 (需代数 10万)</button>
    <div class="card" id="engineList"></div>

    <script>
    // 等待 OmegaNum 加载完成后再启动游戏
    var checkInterval = setInterval(function() {
        if (typeof OmegaNum !== 'undefined') {
            clearInterval(checkInterval);
            document.getElementById('status').innerText = '';
            startGame();
        }
    }, 100);

    function startGame() {
        // 辅助函数
        function O(val) { return new OmegaNum(val); }

        // 游戏状态
        var state = {
            secondPrestige: 0,
            prestige: 0,
            startTier: O(1),
            ticks: O(0),
            engines: [O(1)],
            points: O(0),
            gameTime: 0
        };
        var lastTickTime = Date.now();
        var pendingTicks = 0;

        function save() {
            var data = {
                sp: state.secondPrestige,
                p: state.prestige,
                st: state.startTier.toString(),
                tk: state.ticks.toString(),
                eng: state.engines.map(function(e) { return e.toString(); }),
                pts: state.points.toString(),
                gt: state.gameTime
            };
            localStorage.setItem('engine_final2', JSON.stringify(data));
        }

        function load() {
            var raw = localStorage.getItem('engine_final2');
            if (!raw) return false;
            try {
                var data = JSON.parse(raw);
                state.secondPrestige = data.sp;
                state.prestige = data.p;
                state.startTier = O(data.st);
                state.ticks = O(data.tk);
                state.engines = data.eng.map(function(e) { return O(e); });
                state.points = O(data.pts);
                state.gameTime = data.gt;
                lastTickTime = Date.now();
                return true;
            } catch (e) {
                return false;
            }
        }

        function doTick() {
            var mult = O(state.secondPrestige + 1);
            var old = state.engines;
            var newLen = old.length + 1;
            var arr = new Array(newLen);
            arr[0] = O(1);
            for (var d = 1; d < newLen; d++) {
                var producers = old[d-1] || O(0);
                var produced = producers.mul(mult);
                var existing = (d < old.length) ? (old[d] || O(0)) : O(0);
                arr[d] = existing.add(produced);
            }
            state.engines = arr;
            state.ticks = state.ticks.add(1);
            var oneTier = arr[newLen-1] || O(0);
            state.points = state.points.add(oneTier.mul(mult));
            state.gameTime += 0.1;
        }

        function processPending() {
            if (pendingTicks <= 0) {
                document.getElementById('status').innerText = '';
                return;
            }
            document.getElementById('status').innerText = '⏳ 追赶离线进度...';
            var steps = Math.min(pendingTicks, 500);
            for (var i = 0; i < steps; i++) doTick();
            pendingTicks -= steps;
            if (pendingTicks > 0) {
                setTimeout(processPending, 10);
            } else {
                document.getElementById('status').innerText = '';
                lastTickTime = Date.now();
            }
        }

        function catchUp() {
            var now = Date.now();
            var elapsed = now - lastTickTime;
            if (elapsed < 100) return;
            var ticks = Math.floor(elapsed / 100);
            if (ticks <= 0) return;
            var addTicks = Math.min(ticks, 30000);
            lastTickTime += addTicks * 100;
            pendingTicks += addTicks;
            if (pendingTicks === addTicks) processPending();
        }

        function maxTier() { return state.startTier.add(state.ticks); }

        function canPrestige() {
            var req = O(1000).mul(O(1 + state.prestige * state.prestige));
            return req.lte(maxTier());
        }
        function canSecondPrestige() {
            var req = O(100000).mul(O(1 + state.secondPrestige * state.secondPrestige));
            return req.lte(maxTier());
        }

        function doPrestige() {
            if (!canPrestige()) return;
            state.prestige++;
            state.startTier = O(state.prestige + 1);
            state.ticks = O(0);
            state.engines = [O(1)];
            state.points = O(0);
            state.gameTime = Math.floor(state.gameTime);
            lastTickTime = Date.now();
            pendingTicks = 0;
            save();
        }

        function doSecondPrestige() {
            if (!canSecondPrestige()) return;
            state.secondPrestige++;
            state.prestige = 0;
            state.startTier = O(1);
            state.ticks = O(0);
            state.engines = [O(1)];
            state.points = O(0);
            state.gameTime = Math.floor(state.gameTime);
            lastTickTime = Date.now();
            pendingTicks = 0;
            save();
        }

        function updateUI() {
            var mt = maxTier();
            document.getElementById('points').innerText = state.points.toString();
            document.getElementById('maxTier').innerText = mt.toString();
            document.getElementById('time').innerText = state.gameTime.toFixed(1) + ' 秒';
            document.getElementById('prestigeCount').innerText = state.prestige;
            document.getElementById('secondPrestigeCount').innerText = state.secondPrestige;

            var pBtn = document.getElementById('prestigeBtn');
            var spBtn = document.getElementById('secondPrestigeBtn');
            var reqP = O(1000).mul(O(1 + state.prestige * state.prestige));
            var reqSP = O(100000).mul(O(1 + state.secondPrestige * state.secondPrestige));
            pBtn.innerText = '🔁 声望 (需代数 ' + reqP.toString() + ')';
            spBtn.innerText = '✨ 二阶声望 (需代数 ' + reqSP.toString() + ')';

            if (canPrestige()) pBtn.classList.remove('disabled');
            else pBtn.classList.add('disabled');
            if (canSecondPrestige()) spBtn.classList.remove('disabled');
            else spBtn.classList.add('disabled');

            var listDiv = document.getElementById('engineList');
            var entries = [];
            var mtNum = Number(mt.toString());
            if (isFinite(mtNum) && mtNum >= 1) {
                for (var d = 0; d < state.engines.length; d++) {
                    var count = state.engines[d];
                    if (count.gt(0)) {
                        var tier = Math.floor(mtNum) - d;
                        if (tier >= 1) entries.push({ tier: tier, count: count });
                    }
                }
            }
            entries.sort(function(a,b) { return a.tier - b.tier; });
            var html = '';
            if (entries.length === 0) {
                html = '<div>暂无发动机</div>';
            } else {
                var maxShow = 15;
                for (var i = 0; i < Math.min(entries.length, maxShow); i++) {
                    var e = entries[i];
                    html += '<div>代数 ' + e.tier + ' : ' + e.count.toString() + '</div>';
                }
                if (entries.length > maxShow) html += '<div>... 还有 ' + (entries.length - maxShow) + ' 代</div>';
            }
            listDiv.innerHTML = html;
        }

        function mainLoop() {
            catchUp();
            updateUI();
            if (Date.now() - (state._lastSave || 0) > 2000) {
                save();
                state._lastSave = Date.now();
            }
        }

        // 启动
        if (!load()) {
            state.startTier = O(1);
            state.ticks = O(0);
            state.engines = [O(1)];
            state.points = O(0);
            state.gameTime = 0;
            lastTickTime = Date.now();
            save();
        }
        state._lastSave = Date.now();
        document.getElementById('prestigeBtn').addEventListener('click', doPrestige);
        document.getElementById('secondPrestigeBtn').addEventListener('click', doSecondPrestige);
        window.addEventListener('beforeunload', save);
        setInterval(mainLoop, 100);
        updateUI();
    }
    </script>
</body>
</html>
