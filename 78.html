<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发动机增量游戏 | 自动声望开关版</title>
    <script src="OmegaNum.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            max-width: 900px;
            margin: auto;
            min-height: 100vh;
        }
        h1 {
            text-align: center;
            color: #f7b731;
            margin-bottom: 20px;
        }
        .card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 20px;
            margin: 15px 0;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .stat-item {
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border-left: 3px solid #f7b731;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            word-break: break-word;
        }
        button {
            padding: 8px 15px;
            margin: 3px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        button:hover:not(.disabled):not(.auto-btn) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .prestige-btn { background: linear-gradient(135deg, #f7b731, #f39c12); color: #1a1a2e; }
        .second-btn { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
        .third-btn { background: linear-gradient(135deg, #9b59b6, #8e44ad); color: white; }
        .fourth-btn { background: linear-gradient(135deg, #1abc9c, #16a085); color: white; }
        
        .auto-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
            flex-wrap: wrap;
        }
        .auto-btn {
            min-width: 70px;
            font-size: 0.85rem;
        }
        .auto-on {
            background: #27ae60;
            color: white;
        }
        .auto-off {
            background: #7f8c8d;
            color: white;
        }
        input[type="number"] {
            width: 80px;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #555;
            background: #2c3e50;
            color: white;
            font-size: 0.9rem;
            text-align: center;
        }
        .auto-label {
            font-size: 0.9rem;
            color: #bbb;
        }
        #status { 
            color: orange; 
            min-height: 20px; 
            text-align: center;
            margin: 10px 0;
        }
        .prestige-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            margin: 8px 0;
            flex-wrap: wrap;
            gap: 10px;
        }
        .engine-list {
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>⚙️ 发动机增量</h1>
    <div id="status"></div>
    
    <div class="card">
        <h3 style="margin-top:0; color:#f7b731;">📊 状态</h3>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">💎 点数</div>
                <div class="stat-value" id="points">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">🔝 最高代数</div>
                <div class="stat-value" id="maxTier">1</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">⏱️ 时间</div>
                <div class="stat-value" id="time">0 秒</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">📈 倍率</div>
                <div class="stat-value" id="multiplier">1x</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; color:#f7b731;">🎮 声望控制</h3>
        
        <!-- 一阶声望 -->
        <div class="prestige-row">
            <button id="prestigeBtn" class="prestige-btn disabled">🔄 一阶声望</button>
            <div class="auto-control">
                <button id="autoPrestigeBtn" class="auto-btn auto-off" onclick="toggleAuto('prestige')">关闭</button>
                <span class="auto-label">直至</span>
                <input type="number" id="autoPrestigeTarget" value="10" min="0" max="10000">
                <span class="auto-label">级 (当前: <span id="prestigeCount">0</span>)</span>
            </div>
        </div>

        <!-- 二阶声望 -->
        <div class="prestige-row">
            <button id="secondPrestigeBtn" class="second-btn disabled">🔥 二阶声望</button>
            <div class="auto-control">
                <button id="autoSecondPrestigeBtn" class="auto-btn auto-off" onclick="toggleAuto('second')">关闭</button>
                <span class="auto-label">直至</span>
                <input type="number" id="autoSecondPrestigeTarget" value="5" min="0" max="10000">
                <span class="auto-label">级 (当前: <span id="secondPrestigeCount">0</span>)</span>
            </div>
        </div>

        <!-- 三阶声望 -->
        <div class="prestige-row">
            <button id="thirdPrestigeBtn" class="third-btn disabled">💜 三阶声望</button>
            <div class="auto-control">
                <button id="autoThirdPrestigeBtn" class="auto-btn auto-off" onclick="toggleAuto('third')">关闭</button>
                <span class="auto-label">直至</span>
                <input type="number" id="autoThirdPrestigeTarget" value="3" min="0" max="10000">
                <span class="auto-label">级 (当前: <span id="thirdPrestigeCount">0</span>)</span>
            </div>
        </div>

        <!-- 四阶声望 -->
        <div class="prestige-row">
            <button id="fourthPrestigeBtn" class="fourth-btn disabled">💚 四阶声望</button>
            <div class="auto-control">
                <button id="autoFourthPrestigeBtn" class="auto-btn auto-off" onclick="toggleAuto('fourth')">关闭</button>
                <span class="auto-label">直至</span>
                <input type="number" id="autoFourthPrestigeTarget" value="1" min="0" max="10000">
                <span class="auto-label">级 (当前: <span id="fourthPrestigeCount">0</span>)</span>
            </div>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; color:#f7b731;">⚡ 发动机列表</h3>
        <div class="engine-list" id="engineList">
            <div>暂无发动机</div>
        </div>
    </div>

    <script>
    (function() {
        if (typeof OmegaNum === 'undefined') {
            document.getElementById('status').innerText = '❌ OmegaNum 未加载';
            return;
        }

        function O(val) { return new OmegaNum(val); }

        let state = {
            prestigeCount: 0,
            secondPrestigeCount: 0,
            thirdPrestigeCount: 0,
            fourthPrestigeCount: 0,
            engines: {1: O(1)},
            maxTier: O(1),
            points: O(0),
            gameTime: 0
        };

        // 自动声望设置
        let autoSettings = {
            prestige: { enabled: false, target: 10 },
            second: { enabled: false, target: 5 },
            third: { enabled: false, target: 3 },
            fourth: { enabled: false, target: 1 }
        };

        let lastTickTime = Date.now();
        let pendingTicks = 0;

        // 切换自动声望开关
        window.toggleAuto = function(type) {
            autoSettings[type].enabled = !autoSettings[type].enabled;
            updateAutoButtons();
            save();
        };

        function updateAutoButtons() {
            const types = ['prestige', 'second', 'third', 'fourth'];
            const names = ['autoPrestigeBtn', 'autoSecondPrestigeBtn', 'autoThirdPrestigeBtn', 'autoFourthPrestigeBtn'];
            
            types.forEach((type, index) => {
                const btn = document.getElementById(names[index]);
                if (autoSettings[type].enabled) {
                    btn.textContent = '开启';
                    btn.className = 'auto-btn auto-on';
                } else {
                    btn.textContent = '关闭';
                    btn.className = 'auto-btn auto-off';
                }
                // 读取目标值
                const targetInput = document.getElementById(names[index].replace('Btn', 'Target'));
                if (targetInput) {
                    autoSettings[type].target = parseInt(targetInput.value) || 0;
                }
            });
        }

        function getTotalMultiplier() {
            let mult = O(1);
            mult = mult.add(state.secondPrestigeCount);
            mult = mult.mul(O(2).pow(state.thirdPrestigeCount));
            mult = mult.pow(O(1).add(O(0.5).mul(state.fourthPrestigeCount)));
            return mult;
        }

        function save() {
            updateAutoButtons();
            const data = {
                p: state.prestigeCount,
                sp: state.secondPrestigeCount,
                tp: state.thirdPrestigeCount,
                fp: state.fourthPrestigeCount,
                eng: {},
                mt: state.maxTier.toString(),
                pts: state.points.toString(),
                gt: state.gameTime,
                auto: autoSettings
            };
            for (let tier in state.engines) {
                data.eng[tier] = state.engines[tier].toString();
            }
            localStorage.setItem('engine_auto_v5', JSON.stringify(data));
        }

        function load() {
            const raw = localStorage.getItem('engine_auto_v5');
            if (!raw) return false;
            try {
                const data = JSON.parse(raw);
                state.prestigeCount = data.p || 0;
                state.secondPrestigeCount = data.sp || 0;
                state.thirdPrestigeCount = data.tp || 0;
                state.fourthPrestigeCount = data.fp || 0;
                state.engines = {};
                for (let tier in data.eng) {
                    state.engines[tier] = O(data.eng[tier]);
                }
                state.maxTier = O(data.mt);
                state.points = O(data.pts);
                state.gameTime = data.gt || 0;
                if (data.auto) {
                    autoSettings = data.auto;
                }
                lastTickTime = Date.now();
                return true;
            } catch (e) {
                return false;
            }
        }

        function doTick() {
            const mult = getTotalMultiplier();
            
            state.maxTier = state.maxTier.add(1);
            const newTier = state.maxTier.toString();
            state.engines[newTier] = (state.engines[newTier] || O(0)).add(1);
            
            const tiers = Object.keys(state.engines).sort((a, b) => Number(b) - Number(a));
            const produced = {};
            
            for (let i = 0; i < tiers.length; i++) {
                const tier = tiers[i];
                const tierNum = Number(tier);
                const count = state.engines[tier] || O(0);
                
                if (count.gt(0) && tierNum > 1) {
                    const lowerTier = String(tierNum - 1);
                    produced[lowerTier] = (produced[lowerTier] || O(0)).add(count.mul(mult));
                }
            }
            
            for (let tier in produced) {
                state.engines[tier] = (state.engines[tier] || O(0)).add(produced[tier]);
            }
            
            const oneTierEngines = state.engines['1'] || O(0);
            if (oneTierEngines.gt(0)) {
                state.points = state.points.add(oneTierEngines.mul(mult));
            }
            
            state.gameTime += 0.1;
        }

        function processPending() {
            if (pendingTicks <= 0) {
                document.getElementById('status').innerText = '';
                return;
            }
            document.getElementById('status').innerText = '⏳ 追赶离线进度...';
            const steps = Math.min(pendingTicks, 500);
            for (let i = 0; i < steps; i++) {
                doTick();
                // 在离线追赶中也检查自动声望
                checkAutoPrestige();
            }
            pendingTicks -= steps;
            if (pendingTicks > 0) {
                setTimeout(processPending, 10);
            } else {
                document.getElementById('status').innerText = '';
                lastTickTime = Date.now();
            }
        }

        function catchUp() {
            const now = Date.now();
            const elapsed = now - lastTickTime;
            if (elapsed < 100) return;
            const ticks = Math.floor(elapsed / 100);
            if (ticks <= 0) return;
            const addTicks = Math.min(ticks, 30000);
            lastTickTime += addTicks * 100;
            pendingTicks += addTicks;
            if (pendingTicks === addTicks) processPending();
        }

        function canPrestige() {
            const req = O(1000).mul(O(1 + state.prestigeCount * state.prestigeCount));
            return req.lte(state.maxTier);
        }

        function canSecondPrestige() {
            const req = O(100000).mul(O(1 + state.secondPrestigeCount * state.secondPrestigeCount));
            return req.lte(state.maxTier);
        }

        function canThirdPrestige() {
            const req = O(1e7).mul(O(10).pow(state.thirdPrestigeCount));
            return req.lte(state.maxTier);
        }

        function canFourthPrestige() {
            const req = O(1e10).mul(O(100).pow(state.fourthPrestigeCount));
            return req.lte(state.maxTier);
        }

        function doPrestige() {
            if (!canPrestige()) return false;
            state.prestigeCount++;
            resetEngineState(O(state.prestigeCount + 1));
            save();
            return true;
        }

        function doSecondPrestige() {
            if (!canSecondPrestige()) return false;
            state.secondPrestigeCount++;
            state.prestigeCount = 0;
            resetEngineState(O(1));
            save();
            return true;
        }

        function doThirdPrestige() {
            if (!canThirdPrestige()) return false;
            state.thirdPrestigeCount++;
            state.secondPrestigeCount = 0;
            state.prestigeCount = 0;
            resetEngineState(O(1));
            save();
            return true;
        }

        function doFourthPrestige() {
            if (!canFourthPrestige()) return false;
            state.fourthPrestigeCount++;
            state.thirdPrestigeCount = 0;
            state.secondPrestigeCount = 0;
            state.prestigeCount = 0;
            resetEngineState(O(1));
            save();
            return true;
        }

        function resetEngineState(startTier) {
            state.engines = {};
            state.maxTier = startTier;
            state.engines[startTier.toString()] = O(1);
            state.points = O(0);
            state.gameTime = Math.floor(state.gameTime);
            lastTickTime = Date.now();
            pendingTicks = 0;
        }

        // 检查自动声望
        function checkAutoPrestige() {
            // 按优先级从高到低检查：四阶 > 三阶 > 二阶 > 一阶
            if (autoSettings.fourth.enabled && state.fourthPrestigeCount < autoSettings.fourth.target) {
                if (canFourthPrestige()) {
                    doFourthPrestige();
                    return;
                }
            }
            if (autoSettings.third.enabled && state.thirdPrestigeCount < autoSettings.third.target) {
                if (canThirdPrestige()) {
                    doThirdPrestige();
                    return;
                }
            }
            if (autoSettings.second.enabled && state.secondPrestigeCount < autoSettings.second.target) {
                if (canSecondPrestige()) {
                    doSecondPrestige();
                    return;
                }
            }
            if (autoSettings.prestige.enabled && state.prestigeCount < autoSettings.prestige.target) {
                if (canPrestige()) {
                    doPrestige();
                    return;
                }
            }
        }

        function updateUI() {
            const mult = getTotalMultiplier();
            
            document.getElementById('points').innerText = state.points.toString();
            document.getElementById('maxTier').innerText = state.maxTier.toString();
            document.getElementById('time').innerText = state.gameTime.toFixed(1) + ' 秒';
            document.getElementById('multiplier').innerText = mult.toString() + 'x';
            
            document.getElementById('prestigeCount').innerText = state.prestigeCount;
            document.getElementById('secondPrestigeCount').innerText = state.secondPrestigeCount;
            document.getElementById('thirdPrestigeCount').innerText = state.thirdPrestigeCount;
            document.getElementById('fourthPrestigeCount').innerText = state.fourthPrestigeCount;

            // 更新按钮
            updateButton('prestigeBtn', canPrestige, state.prestigeCount, '平方');
            updateButton('secondPrestigeBtn', canSecondPrestige, state.secondPrestigeCount, '平方');
            updateButton('thirdPrestigeBtn', canThirdPrestige, state.thirdPrestigeCount, '指数');
            updateButton('fourthPrestigeBtn', canFourthPrestige, state.fourthPrestigeCount, '指数');

            // 发动机列表
            const listDiv = document.getElementById('engineList');
            const tiers = Object.keys(state.engines)
                .filter(tier => state.engines[tier].gt(0))
                .sort((a, b) => Number(a) - Number(b));
            
            let html = '';
            if (tiers.length === 0) {
                html = '<div>暂无发动机</div>';
            } else {
                const maxShow = 20;
                for (let i = 0; i < Math.min(tiers.length, maxShow); i++) {
                    const tier = tiers[i];
                    html += '<div style="padding:3px 0;">代数 ' + tier + ' : ' + 
                            state.engines[tier].toString() + '</div>';
                }
                if (tiers.length > maxShow) {
                    html += '<div>... 还有 ' + (tiers.length - maxShow) + ' 代</div>';
                }
            }
            listDiv.innerHTML = html;
        }

        function updateButton(btnId, canFunc, count, type) {
            const btn = document.getElementById(btnId);
            if (canFunc()) {
                btn.classList.remove('disabled');
            } else {
                btn.classList.add('disabled');
            }
        }

        function mainLoop() {
            catchUp();
            checkAutoPrestige();
            updateUI();
            if (Date.now() - (state._lastSave || 0) > 2000) {
                save();
                state._lastSave = Date.now();
            }
        }

        // 初始化
        if (!load()) {
            resetEngineState(O(1));
            save();
        }
        state._lastSave = Date.now();
        
        // 加载自动设置界面
        document.getElementById('autoPrestigeTarget').value = autoSettings.prestige.target;
        document.getElementById('autoSecondPrestigeTarget').value = autoSettings.second.target;
        document.getElementById('autoThirdPrestigeTarget').value = autoSettings.third.target;
        document.getElementById('autoFourthPrestigeTarget').value = autoSettings.fourth.target;
        updateAutoButtons();

        // 手动按钮
        document.getElementById('prestigeBtn').addEventListener('click', () => {
            if (doPrestige()) updateUI();
        });
        document.getElementById('secondPrestigeBtn').addEventListener('click', () => {
            if (doSecondPrestige()) updateUI();
        });
        document.getElementById('thirdPrestigeBtn').addEventListener('click', () => {
            if (doThirdPrestige()) updateUI();
        });
        document.getElementById('fourthPrestigeBtn').addEventListener('click', () => {
            if (doFourthPrestige()) updateUI();
        });

        // 监听目标值变化
        ['autoPrestigeTarget', 'autoSecondPrestigeTarget', 'autoThirdPrestigeTarget', 'autoFourthPrestigeTarget']
            .forEach(id => {
                document.getElementById(id).addEventListener('change', updateAutoButtons);
            });

        window.addEventListener('beforeunload', save);
        setInterval(mainLoop, 100);
        updateUI();
    })();
    </script>
</body>
</html>
