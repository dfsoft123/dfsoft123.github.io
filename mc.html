<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的世界 无限地图联机版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        body { overflow: hidden; font-family: sans-serif; background: #1a1a1a; color: #fff; }
        canvas { display: block; position: absolute; top: 0; left: 0; }

        /* 菜单样式 */
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #222; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .panel { background: #333; padding: 20px; border-radius: 8px; width: 90%; max-width: 450px; box-shadow: 0 0 20px #000; text-align: center; }
        h1 { color: #5d9b41; margin-bottom: 5px; }
        .sub { color: #888; font-size: 12px; margin-bottom: 10px; }
        
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; background: #222; border: 1px solid #555; color: #fff; border-radius: 4px; font-size: 14px; }
        textarea { height: 80px; resize: none; font-family: monospace; font-size: 10px; word-break: break-all; }
        button { width: 100%; padding: 12px; margin-top: 8px; background: #4a9a4a; border: none; color: #fff; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:active { background: #3a8a3a; }
        button.secondary { background: #555; }
        button.danger { background: #a33; }
        .log { color: #ffa; font-size: 12px; margin-top: 5px; min-height: 20px; text-align: left; }
        
        /* 游戏界面 */
        #game-ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        #cross { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; }
        #cross::before, #cross::after { content: ''; position: absolute; background: #fff; }
        #cross::before { width: 2px; height: 100%; left: 11px; }
        #cross::after { width: 100%; height: 2px; top: 11px; }

        /* 手机控制 */
        #ctrl { position: absolute; bottom: 0; left: 0; width: 100%; height: 30%; z-index: 20; display: flex; justify-content: space-between; padding: 20px; }
        #joy-zone { width: 120px; height: 120px; position: relative; }
        #joy-base { width: 100%; height: 100%; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); }
        #joy-thumb { position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        
        #act-zone { display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .b { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; border: 2px solid rgba(255,255,255,0.4); color: #fff; }

        /* HUD */
        #hud { position: absolute; top: 10px; left: 10px; pointer-events: none; }
        #plist { font-size: 12px; color: #0f0; margin-bottom: 5px; }
        #chat { width: 50%; }
        .msg { background: rgba(0,0,0,0.5); padding: 4px 8px; margin-bottom: 2px; font-size: 12px; border-radius: 4px; }
        #cin-box { position: absolute; bottom: 0; width: 100%; pointer-events: auto; display: none; }
        #cin { width: 100%; padding: 10px; background: rgba(0,0,0,0.8); border: none; color: #fff; }
    </style>
</head>
<body>

<!-- 加载 Three.js -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
    if (!window.THREE) {
        document.body.innerHTML = "<div style='padding:20px;color:red;text-align:center;'>引擎加载失败！请刷新或检查网络。</div>";
        throw new Error("Three.js missing");
    }
</script>

<!-- 菜单界面 -->
<div id="menu">
    <div class="panel">
        <h1>我的世界 无限版</h1>
        <div class="sub">动态地图生成 | 修复多人连接</div>
        
        <input type="text" id="uname" placeholder="你的昵称" value="Player">
        
        <!-- 主机 -->
        <div style="margin-top:10px; border-top:1px solid #555; padding-top:10px;">
            <button id="btn-host">创建房间 (主机)</button>
            <div id="host-ui" style="display:none;">
                <div class="log" id="log-host">等待操作...</div>
                
                <!-- 步骤1 -->
                <div id="step1">
                    <button id="btn-gen">1. 生成邀请码</button>
                    <textarea id="offer-out" readonly placeholder="邀请码..."></textarea>
                    <button class="secondary" onclick="copy('offer-out')">复制邀请码</button>
                </div>
                
                <!-- 步骤2 -->
                <div style="margin-top:10px;">
                    <input type="text" id="ans-in" placeholder="粘贴好友的回执码">
                    <button id="btn-conn">连接该玩家</button>
                </div>
                
                <!-- 步骤3 -->
                <button id="btn-next" class="danger" style="display:none;">已连入一人！点击接待下一位</button>
            </div>
        </div>

        <!-- 客机 -->
        <div style="margin-top:20px; border-top:1px solid #555; padding-top:10px;">
            <button id="btn-guest">加入房间 (客机)</button>
            <div id="guest-ui" style="display:none;">
                <div class="log" id="log-guest">等待操作...</div>
                <input type="text" id="offer-in" placeholder="粘贴主机的邀请码">
                <button id="btn-ans">生成回执</button>
                <textarea id="ans-out" readonly style="display:none;" placeholder="回执码..."></textarea>
                <button class="secondary" id="btn-copy-ans" style="display:none;" onclick="copy('ans-out')">复制回执</button>
            </div>
        </div>
    </div>
</div>

<!-- 游戏界面 -->
<div id="game-ui">
    <div id="hud">
        <div id="plist">在线: 1人</div>
        <div id="chat"></div>
        <div id="cin-box"><input type="text" id="cin" placeholder="按回车发送"></div>
    </div>
    <div id="cross"></div>
    
    <div id="ctrl">
        <div id="joy-zone">
            <div id="joy-base"></div>
            <div id="joy-thumb"></div>
        </div>
        <div id="act-zone">
            <div class="b" id="b-j">跳</div>
            <div class="b" id="b-q">挖</div>
            <div class="b" id="b-p">放</div>
        </div>
    </div>
</div>

<script>
const $ = id => document.getElementById(id);
const isMob = /Mobile|Android|iPhone/i.test(navigator.userAgent);

// ================= 核心变量 =================
let scene, cam, ren;
let world = {}; // 存储被修改的方块 (破坏或放置)
let chunks = {}; // 存储地形网格 (动态生成)
let me = { name: "Player", pos: new THREE.Vector3(0, 30, 0), vel: new THREE.Vector3(), yaw: 0, pitch: 0, ground: false };
let peers = {};
let connections = []; // 【关键修复】存储所有已建立的连接
let pending_pc = null; // 当前正在等待连接的PC对象
let isHost = false;
const SEED = 12345; // 世界种子 (保证所有人地形一致)
const CHUNK_SIZE = 16; // 区块大小
const RENDER_DIST = 3; // 渲染半径 (3 = 48x48格)

// ================= 联机逻辑 (彻底修复多人连接) =================

async function waitICE(pc) {
    return new Promise((resolve) => {
        if (pc.iceGatheringState === 'complete') resolve();
        else {
            pc.onicegatheringstatechange = () => { if (pc.iceGatheringState === 'complete') resolve(); };
            setTimeout(resolve, 10000); 
        }
    });
}

function copy(id) {
    navigator.clipboard.writeText($(id).value).then(() => alert("已复制！"));
}

// --- 主机逻辑 ---
$('btn-host').onclick = () => {
    me.name = $('uname').value || "Host";
    isHost = true;
    $('host-ui').style.display = 'block';
    $('btn-host').style.display = 'none';
    $('btn-guest').style.display = 'none';
    $('step1').style.display = 'block';
    $('btn-next').style.display = 'none';
    $('log-host').innerText = "准备就绪，点击生成邀请码。";
};

// 生成邀请码
$('btn-gen').onclick = async () => {
    $('log-host').innerText = "正在生成... (约5秒)";
    $('offer-out').value = "";
    
    // 创建新的独立连接对象
    const pc = new RTCPeerConnection({ iceServers: [{urls: 'stun:stun.l.google.com:19302'}] });
    pending_pc = pc; // 保存到临时变量
    
    const dc = pc.createDataChannel('game');
    
    // 绑定成功事件
    dc.onopen = () => {
        $('log-host').innerText = "连接成功！玩家已加入。";
        connections.push(dc); // 【关键修复】加入连接列表，而不是覆盖
        
        // 发送初始化数据 (种子 + 已修改方块)
        dc.send(JSON.stringify({ t: 'init', name: me.name, seed: SEED, mods: world }));
        
        updatePlayerList();
        
        // UI 切换
        $('step1').style.display = 'none';
        $('btn-next').style.display = 'block';
        $('ans-in').value = '';
        pending_pc = null; // 清空临时变量，连接已移交到 connections 列表
    };
    
    dc.onmessage = e => handleMsg(e.data, dc);
    
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await waitICE(pc);
    
    $('offer-out').value = btoa(JSON.stringify(pc.localDescription));
    $('log-host').innerText = "邀请码已生成！发给好友。";
};

// 连接玩家
$('btn-conn').onclick = async () => {
    const code = $('ans-in').value.trim();
    if(!code) return alert("请粘贴回执");
    if(!pending_pc) return alert("流程错误：请先点击生成邀请码");
    
    $('log-host').innerText = "正在连接...";
    try {
        const answer = JSON.parse(atob(code));
        await pending_pc.setRemoteDescription(answer);
        $('log-host').innerText = "正在建立通道...";
    } catch(e) {
        $('log-host').innerText = "连接失败: " + e.message;
    }
};

// 接待下一位
$('btn-next').onclick = () => {
    $('btn-next').style.display = 'none';
    $('step1').style.display = 'block';
    $('log-host').innerText = "准备接待下一位...";
    // 自动点击生成，简化操作
    $('btn-gen').click();
};

// --- 客机逻辑 ---
$('btn-guest').onclick = () => {
    me.name = $('uname').value || "Guest";
    isHost = false;
    $('guest-ui').style.display = 'block';
    $('btn-host').style.display = 'none';
    $('btn-guest').style.display = 'none';
};

$('btn-ans').onclick = async () => {
    const code = $('offer-in').value.trim();
    if(!code) return alert("请粘贴邀请码");
    $('log-guest').innerText = "正在解析...";
    
    const pc = new RTCPeerConnection({ iceServers: [{urls: 'stun:stun.l.google.com:19302'}] });
    
    pc.ondatachannel = e => {
        const dc = e.channel;
        dc.onopen = () => {
            $('log-guest').innerText = "连接成功！";
            connections.push(dc);
            startGame(); // 客机进入游戏
        };
        dc.onmessage = ev => handleMsg(ev.data, dc);
    };
    
    try {
        const offer = JSON.parse(atob(code));
        await pc.setRemoteDescription(offer);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        await waitICE(pc);
        
        $('ans-out').value = btoa(JSON.stringify(pc.localDescription));
        $('ans-out').style.display = 'block';
        $('btn-copy-ans').style.display = 'block';
        $('log-guest').innerText = "回执已生成！复制发给主机。";
    } catch(e) {
        $('log-guest').innerText = "解析失败: " + e.message;
    }
};

// ================= 数据处理 =================
function handleMsg(data, conn) {
    try {
        const msg = JSON.parse(data);
        // 主机收到消息，转发给所有人 (排除发送者)
        if(isHost) {
            connections.forEach(c => { if(c !== conn && c.readyState === 'open') c.send(data); });
        }

        if(msg.t === 'init') {
            // 客机收到初始化数据
            if(!isHost) {
                // 应用种子 (已内置) 和修改数据
                world = msg.mods || {};
                rebuildModifiedBlocks(); // 重绘被修改的方块
            }
            createPlayerModel(msg.name, msg.name);
            updatePlayerList();
        }
        if(msg.t === 'pos') updatePlayerModel(msg.name, msg.p);
        if(msg.t === 'blk') {
            updateBlock(msg.x, msg.y, msg.z, msg.v, false);
        }
        if(msg.t === 'chat') addChat(msg.name, msg.k);
    } catch(e){}
}

function broadcast(msg) {
    const str = JSON.stringify(msg);
    connections.forEach(c => { if(c.readyState === 'open') c.send(str); });
}

function updatePlayerList() {
    let count = connections.length + 1;
    $('plist').innerText = `在线: ${count}人`;
}

// ================= 无限地图系统 =================
function startGame() {
    $('menu').style.display = 'none';
    $('game-ui').style.display = 'block';
    initScene();
    setupCtrl();
    anim();
}

function initScene() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 30, 60); // 雾效，远处看不清，减少渲染压力
    
    cam = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 200);
    ren = new THREE.WebGLRenderer({ antialias: true });
    ren.setSize(innerWidth, innerHeight);
    document.body.appendChild(ren.domElement);
    
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const sun = new THREE.DirectionalLight(0xffffff, 0.6);
    sun.position.set(50, 100, 50);
    scene.add(sun);
}

// 动态地形生成函数 (核心)
function getTerrainHeight(wx, wz) {
    // 简单的伪随机函数，保证种子一致地形一致
    // 使用正弦波叠加模拟地形
    const scale1 = 0.05;
    const scale2 = 0.1;
    const h = Math.sin(wx * scale1) * Math.cos(wz * scale1) * 8 + 
              Math.sin(wx * scale2 + SEED) * Math.cos(wz * scale2) * 4 + 15;
    return Math.floor(h);
}

// 更新区块 (在每一帧渲染中调用)
function updateChunks() {
    const cx = Math.floor(me.pos.x / CHUNK_SIZE);
    const cz = Math.floor(me.pos.z / CHUNK_SIZE);
    
    // 1. 生成附近的区块
    for(let dx = -RENDER_DIST; dx <= RENDER_DIST; dx++) {
        for(let dz = -RENDER_DIST; dz <= RENDER_DIST; dz++) {
            const key = `${cx+dx},${cz+dz}`;
            if(!chunks[key]) {
                generateChunk(cx+dx, cz+dz);
            }
        }
    }
    
    // 2. 删除远处的区块 (节省内存)
    for(let k in chunks) {
        const [ocx, ocz] = k.split(',');
        const dist = Math.abs(cx - Number(ocx)) + Math.abs(cz - Number(ocz));
        if(dist > RENDER_DIST + 2) {
            scene.remove(chunks[k]);
            delete chunks[k];
        }
    }
}

function generateChunk(cx, cz) {
    const geo = new THREE.BoxGeometry(1,1,1);
    const mat = new THREE.MeshLambertMaterial({color: 0x5d9b41}); // 草地色
    
    // 计算该区块有多少方块，创建 InstancedMesh
    // 预估数量：16x16x高度范围，取最大高度约30
    const mesh = new THREE.InstancedMesh(geo, mat, CHUNK_SIZE * CHUNK_SIZE * 30);
    mesh.count = 0; // 先设为0，逐个添加
    
    const matrix = new THREE.Matrix4();
    
    for(let x=0; x<CHUNK_SIZE; x++) {
        for(let z=0; z<CHUNK_SIZE; z++) {
            const wx = cx * CHUNK_SIZE + x;
            const wz = cz * CHUNK_SIZE + z;
            
            const h = getTerrainHeight(wx, wz);
            
            for(let y=0; y<=h; y++) {
                // 检查是否被修改过 (破坏或放置)
                const key = `${wx},${y},${wz}`;
                let type = (y == h) ? 1 : 2; // 1=草地, 2=泥土
                
                // 如果有修改记录，跳过自然生成，由 rebuildModifiedBlocks 处理
                // 或者如果是被挖掉的 (type=0)，直接不生成
                if(world[key] === 0) continue; 
                
                matrix.setPosition(wx, y, wz);
                mesh.setMatrixAt(mesh.count++, matrix);
            }
        }
    }
    
    mesh.instanceMatrix.needsUpdate = true;
    scene.add(mesh);
    chunks[`${cx},${cz}`] = mesh;
}

// 重绘被修改的方块 (放置的方块)
function rebuildModifiedBlocks() {
    // 简单处理：单独为被放置的方块创建小 Mesh
    // 后续可优化为合并到一个全局的“修改Mesh”中
    for(let k in world) {
        const v = world[k];
        if(v !== 0 && v !== 1 && v !== 2) { // 如果是非自然方块 (比如石头、木头等)
            const [x,y,z] = k.split(',');
            // 检查是否已有单独的模型，避免重复
            if(!world[k+'_mesh']) {
                const geo = new THREE.BoxGeometry(1,1,1);
                const color = (v==3) ? 0x888888 : 0x8b5a2b; // 3=石头
                const mat = new THREE.MeshLambertMaterial({color: color});
                const m = new THREE.Mesh(geo, mat);
                m.position.set(Number(x), Number(y), Number(z));
                scene.add(m);
                world[k+'_mesh'] = m; // 标记已生成
            }
        }
    }
}

// 方块操作
function updateBlock(x, y, z, v, sync=true) {
    const key = `${x},${y},${z}`;
    
    // 更新数据
    if(v === 0) {
        delete world[key]; // 挖掉
        // 移除单独的放置模型
        if(world[key+'_mesh']) {
            scene.remove(world[key+'_mesh']);
            delete world[key+'_mesh'];
        }
        // 强制刷新该区块 (重新生成，因为 InstancedMesh 不易单独修改)
        const cx = Math.floor(x / CHUNK_SIZE);
        const cz = Math.floor(z / CHUNK_SIZE);
        if(chunks[`${cx},${cz}`]) {
            scene.remove(chunks[`${cx},${cz}`]);
            delete chunks[`${cx},${cz}`];
        }
    } else {
        world[key] = v; // 放置
        rebuildModifiedBlocks(); // 创建新模型
    }
    
    if(sync) broadcast({ t: 'blk', x, y, z, v });
}

// ================= 玩家模型 =================
function createPlayerModel(name, id) {
    if(peers[id]) return;
    const g = new THREE.Group();
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.6), new THREE.MeshLambertMaterial({color: 0xffcc99}));
    head.position.y = 1.4;
    g.add(head);
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.8,0.3), new THREE.MeshLambertMaterial({color: new THREE.Color().setHSL(Math.random(), 0.6, 0.5)}));
    body.position.y = 0.8;
    g.add(body);
    
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'white';
    ctx.font = 'bold 32px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(name, 128, 40);
    const tex = new THREE.CanvasTexture(canvas);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
    sprite.scale.set(2, 0.5, 1);
    sprite.position.y = 2.0;
    g.add(sprite);
    
    scene.add(g);
    peers[id] = g;
}

function updatePlayerModel(id, pos) {
    if(!peers[id]) createPlayerModel(id, id);
    peers[id].position.set(pos.x, pos.y-1.0, pos.z);
}

function addChat(name, txt) {
    const d = document.createElement('div');
    d.className = 'msg';
    d.innerText = name + ": " + txt;
    $('chat').appendChild(d);
    setTimeout(() => d.remove(), 10000);
}

// ================= 控制与物理 =================
function setupCtrl() {
    if(isMob) {
        let joy = { active: false, x:0, y:0 };
        const base = $('joy-base'), thumb = $('joy-thumb');
        
        $('joy-zone').ontouchstart = e => {
            e.preventDefault();
            joy.active = true;
            const rect = $('joy-zone').getBoundingClientRect();
            joy.cx = e.touches[0].clientX - rect.left;
            joy.cy = e.touches[0].clientY - rect.top;
            thumb.style.left = joy.cx + 'px';
            thumb.style.top = joy.cy + 'px';
        };
        $('joy-zone').ontouchmove = e => {
            if(!joy.active) return;
            const rect = $('joy-zone').getBoundingClientRect();
            const tx = e.touches[0].clientX - rect.left;
            const ty = e.touches[0].clientY - rect.top;
            const dx = tx - joy.cx;
            const dy = ty - joy.cy;
            const dist = Math.min(40, Math.hypot(dx, dy));
            const ang = Math.atan2(dy, dx);
            thumb.style.left = joy.cx + Math.cos(ang)*dist + 'px';
            thumb.style.top = joy.cy + Math.sin(ang)*dist + 'px';
            joy.x = Math.cos(ang) * (dist/40);
            joy.y = Math.sin(ang) * (dist/40);
        };
        $('joy-zone').ontouchend = e => { joy.active = false; joy.x=0; joy.y=0; thumb.style.left=base.style.left; thumb.style.top=base.style.top; };
        
        setInterval(() => {
            if(joy.active) {
                me.vel.x -= joy.x * 0.1;
                me.vel.z -= joy.y * 0.1;
            }
        }, 16);

        let lastT = null;
        document.ontouchstart = e => { if(e.target.id.startsWith('b')) return; lastT = e.touches[0]; };
        document.ontouchmove = e => {
            if(e.target.id.startsWith('b')) return;
            if(!lastT) return;
            me.yaw -= (e.touches[0].clientX - lastT.clientX) * 0.005;
            me.pitch -= (e.touches[0].clientY - lastT.clientY) * 0.005;
            lastT = e.touches[0];
        };

        $('b-j').ontouchstart = () => { if(me.ground) me.vel.y = 0.2; };
        $('b-q').ontouchstart = () => hit(false);
        $('b-p').ontouchstart = () => hit(true);
    } else {
        document.addEventListener('click', () => ren.domElement.requestPointerLock());
        document.addEventListener('mousemove', e => {
            if(document.pointerLockElement) {
                me.yaw -= e.movementX * 0.002;
                me.pitch -= e.movementY * 0.002;
            }
        });
        window.addEventListener('keydown', e => {
            const s = 0.1;
            if(e.code === 'KeyW') { me.vel.x -= Math.sin(me.yaw)*s; me.vel.z -= Math.cos(me.yaw)*s; }
            if(e.code === 'KeyS') { me.vel.x += Math.sin(me.yaw)*s; me.vel.z += Math.cos(me.yaw)*s; }
            if(e.code === 'KeyA') { me.vel.x -= Math.cos(me.yaw)*s; me.vel.z += Math.sin(me.yaw)*s; }
            if(e.code === 'KeyD') { me.vel.x += Math.cos(me.yaw)*s; me.vel.z -= Math.sin(me.yaw)*s; }
            if(e.code === 'Space' && me.ground) me.vel.y = 0.2;
            
            if(e.code === 'Enter') {
                const box = $('cin-box');
                if(box.style.display === 'block') {
                    if($('cin').value) {
                        broadcast({ t: 'chat', name: me.name, k: $('cin').value });
                        addChat(me.name, $('cin').value);
                        $('cin').value = '';
                    }
                    box.style.display = 'none';
                    ren.domElement.requestPointerLock();
                } else {
                    box.style.display = 'block';
                    $('cin').focus();
                    document.exitPointerLock();
                }
            }
        });
        document.addEventListener('mousedown', e => { if(document.pointerLockElement) hit(e.button===2); });
    }
    setInterval(tick, 16);
}

function tick() {
    if(!scene) return;
    
    // 物理模拟
    me.vel.y -= 0.01;
    me.pos.x += me.vel.x;
    me.pos.y += me.vel.y;
    me.pos.z += me.vel.z;
    
    // 碰撞检测
    me.ground = false;
    const feetY = me.pos.y - 1.6;
    
    // 检查脚下的地形高度
    const groundH = getTerrainHeight(Math.floor(me.pos.x), Math.floor(me.pos.z));
    
    // 简单碰撞：如果脚坐标低于地形高度，就停住
    // 注意：这里需要考虑破坏方块后的情况
    const key = `${Math.floor(me.pos.x)},${Math.floor(feetY)},${Math.floor(me.pos.z)}`;
    // 如果该位置有方块(被放置) 或者 是自然地形且未被破坏
    if(world[key] || (world[key] !== 0 && feetY <= groundH)) {
        me.pos.y = Math.floor(feetY) + 2.6;
        me.vel.y = 0;
        me.ground = true;
    }
    
    // 防止掉出世界
    if(me.pos.y < -10) { me.pos.set(0, 30, 0); me.vel.set(0,0,0); }
    
    me.vel.x *= 0.8;
    me.vel.z *= 0.8;
    
    // 同步
    if(Math.random() < 0.2) {
        broadcast({ t: 'pos', name: me.name, p: { x: me.pos.x, y: me.pos.y, z: me.pos.z, yaw: me.yaw } });
    }
}

function hit(place) {
    const dir = new THREE.Vector3(0,0,-1).applyEuler(new THREE.Euler(me.pitch, me.yaw, 0, 'YXZ'));
    raycaster.set(cam.position, dir, 0, 5);
    
    // 射线检测比较复杂，简化处理：只检测眼前的自然地形或放置的方块
    // 这里暂时只实现简单的破坏逻辑
    const step = 0.5;
    for(let d=0; d<5; d+=step) {
        const p = cam.position.clone().add(dir.clone().multiplyScalar(d));
        const x = Math.floor(p.x), y = Math.floor(p.y), z = Math.floor(p.z);
        
        const h = getTerrainHeight(x, z);
        const key = `${x},${y},${z}`;
        
        // 如果是自然地形且高于地表，或者是被放置的方块
        if(y <= h && world[key] !== 0) { // 有方块
            if(!place) updateBlock(x, y, z, 0);
            else {
                // 放置：在面前空位放
                // 修正：稍微退后一点找空位
                const p2 = cam.position.clone().add(dir.clone().multiplyScalar(d-step));
                const nx = Math.floor(p2.x), ny = Math.floor(p2.y), nz = Math.floor(p2.z);
                updateBlock(nx, ny, nz, 3); // 放石头
            }
            break;
        }
        // 检查单独放置的方块 mesh?
        // 简化版：通过 world 字典检测放置方块
        if(world[key] && world[key] !== 0) {
             if(!place) updateBlock(x, y, z, 0);
             else {
                 // 放置逻辑同上
                 const p2 = cam.position.clone().add(dir.clone().multiplyScalar(d-step));
                 const nx = Math.floor(p2.x), ny = Math.floor(p2.y), nz = Math.floor(p2.z);
                 updateBlock(nx, ny, nz, 3);
             }
             break;
        }
    }
}

const raycaster = new THREE.Raycaster();

function anim() {
    requestAnimationFrame(anim);
    
    // 【核心】动态更新地图
    updateChunks();
    
    cam.position.set(me.pos.x, me.pos.y + 0.7, me.pos.z);
    cam.rotation.order = 'YXZ';
    cam.rotation.y = me.yaw;
    cam.rotation.x = me.pitch;
    ren.render(scene, cam);
}

window.onresize = () => {
    if(ren) {
        ren.setSize(innerWidth, innerHeight);
        cam.aspect = innerWidth/innerHeight;
        cam.updateProjectionMatrix();
    }
};
</script>
</body>
