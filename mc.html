<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的世界 联机版 (带 ICE 自检)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; }
        body { overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #222; color: #fff; }
        canvas { display: block; position: absolute; top: 0; left: 0; }

        #lobby {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }
        #lobby h1 { font-size: 22px; margin-bottom: 5px; color: #4a4; }
        .hint { font-size: 11px; color: #888; margin-bottom: 15px; }

        .panel { width: 90%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }
        
        input, textarea {
            width: 100%; padding: 10px; margin: 5px 0; background: #333; border: 1px solid #555;
            color: #fff; border-radius: 4px; font-size: 14px;
        }
        textarea { height: 100px; resize: none; font-family: monospace; font-size: 10px; word-break: break-all; }
        
        button {
            width: 100%; padding: 12px; margin-top: 10px; background: #4a9a4a; border: none;
            color: #fff; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        button:disabled { background: #555; color: #888; cursor: not-allowed; }
        button.secondary { background: #333; border: 1px solid #555; }

        #status-msg { margin-top: 15px; font-size: 13px; color: #ffa; min-height: 20px; }
        #ice-status { margin-top: 5px; font-size: 11px; color: #aaa; min-height: 16px; }

        #ui-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.8); }
        #crosshair::before { width: 2px; height: 100%; left: 9px; }
        #crosshair::after { width: 100%; height: 2px; top: 9px; }

        .joystick-zone { position: absolute; bottom: 0; left: 0; width: 40%; height: 50%; }
        .joystick-base { position: absolute; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); display: none; transform: translate(-50%, -50%); }
        .joystick-thumb { position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); }
        .look-zone { position: absolute; top: 0; right: 0; width: 60%; height: 80%; z-index: 5; }

        #action-btns { position: absolute; bottom: 20px; right: 20px; width: 150px; height: 150px; pointer-events: auto; }
        .act-btn { position: absolute; width: 60px; height: 60px; background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; color: #fff; display: flex; justify-content: center; align-items: center; font-size: 12px; }
        #btn-jump { right: 0; bottom: 40px; }
        #btn-break { left: 0; bottom: 0; background: rgba(200,50,50,0.5); }
        #btn-place { right: 0; bottom: 0; background: rgba(50,100,200,0.5); }

        #hotbar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.6); padding: 2px; border-radius: 4px; pointer-events: auto; }
        .slot { width: 40px; height: 40px; border: 2px solid #333; margin: 1px; background: rgba(100,100,100,0.3); display: flex; justify-content: center; align-items: center; }
        .slot.active { border-color: #fff; }
    </style>
</head>
<body>
<div id="lobby">
    <h1>我的世界 联机版 (ICE 自检)</h1>
    <div class="hint">如果加入房间一直“正在连接”，请查看下方 ICE 状态。<br>ICE 候选数为 0 说明 STUN 不可达，需要换网络或使用中继服务器。</div>

    <div class="panel">
        <button id="btn-host">创建房间 (主机)</button>
        <div style="height:8px"></div>
        <input type="text" id="input-join" placeholder="输入好友发来的联机码">
        <button id="btn-join">加入房间</button>

        <div id="room-info" style="display:none; margin-top:12px; width:100%;">
            <div style="font-size:11px; color:#888;">你的联机码 (发给好友):</div>
            <textarea id="code-display" readonly></textarea>
            <button class="secondary" id="btn-copy">复制联机码</button>
        </div>

        <div id="status-msg">准备就绪</div>
        <div id="ice-status"></div>
    </div>
</div>

<div id="ui-layer">
    <div id="crosshair"></div>
    <div class="joystick-zone">
        <div class="joystick-base" id="joy-base"></div>
        <div class="joystick-thumb" id="joy-thumb"></div>
    </div>
    <div class="look-zone"></div>
    <div id="hotbar"></div>
    <div id="action-btns">
        <div id="btn-jump" class="act-btn">跳跃</div>
        <div id="btn-break" class="act-btn">破坏</div>
        <div id="btn-place" class="act-btn">放置</div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';

const isMobile = /Mobile|Android|iPhone/i.test(navigator.userAgent);
let scene, camera, renderer;
let blocks = new Map();
let worldGroup = new THREE.Group();
let raycaster = new THREE.Raycaster();
let player = {
    pos: new THREE.Vector3(0, 40, 0),
    vel: new THREE.Vector3(),
    yaw: 0, pitch: 0,
    flying: true, onGround: false,
    inventory: [1, 4, 17, 9, 10],
    selected: 0
};

let net = { pc: null, channel: null };

// ====== UI 辅助 ======
function $(id) { return document.getElementById(id); }

function log(msg, color) {
    $('status-msg').innerText = msg;
    $('status-msg').style.color = color || '#ffa';
}
function iceLog(msg) {
    $('ice-status').innerText = msg;
}

// ====== 复制功能 ======
$('btn-copy').onclick = () => {
    const text = $('code-display').value;
    if (!text || text.includes('生成中')) {
        alert('没有可复制的内容');
        return;
    }
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try {
        document.execCommand('copy');
        alert('已复制联机码');
    } catch (e) {
        alert('复制失败，请手动复制');
    }
    document.body.removeChild(ta);
};

// ====== ICE 状态监控 & 候选统计 ======
let iceCandidates = [];
let iceDone = false;

function watchICE(pc) {
    iceCandidates = [];
    iceDone = false;

    pc.onicecandidate = e => {
        if (e.candidate) {
            iceCandidates.push(e.candidate);
            iceLog(`已收集 ICE 候选: ${iceCandidates.length}`);
        } else {
            iceDone = true;
            if (iceCandidates.length === 0) {
                iceLog('警告：ICE 候选数为 0，STUN 可能不可达，WebRTC 无法建立连接');
                log('STUN 不可达，请换网络或使用中继服务器', '#f66');
            } else {
                iceLog(`ICE 收集完成，共 ${iceCandidates.length} 个候选`);
            }
        }
    };

    pc.oniceconnectionstatechange = () => {
        const state = pc.iceConnectionState;
        iceLog(`ICE 连接状态: ${state}`);
        if (state === 'connected' || state === 'completed') {
            log('连接成功，正在进入世界...', '#4a4');
            setTimeout(startGame, 300);
        } else if (state === 'failed') {
            log('ICE 连接失败，NAT/防火墙可能不支持 P2P', '#f66');
        } else if (state === 'disconnected') {
            log('连接断开', '#fa0');
        }
    };

    pc.onconnectionstatechange = () => {
        const state = pc.connectionState;
        iceLog(`连接状态: ${state}`);
    };
}

// ====== 手动模式：主机生成 offer ======
$('btn-host').onclick = async () => {
    log('正在初始化...');
    iceLog('正在创建 RTCPeerConnection...');

    net.pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    });
    watchICE(net.pc);

    net.channel = net.pc.createDataChannel('game');
    setupChannel(net.channel);

    const offer = await net.pc.createOffer();
    await net.pc.setLocalDescription(offer);

    log('正在生成邀请码（等待 ICE 收集，最多 8 秒）...');

    // 等待 ICE 收集或超时 8 秒
    await new Promise(r => setTimeout(r, 8000));

    const code = btoa(JSON.stringify(net.pc.localDescription));
    $('code-display').value = code;
    $('room-info').style.display = 'block';
    log('邀请码已生成，请复制发给好友', '#4a4');
};

// ====== 手动模式：客机加入 ======
$('btn-join').onclick = async () => {
    const code = $('input-join').value.trim();
    if (!code) return alert('请输入联机码');

    try {
        net.pc = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        });
        watchICE(net.pc);

        net.pc.ondatachannel = e => {
            net.channel = e.channel;
            setupChannel(net.channel);
        };

        const offer = JSON.parse(atob(code));
        await net.pc.setRemoteDescription(offer);

        const answer = await net.pc.createAnswer();
        await net.pc.setLocalDescription(answer);

        log('正在连接主机（等待 ICE...）');

        // 等待 ICE 收集或超时 8 秒
        await new Promise(r => setTimeout(r, 8000));

        const answerCode = btoa(JSON.stringify(net.pc.localDescription));
        // 这里省略回执步骤，如果想做完整手动流程，可以再拆成两步
        // 实际上现在大部分情况是：ICE 收集完就有候选了，但网络不通还是连不上
    } catch (e) {
        log('解析联机码失败: ' + e.message, '#f66');
    }
};

// ====== 数据通道事件 ======
function setupChannel(channel) {
    channel.onopen = () => {
        log('数据通道已打开，连接成功！', '#4a4');
        setTimeout(startGame, 300);
    };
    channel.onmessage = e => {
        // 这里可以处理方块同步等
    };
    channel.onerror = () => log('数据通道错误', '#f66');
}

// ====== 游戏逻辑（极简版） ======
function startGame() {
    if ($('ui-layer').style.display === 'block') return;
    $('lobby').style.display = 'none';
    $('ui-layer').style.display = 'block';

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 20, 60);

    camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 500);
    renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    scene.add(worldGroup);

    // 简单地形
    for (let x = -2; x <= 2; x++) {
        for (let z = -2; z <= 2; z++) {
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const wx = x * 8 + i, wz = z * 8 + j;
                    const h = Math.floor(Math.sin(wx * 0.1 + wz * 0.1 + 12345) * 5 + 15);
                    for (let y = 0; y <= h; y++) {
                        let type = 3;
                        if (y === 0) type = 8;
                        else if (y === h) type = 1;
                        else if (y > h - 3) type = 2;
                        addBlock(wx, y, wz, type, false);
                    }
                }
            }
        }
    }

    setupControls();
    animate();
}

function addBlock(x, y, z, type, broadcast = true) {
    const key = `${x},${y},${z}`;
    if (type === 0) {
        if (blocks.has(key)) {
            worldGroup.remove(blocks.get(key));
            blocks.delete(key);
        }
    } else {
        if (blocks.has(key)) return;
        const mat = new THREE.MeshLambertMaterial({ color: [0x555555, 0x55aa55, 0x886644, 0x888888][type] || 0xffffff });
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), mat);
        mesh.position.set(x, y, z);
        worldGroup.add(mesh);
        blocks.set(key, mesh);
    }

    if (broadcast && net.channel && net.channel.readyState === 'open') {
        net.channel.send(JSON.stringify({ t: 'b', x, y, z, type }));
    }
}

function setupControls() {
    setInterval(() => {
        player.vel.y -= 0.02;
        player.pos.y += player.vel.y;

        const key = `${Math.floor(player.pos.x)},${Math.floor(player.pos.y - 1.6)},${Math.floor(player.pos.z)}`;
        if (blocks.has(key)) {
            player.pos.y = Math.floor(player.pos.y - 1.6) + 2.6;
            player.vel.y = 0;
            player.onGround = true;
        } else {
            player.onGround = false;
        }

        if (player.pos.y < -10) player.pos.y = 50;
    }, 16);

    if (isMobile) {
        const joyZone = document.querySelector('.joystick-zone');
        const joyBase = $('joy-base');
        const joyThumb = $('joy-thumb');

        joyZone.ontouchstart = e => {
            e.preventDefault();
            joyBase.style.display = 'block';
            joyBase.style.left = e.touches[0].clientX + 'px';
            joyBase.style.top = e.touches[0].clientY + 'px';
            joyThumb.style.left = e.touches[0].clientX + 'px';
            joyThumb.style.top = e.touches[0].clientY + 'px';
        };
        joyZone.ontouchmove = e => {
            if (joyBase.style.display === 'none') return;
            const t = e.touches[0];
            const dx = t.clientX - parseFloat(joyBase.style.left);
            const dy = t.clientY - parseFloat(joyBase.style.top);
            const dist = Math.min(40, Math.hypot(dx, dy));
            const ang = Math.atan2(dy, dx);
            player.pos.x -= Math.cos(ang) * (dist / 40) * 0.3;
            player.pos.z -= Math.sin(ang) * (dist / 40) * 0.3;
            joyThumb.style.left = (parseFloat(joyBase.style.left) + Math.cos(ang) * dist) + 'px';
            joyThumb.style.top = (parseFloat(joyBase.style.top) + Math.sin(ang) * dist) + 'px';
        };
        joyZone.ontouchend = () => joyBase.style.display = 'none';

        document.querySelector('.look-zone').ontouchmove = e => {
            if (e.touches.length === 0) return;
            const t = e.touches[0];
            if (!e.target.lastX) e.target.lastX = t.clientX;
            if (!e.target.lastY) e.target.lastY = t.clientY;
            player.yaw -= (t.clientX - e.target.lastX) * 0.005;
            player.pitch -= (t.clientY - e.target.lastY) * 0.005;
            e.target.lastX = t.clientX;
            e.target.lastY = t.clientY;
        };

        $('btn-jump').ontouchstart = () => { if (player.onGround) player.vel.y = 0.2; };
        $('btn-break').ontouchstart = () => interactBlock(0);
        $('btn-place').ontouchstart = () => interactBlock(1);
    } else {
        document.addEventListener('click', () => document.body.requestPointerLock());
        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement) {
                player.yaw -= e.movementX * 0.002;
                player.pitch -= e.movementY * 0.002;
            }
        });
        document.addEventListener('keydown', e => {
            const s = 0.5;
            if (e.code === 'KeyW') player.pos.z -= s;
            if (e.code === 'KeyS') player.pos.z += s;
            if (e.code === 'KeyA') player.pos.x -= s;
            if (e.code === 'KeyD') player.pos.x += s;
            if (e.code === 'Space') { if (player.onGround) player.vel.y = 0.2; }
        });
        document.addEventListener('mousedown', e => {
            if (document.pointerLockElement) interactBlock(e.button === 2 ? 1 : 0);
        });
        document.addEventListener('contextmenu', e => e.preventDefault());
    }
}

function interactBlock(mode) {
    raycaster.setFromCamera({ x: 0, y: 0 }, camera);
    const hits = raycaster.intersectObjects(worldGroup.children);
    if (hits.length > 0 && hits[0].distance < 6) {
        const p = hits[0].object.position;
        if (mode === 0) addBlock(p.x, p.y, p.z, 0);
        else {
            const n = hits[0].face.normal;
            addBlock(p.x + n.x, p.y + n.y, p.z + n.z, player.inventory[player.selected]);
        }
    }
}

function animate() {
    requestAnimationFrame(animate);
    if (!camera) return;
    camera.position.copy(player.pos);
    camera.rotation.order = 'YXZ';
    camera.rotation.y = player.yaw;
    camera.rotation.x = player.pitch;
    renderer.render(scene, camera);
}
</script>
</body>
</html>
