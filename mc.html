<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的世界 纯净联机版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        body { overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #fff; }
        canvas { display: block; position: absolute; top: 0; left: 0; }

        /* 菜单界面 */
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #222; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99; padding: 20px; }
        .panel { background: #333; padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; box-shadow: 0 0 20px #000; text-align: center; }
        h1 { color: #5d9b41; margin-bottom: 5px; font-size: 24px; }
        .sub { color: #888; font-size: 12px; margin-bottom: 15px; }
        
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; background: #222; border: 1px solid #555; color: #fff; border-radius: 4px; font-size: 14px; }
        textarea { height: 80px; resize: none; font-family: monospace; font-size: 10px; word-break: break-all; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: #4a9a4a; border: none; color: #fff; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:active { background: #3a8a3a; }
        button.secondary { background: #555; }
        .error-msg { color: #f55; font-size: 12px; margin-top: 10px; }

        /* 游戏界面 */
        #game-ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        
        /* 准星 */
        #cross { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; pointer-events: none; }
        #cross::before, #cross::after { content: ''; position: absolute; background: #fff; }
        #cross::before { width: 2px; height: 100%; left: 11px; }
        #cross::after { width: 100%; height: 2px; top: 11px; }

        /* 手机控制 */
        #touch-zone { position: absolute; bottom: 0; left: 0; width: 40%; height: 30%; z-index: 20; }
        #joystick { position: absolute; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); display: none; transform: translate(-50%, -50%); }
        #joy-thumb { position: absolute; width: 40px; height: 40px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); }

        #action-zone { position: absolute; bottom: 20px; right: 20px; z-index: 20; pointer-events: auto; display: flex; gap: 10px; }
        .act-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; border: 2px solid rgba(255,255,255,0.4); }
        
        #chat-zone { position: absolute; bottom: 20px; left: 20px; width: 40%; pointer-events: none; }
        .msg { background: rgba(0,0,0,0.5); padding: 4px 8px; margin-bottom: 2px; font-size: 12px; border-radius: 4px; color: #fff; }
        #chat-input-box { position: absolute; bottom: 0; width: 100%; pointer-events: auto; display: none; }
        #chat-input { width: 100%; padding: 10px; background: rgba(0,0,0,0.8); border: none; color: #fff; font-size: 14px; outline: none; }
    </style>
</head>
<body>

<!-- 加载必要的库 (使用传统script标签，解决 import 报错问题) -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
    // 检测库是否加载成功
    if (!window.THREE) {
        document.body.innerHTML = "<div style='color:red;text-align:center;padding:50px;'>三大核心库加载失败！请检查网络连接，刷新重试。<br>如果网络受限，请尝试开启手机热点给电脑连网。</div>";
        throw new Error("Three.js load failed");
    }
</script>

<!-- 菜单 -->
<div id="menu">
    <div class="panel">
        <h1>我的世界 纯净版</h1>
        <div class="sub">已修复按钮无反应问题 | 手动联机</div>
        
        <input type="text" id="uname" placeholder="输入你的昵称" value="玩家1">
        
        <!-- 手动联机区 -->
        <div style="margin-top:10px; text-align:left; font-size:12px; color:#aaa;">
            第一步：主机点击生成码
        </div>
        <button id="btn-create">我是主机 (生成邀请码)</button>
        <textarea id="code-out" placeholder="点击上方按钮生成..." readonly></textarea>
        <button class="secondary" id="btn-copy-out">复制发给好友</button>

        <div style="margin-top:15px; text-align:left; font-size:12px; color:#aaa;">
            第二步：客机粘贴码，生成回执
        </div>
        <textarea id="code-in" placeholder="在此粘贴好友发来的邀请码"></textarea>
        <button id="btn-join">我是客机 (生成回执)</button>
        <textarea id="ans-out" placeholder="点击上方生成..." readonly style="display:none;"></textarea>
        <button class="secondary" id="btn-copy-ans" style="display:none;">复制回执发回给主机</button>

        <div style="margin-top:15px; text-align:left; font-size:12px; color:#aaa;">
            第三步：主机粘贴回执，完成连接
        </div>
        <textarea id="final-in" placeholder="在此粘贴好友的回执"></textarea>
        <button id="btn-final" style="background:#a50;">主机确认连接</button>
        
        <div id="err-msg"></div>
    </div>
</div>

<!-- 游戏界面 -->
<div id="game-ui">
    <div id="cross"></div>
    
    <!-- 手机触控区 -->
    <div id="touch-zone">
        <div id="joystick"></div>
        <div id="joy-thumb"></div>
    </div>
    <div id="action-zone">
        <div class="act-btn" id="act-jump">跳</div>
        <div class="act-btn" id="act-break">挖</div>
        <div class="act-btn" id="act-place">放</div>
    </div>
    
    <!-- 聊天 -->
    <div id="chat-zone">
        <div id="chat-list"></div>
        <div id="chat-input-box">
            <input type="text" id="chat-input" placeholder="输入内容按回车发送">
        </div>
    </div>
</div>

<script>
// ================= 全局变量 =================
const $ = id => document.getElementById(id);
const isMob = /Mobile|Android|iPhone/i.test(navigator.userAgent);
let scene, cam, ren;
let world = {}; // "x,y,z": type
let player = {
    name: "玩家",
    pos: { x:0, y:30, z:0 }, 
    vel: { x:0, y:0, z:0 },
    yaw: 0, pitch: 0,
    ground: false
};
let peers = {}; // 远程玩家模型
let net = { pc: null, channel: null, isHost: false };

// ================= 联机逻辑 (纯WebRTC手动交换) =================

// 主机：生成 Offer
$('btn-create').onclick = async () => {
    player.name = $('uname').value || "主机";
    $('err-msg').innerText = "正在生成...";
    net.isHost = true;
    
    try {
        net.pc = new RTCPeerConnection({ iceServers: [{urls: 'stun:stun.l.google.com:19302'}] });
        net.channel = net.pc.createDataChannel('game');
        
        net.channel.onopen = () => {
            $('err-msg').innerText = "连接成功！";
            net.channel.send(JSON.stringify({t:'init', n: player.name}));
            startGame();
        };
        net.channel.onmessage = e => handleNetMsg(e.data);
        
        const offer = await net.pc.createOffer();
        await net.pc.setLocalDescription(offer);
        
        // 等待 ICE 收集 (给网络一点时间)
        await new Promise(r => setTimeout(r, 3000));
        
        $('code-out').value = btoa(JSON.stringify(net.pc.localDescription));
        $('err-msg').innerText = "邀请码已生成！请复制发给客机。";
    } catch(e) {
        $('err-msg').innerText = "生成失败: " + e.message;
    }
};

$('btn-copy-out').onclick = () => {
    navigator.clipboard.writeText($('code-out').value).then(() => alert("已复制邀请码！发给好友吧。"));
};

// 客机：接收 Offer，生成 Answer
$('btn-join').onclick = async () => {
    player.name = $('uname').value || "客机";
    const code = $('code-in').value.trim();
    if(!code) return alert("请粘贴邀请码");
    $('err-msg').innerText = "正在解析...";
    
    try {
        net.pc = new RTCPeerConnection({ iceServers: [{urls: 'stun:stun.l.google.com:19302'}] });
        net.pc.ondatachannel = e => {
            net.channel = e.channel;
            net.channel.onopen = () => {
                $('err-msg').innerText = "连接成功！";
                net.channel.send(JSON.stringify({t:'init', n: player.name}));
                startGame();
            };
            net.channel.onmessage = ev => handleNetMsg(ev.data);
        };
        
        const offer = JSON.parse(atob(code));
        await net.pc.setRemoteDescription(offer);
        
        const answer = await net.pc.createAnswer();
        await net.pc.setLocalDescription(answer);
        
        await new Promise(r => setTimeout(r, 3000));
        
        $('ans-out').value = btoa(JSON.stringify(net.pc.localDescription));
        $('ans-out').style.display = 'block';
        $('btn-copy-ans').style.display = 'block';
        $('err-msg').innerText = "回执已生成！请复制发回给主机。";
    } catch(e) {
        $('err-msg').innerText = "解析失败: " + e.message;
    }
};

$('btn-copy-ans').onclick = () => {
    navigator.clipboard.writeText($('ans-out').value).then(() => alert("已复制回执！发回给主机。"));
};

// 主机：最终连接
$('btn-final').onclick = async () => {
    const code = $('final-in').value.trim();
    if(!code) return alert("请粘贴回执");
    if(!net.pc) return alert("请先执行第一步");
    $('err-msg').innerText = "正在确认...";
    
    try {
        const answer = JSON.parse(atob(code));
        await net.pc.setRemoteDescription(answer);
        $('err-msg').innerText = "正在建立连接...";
    } catch(e) {
        $('err-msg').innerText = "连接失败: " + e.message;
    }
};

function handleNetMsg(d) {
    try {
        const msg = JSON.parse(d);
        if(msg.t === 'init') createPlayer(msg.n);
        if(msg.t === 'pos') updatePlayer(msg.n, msg.p);
        if(msg.t === 'blk') updateBlock(msg.x, msg.y, msg.z, msg.v, false);
        if(msg.t === 'chat') addChatMsg(msg.n, msg.k);
    } catch(e){}
}

function sendNet(msg) {
    if(net.channel && net.channel.readyState === 'open') {
        net.channel.send(JSON.stringify(msg));
    }
}

// ================= 游戏核心 =================
function startGame() {
    $('menu').style.display = 'none';
    $('game-ui').style.display = 'block';
    initScene();
    anim();
}

function initScene() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    
    cam = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 200);
    ren = new THREE.WebGLRenderer({ antialias: true });
    ren.setSize(innerWidth, innerHeight);
    document.body.appendChild(ren.domElement);
    
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    scene.add(new THREE.DirectionalLight(0xffffff, 0.6)).position.set(50,100,50);

    // 实例化网格 (性能优化关键)
    const geo = new THREE.BoxGeometry(1,1,1);
    const mat = new THREE.MeshLambertMaterial({color: 0x5d9b41}); // 草地色
    const mesh = new THREE.InstancedMesh(geo, mat, 5000);
    scene.add(mesh);
    
    const matrix = new THREE.Matrix4();
    let idx = 0;
    
    // 生成地形
    for(let x=-10; x<=10; x++) {
        for(let z=-10; z<=10; z++) {
            let h = Math.floor(Math.sin(x*0.2)*Math.cos(z*0.2)*3 + 10);
            for(let y=0; y<=h; y++) {
                world[`${x},${y},${z}`] = 1;
                matrix.setPosition(x, y, z);
                mesh.setMatrixAt(idx++, matrix);
            }
        }
    }
    mesh.count = idx;
    mesh.instanceMatrix.needsUpdate = true;

    setupControls();
    setInterval(tick, 16);
}

function updateBlock(x,y,z,v, sync=true) {
    const k = `${x},${y},${z}`;
    if(v===0) delete world[k];
    else world[k] = v;
    
    // 暂时简单处理：加个新方块在上面 (实际项目应更新InstancedMesh的matrix)
    if(v !== 0) {
        const geo = new THREE.BoxGeometry(1,1,1);
        const mat = new THREE.MeshLambertMaterial({color: 0x8b5a2b}); // 泥土色
        const m = new THREE.Mesh(geo, mat);
        m.position.set(x,y,z);
        scene.add(m);
    }
    
    if(sync) sendNet({ t: 'blk', x, y, z, v });
}

function tick() {
    // 物理
    player.vel.y -= 0.015; // 重力
    player.pos.x += player.vel.x;
    player.pos.y += player.vel.y;
    player.pos.z += player.vel.z;
    
    // 碰撞检测 (脚底)
    const feetY = player.pos.y - 1.6;
    const key = `${Math.floor(player.pos.x)},${Math.floor(feetY)},${Math.floor(player.pos.z)}`;
    
    if(world[key]) {
        player.pos.y = Math.floor(feetY) + 2.6;
        player.vel.y = 0;
        player.ground = true;
    } else {
        player.ground = false;
    }
    
    player.vel.x *= 0.8;
    player.vel.z *= 0.8;
    
    // 网络同步
    if(Math.random() < 0.2) {
        sendNet({ t: 'pos', n: player.name, p: player.pos });
    }
}

// ================= 控制 =================
function setupControls() {
    if(isMob) setupTouch();
    else setupMouse();
}

function setupMouse() {
    document.addEventListener('click', () => ren.domElement.requestPointerLock());
    document.addEventListener('mousemove', e => {
        if(document.pointerLockElement) {
            player.yaw -= e.movementX * 0.002;
            player.pitch -= e.movementY * 0.002;
        }
    });
    window.addEventListener('keydown', e => {
        const s = 0.1;
        if(e.code === 'KeyW') { player.vel.x -= Math.sin(player.yaw)*s; player.vel.z -= Math.cos(player.yaw)*s; }
        if(e.code === 'KeyS') { player.vel.x += Math.sin(player.yaw)*s; player.vel.z += Math.cos(player.yaw)*s; }
        if(e.code === 'KeyA') { player.vel.x -= Math.cos(player.yaw)*s; player.vel.z += Math.sin(player.yaw)*s; }
        if(e.code === 'KeyD') { player.vel.x += Math.cos(player.yaw)*s; player.vel.z -= Math.sin(player.yaw)*s; }
        if(e.code === 'Space' && player.ground) player.vel.y = 0.2;
        
        // 聊天切换
        if(e.code === 'Enter') {
            const box = $('chat-input-box');
            const input = $('chat-input');
            if(box.style.display === 'block') {
                if(input.value) {
                    sendNet({ t: 'chat', n: player.name, k: input.value });
                    addChatMsg(player.name, input.value);
                    input.value = '';
                }
                box.style.display = 'none';
                ren.domElement.requestPointerLock();
            } else {
                box.style.display = 'block';
                input.focus();
                document.exitPointerLock();
            }
        }
    });
    document.addEventListener('mousedown', e => {
        if(document.pointerLockElement) hit(e.button===2);
    });
}

function setupTouch() {
    let sx=0, sy=0;
    const joy = $('joystick'), thumb = $('joy-thumb');
    
    $('touch-zone').ontouchstart = e => {
        sx = e.touches[0].clientX;
        sy = e.touches[0].clientY;
        joy.style.display = 'block';
        joy.style.left = sx + 'px';
        joy.style.top = sy + 'px';
        thumb.style.left = sx + 'px';
        thumb.style.top = sy + 'px';
    };
    $('touch-zone').ontouchmove = e => {
        const cx = e.touches[0].clientX;
        const cy = e.touches[0].clientY;
        const dx = cx - sx;
        const dy = cy - sy;
        const dist = Math.min(40, Math.hypot(dx, dy));
        const ang = Math.atan2(dy, dx);
        
        thumb.style.left = sx + Math.cos(ang)*dist + 'px';
        thumb.style.top = sy + Math.sin(ang)*dist + 'px';
        
        player.vel.x -= Math.cos(ang) * (dist/40) * 0.1;
        player.vel.z -= Math.sin(ang) * (dist/40) * 0.1;
    };
    $('touch-zone').ontouchend = () => joy.style.display = 'none';

    // 视角
    document.ontouchstart = e => { if(e.target.id.startsWith('act')) return; lastT = e.touches[0]; };
    document.ontouchmove = e => {
        if(e.target.id.startsWith('act')) return;
        if(!lastT) return;
        player.yaw -= (e.touches[0].clientX - lastT.clientX) * 0.005;
        player.pitch -= (e.touches[0].clientY - lastT.clientY) * 0.005;
        lastT = e.touches[0];
    };
    let lastT = null;

    $('act-jump').ontouchstart = () => { if(player.ground) player.vel.y = 0.2; };
    $('act-break').ontouchstart = () => hit(0);
    $('act-place').ontouchstart = () => hit(1);
}

function hit(place) {
    const dir = new THREE.Vector3(0,0,-1).applyEuler(new THREE.Euler(player.pitch, player.yaw, 0, 'YXZ'));
    const ray = new THREE.Raycaster(cam.position, dir, 0, 5);
    
    for(let k in world) {
        let [x,y,z] = k.split(',');
        // 简单盒子碰撞检测
        const box = new THREE.Box3(new THREE.Vector3(+x,+y,+z), new THREE.Vector3(+x+1,+y+1,+z+1));
        const hitp = ray.ray.intersectBox(box, new THREE.Vector3());
        if(hitp) {
            if(!place) updateBlock(+x,+y,+z, 0);
            else {
                const n = hitp.clone().sub(new THREE.Vector3(+x+0.5, +y+0.5, +z+0.5)).normalize();
                updateBlock(+x+Math.round(n.x), +y+Math.round(n.y), +z+Math.round(n.z), 1);
            }
            break;
        }
    }
}

function createPlayer(name) {
    if(peers[name]) return;
    const g = new THREE.Group();
    // 头
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.5), new THREE.MeshNormalMaterial());
    head.position.y = 1.5;
    g.add(head);
    // 身体
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.8,0.25), new THREE.MeshLambertMaterial({color: 0x00a}));
    body.position.y = 0.9;
    g.add(body);
    scene.add(g);
    peers[name] = g;
}

function updatePlayer(name, p) {
    if(!peers[name]) createPlayer(name);
    peers[name].position.set(p.x, p.y-1.5, p.z);
}

function addChatMsg(name, txt) {
    const d = document.createElement('div');
    d.className = 'msg';
    d.innerText = name + ": " + txt;
    $('chat-list').appendChild(d);
    setTimeout(() => d.remove(), 5000);
}

function anim() {
    requestAnimationFrame(anim);
    cam.position.set(player.pos.x, player.pos.y + 0.7, player.pos.z);
    cam.rotation.order = 'YXZ';
    cam.rotation.y = player.yaw;
    cam.rotation.x = player.pitch;
    ren.render(scene, cam);
}

window.onresize = () => {
    if(ren) {
        ren.setSize(innerWidth, innerHeight);
        cam.aspect = innerWidth/innerHeight;
        cam.updateProjectionMatrix();
    }
};
</script>
</body>
</html>
