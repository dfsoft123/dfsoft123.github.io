<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的世界 手机触屏版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
        body { overflow: hidden; font-family: 'Microsoft YaHei', sans-serif; background: #000; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; }

        /* 准星 */
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; pointer-events: none; z-index: 10; opacity: 0.7; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #fff; box-shadow: 0 0 2px #000; }
        #crosshair::before { width: 2px; height: 100%; left: 11px; }
        #crosshair::after { width: 100%; height: 2px; top: 11px; }

        /* UI 通用 */
        .ui-layer { position: absolute; z-index: 20; pointer-events: none; }
        .btn { pointer-events: auto; background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.3); color: #fff; display: flex; justify-content: center; align-items: center; border-radius: 8px; font-weight: bold; backdrop-filter: blur(2px); }

        /* 左侧摇杆 */
        #joystick-zone { position: absolute; bottom: 0; left: 0; width: 40%; height: 50%; z-index: 15; }
        #joystick-base { position: absolute; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); pointer-events: none; display: none; }
        #joystick-thumb { position: absolute; width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.4); border: 2px solid #fff; pointer-events: none; display: none; }

        /* 右侧按钮 */
        #action-buttons { bottom: 30px; right: 30px; width: 180px; height: 180px; }
        .action-btn { position: absolute; width: 70px; height: 70px; font-size: 24px; }
        #btn-jump { right: 0; bottom: 50px; }
        #btn-up { right: 80px; bottom: 110px; width: 50px; height: 50px; font-size: 18px; display: none; }
        #btn-down { right: 80px; bottom: 20px; width: 50px; height: 50px; font-size: 18px; display: none; }

        /* 中心破坏/放置按钮(隐形区域) */
        #break-btn { top: 30%; left: 50%; transform: translateX(-50%); width: 120px; height: 120px; background: rgba(255,0,0,0.1); border: 2px solid rgba(255,0,0,0.3); border-radius: 50%; font-size: 12px; pointer-events: auto; }
        #place-btn { top: 30%; left: 35%; width: 100px; height: 100px; background: rgba(0,128,255,0.1); border: 2px solid rgba(0,128,255,0.3); border-radius: 50%; font-size: 12px; pointer-events: auto; }

        /* 顶部信息 */
        #top-bar { top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: center; }
        #dim-info { background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 4px; color: #fff; font-size: 14px; pointer-events: auto; }
        #menu-btn { width: 40px; height: 40px; background: rgba(0,0,0,0.6); border-radius: 4px; color: #fff; font-size: 20px; pointer-events: auto; display: flex; justify-content: center; align-items: center; }

        /* 物品栏 */
        #hotbar { bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.6); padding: 4px; border-radius: 6px; border: 2px solid rgba(255,255,255,0.2); }
        .slot { width: 45px; height: 45px; margin: 0 2px; border: 2px solid #333; background: rgba(100,100,100,0.2); display: flex; justify-content: center; align-items: center; position: relative; pointer-events: auto; }
        .slot.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.5); }
        .slot-icon { width: 30px; height: 30px; border-radius: 2px; }
        .slot-count { position: absolute; bottom: 0; right: 3px; color: #fff; font-size: 12px; text-shadow: 1px 1px 1px #000; }
        .slot-id { position: absolute; top: 0; left: 2px; color: rgba(255,255,255,0.5); font-size: 8px; }

        /* 菜单 */
        #menu-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; background: rgba(30,30,30,0.95); border: 2px solid #888; border-radius: 10px; z-index: 50; padding: 20px; display: none; color: #fff; text-align: center; }
        #menu-panel.active { display: block; }
        .menu-btn { width: 100%; padding: 12px; margin: 8px 0; background: #444; border: 1px solid #888; color: #fff; font-size: 16px; border-radius: 6px; cursor: pointer; }
        .menu-btn:active { background: #555; }
        
        /* 提示 */
        #toast { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 4px; z-index: 100; display: none; font-size: 14px; }
    </style>
</head>
<body>
    <div id="crosshair"></div>

    <!-- 顶部UI -->
    <div id="top-bar" class="ui-layer">
        <div id="dim-info">主世界 | 生存</div>
        <div id="menu-btn" class="btn">≡</div>
    </div>

    <!-- 触屏操作区 -->
    <div id="joystick-zone"></div>
    <div id="joystick-base"></div>
    <div id="joystick-thumb"></div>

    <div id="action-buttons" class="ui-layer">
        <div id="btn-jump" class="btn action-btn">跳</div>
        <div id="btn-up" class="btn action-btn">↑</div>
        <div id="btn-down" class="btn action-btn">↓</div>
    </div>

    <div id="break-btn" class="btn ui-layer">破坏(按住)</div>
    <div id="place-btn" class="btn ui-layer">放置</div>

    <!-- 物品栏 -->
    <div id="hotbar" class="ui-layer"></div>

    <!-- 菜单 -->
    <div id="menu-panel">
        <h3 style="margin-bottom:15px;">菜单</h3>
        <button class="menu-btn" onclick="toggleMode()">切换 创造/生存</button>
        <button class="menu-btn" onclick="teleport('nether')">前往下界 (需在传送门)</button>
        <button class="menu-btn" onclick="teleport('end')">前往末地</button>
        <button class="menu-btn" onclick="teleport('overworld')">返回主世界</button>
        <button class="menu-btn" onclick="document.getElementById('menu-panel').classList.remove('active')">关闭</button>
    </div>

    <div id="toast"></div>

    <!-- Three.js Import -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';

    // ================= 游戏状态 =================
    let scene, camera, renderer, raycaster;
    let blocks = new Map();
    let worldGroup = new THREE.Group();
    let player = {
        mode: 'survival',
        health: 20,
        flying: false,
        velocity: new THREE.Vector3(0, 0, 0),
        onGround: false,
        dimension: 'overworld',
        hotbar: [1, 4, 17, 9, 10, 11, 12, 27, 28], // 最后两个是打火石和末影之眼
        hotbarCount: [64, 64, 64, 64, 64, 1, 1, 1, 1],
        selectedSlot: 0,
        pitch: 0, // 俯仰角
        yaw: 0    // 偏航角
    };

    // 方块定义
    const BLOCKS = {
        0: { name: "空气", color: 0x000000, passable: true },
        1: { name: "草", color: 0x55aa55 },
        2: { name: "泥土", color: 0x886644 },
        3: { name: "石头", color: 0x888888 },
        4: { name: "原木", color: 0x664422 },
        5: { name: "树叶", color: 0x338833 },
        6: { name: "沙子", color: 0xddcc88 },
        7: { name: "水", color: 0x3366cc, passable: true },
        8: { name: "基岩", color: 0x333333 },
        9: { name: "圆石", color: 0x777777 },
        10:{ name: "木板", color: 0xaa8855 },
        11:{ name: "工作台", color: 0xaa7744 },
        12:{ name: "熔炉", color: 0x666666 },
        13:{ name: "煤矿", color: 0x444444 },
        14:{ name: "铁矿", color: 0xddaa88 },
        15:{ name: "金矿", color: 0xffdd44 },
        16:{ name: "钻石", color: 0x44ffdd },
        17:{ name: "黑曜石", color: 0x111122 },
        18:{ name: "下界岩", color: 0x551111 },
        19:{ name: "下界砖", color: 0x331111 },
        20:{ name: "岩浆", color: 0xff5500, passable: true },
        21:{ name: "灵魂沙", color: 0x443322 },
        22:{ name: "荧石", color: 0xffff88 },
        23:{ name: "末地石", color: 0xddddaa },
        24:{ name: "紫珀块", color: 0x9966aa },
        25:{ name: "末地门框", color: 0x116611 },
        26:{ name: "末地门", color: 0x000000, passable: true },
        27:{ name: "打火石", color: 0xffffff, isTool: true },
        28:{ name: "末影眼", color: 0x33ff66, isTool: true }
    };

    // 柏林噪声
    class Noise {
        constructor(seed=1) { this.seed = seed; this.p = []; this.init(); }
        init() { for(let i=0; i<256; i++) this.p[i] = i; for(let i=255; i>0; i--) { const n = Math.floor((Math.sin(i * this.seed) + 1) * 10000) % (i + 1); [this.p[i], this.p[n]] = [this.p[n], this.p[i]]; } for(let i=0; i<256; i++) this.p[i+256] = this.p[i]; }
        fade(t) { return t*t*t*(t*(t*6-15)+10); }
        lerp(t,a,b) { return a+t*(b-a); }
        grad(hash,x,y) { const h = hash & 3; const u = h<2 ? x : y; const v = h<2 ? y : x; return ((h&1)?-u:u) + ((h&2)?-v:v); }
        noise(x,y) { const X = Math.floor(x) & 255, Y = Math.floor(y) & 255; x -= Math.floor(x); y -= Math.floor(y); const u = this.fade(x), v = this.fade(y); const A = this.p[X]+Y, B = this.p[X+1]+Y; return this.lerp(v, this.lerp(u, this.grad(this.p[A], x, y), this.grad(this.p[B], x-1, y)), this.lerp(u, this.grad(this.p[A+1], x, y-1), this.grad(this.p[B+1], x-1, y-1))); }
    }
    let nT = new Noise(Math.random()*100);
    let nTr = new Noise(Math.random()*200);
    let nO = new Noise(Math.random()*300);

    // ================= 初始化 =================
    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 10, 40);
        
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 200);
        camera.position.set(0, 35, 0);
        
        renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' }); // 手机关闭抗锯齿提升性能
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);
        
        scene.add(worldGroup);
        const ambient = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(50, 100, 50);
        scene.add(dirLight);

        raycaster = new THREE.Raycaster();
        raycaster.far = 6; // 限制破坏距离

        // 初始地形
        for(let x=-2; x<=2; x++) for(let z=-2; z<=2; z++) generateChunk(x, z, 'overworld');

        setupUI();
        bindTouchEvents();
        animate();
    }

    // ================= 地形生成 =================
    function generateChunk(cx, cz, dim) {
        for(let x = cx*8; x < cx*8+8; x++) {
            for(let z = cz*8; z < cz*8+8; z++) {
                if(dim === 'overworld') {
                    const h = Math.floor(nT.noise(x/30, z/30) * 10 + 20);
                    for(let y=0; y<=h; y++) {
                        if(y===0) setBlock(x,y,z,8);
                        else if(y===h) setBlock(x,y,z,1);
                        else if(y>h-3) setBlock(x,y,z,2);
                        else {
                            let o = nO.noise(x/5, y/5);
                            if(y<8 && o>0.4) setBlock(x,y,z,16);
                            else if(y<15 && o>0.35) setBlock(x,y,z,15);
                            else setBlock(x,y,z,3);
                        }
                    }
                    if(nTr.noise(x, z) > 0.85 && h > 15) {
                        for(let i=1; i<=4; i++) setBlock(x, h+i, z, 4);
                        setBlock(x, h+5, z, 5);
                        setBlock(x+1, h+4, z, 5); setBlock(x-1, h+4, z, 5);
                        setBlock(x, h+4, z+1, 5); setBlock(x, h+4, z-1, 5);
                    }
                } else if(dim === 'nether') {
                    for(let y=0; y<40; y++) {
                        if(y===0) setBlock(x,y,z,8);
                        else if(y < 10 + nT.noise(x/10, z/10)*5) setBlock(x,y,z,18);
                        else if(y < 12 && Math.random()<0.1) setBlock(x,y,z,20);
                        if(y > 35 - nT.noise(x/10, z/10)*5) setBlock(x,y,z,18);
                    }
                } else if(dim === 'end') {
                    const dist = Math.sqrt(x*x + z*z);
                    if(dist < 10 || Math.random() < 0.05) {
                        const h = Math.floor(nT.noise(x/20, z/20) * 5 + 20);
                        for(let y=0; y<h; y++) setBlock(x,y,z,23);
                        if(Math.abs(x)<=3 && Math.abs(z)<=3 && dist < 4) {
                            if(Math.abs(x)==3 || Math.abs(z)==3) setBlock(x, h, z, 25);
                            else if(dist < 3) setBlock(x, h, z, 26);
                        }
                    }
                }
            }
        }
    }

    function setBlock(x, y, z, id) {
        const key = `${x},${y},${z}`;
        if(id === 0) {
            if(blocks.has(key)) {
                worldGroup.remove(blocks.get(key).mesh);
                blocks.delete(key);
            }
            return;
        }
        if(blocks.has(key)) return;
        const geom = new THREE.BoxGeometry(1, 1, 1);
        const mat = new THREE.MeshLambertMaterial({ color: BLOCKS[id].color });
        const mesh = new THREE.Mesh(geom, mat);
        mesh.position.set(x, y, z);
        mesh.userData = { x, y, z, type: id };
        worldGroup.add(mesh);
        blocks.set(key, { type: id, mesh });
    }

    function getBlock(x, y, z) {
        return blocks.has(`${x},${y},${z}`) ? blocks.get(`${x},${y},${z}`).type : 0;
    }

    // ================= 方块交互 =================
    function breakBlock() {
        // 从屏幕中心发射射线
        raycaster.setFromCamera({x: 0, y: 0}, camera);
        const intersects = raycaster.intersectObjects(worldGroup.children);
        if(intersects.length > 0) {
            const obj = intersects[0].object;
            const {x, y, z, type} = obj.userData;
            if(type === 8 && player.mode === 'survival') return showToast("基岩无法破坏");
            setBlock(x, y, z, 0);
            if(player.mode === 'survival') addItem(type, 1);
        }
    }

    function placeBlock() {
        raycaster.setFromCamera({x: 0, y: 0}, camera);
        const intersects = raycaster.intersectObjects(worldGroup.children);
        if(intersects.length > 0) {
            const point = intersects[0].point;
            const normal = intersects[0].face.normal;
            const px = Math.floor(point.x + normal.x * 0.5);
            const py = Math.floor(point.y + normal.y * 0.5);
            const pz = Math.floor(point.z + normal.z * 0.5);
            const id = player.hotbar[player.selectedSlot];
            
            if(id === 0) return;
            if(BLOCKS[id].isTool) {
                if(id === 27 && getBlock(px,py,pz) === 17) { // 打火石点黑曜石
                    for(let i=1;i<=3;i++) if(getBlock(px,py+i,pz)===0) setBlock(px,py+i,pz,20); // 点燃
                    showToast("传送门已激活,去菜单前往下界");
                }
                if(id === 28) showToast("末影之眼颤动... 去菜单前往末地");
                return;
            }
            
            if(getBlock(px,py,pz) === 0) {
                setBlock(px, py, pz, id);
                if(player.mode === 'survival') consumeSelected();
            }
        }
    }

    function addItem(id, count) {
        for(let i=0; i<9; i++) {
            if(player.hotbar[i] === id && player.hotbarCount[i] < 64) { player.hotbarCount[i] += count; return updateUI(); }
        }
        for(let i=0; i<9; i++) {
            if(player.hotbar[i] === 0) { player.hotbar[i] = id; player.hotbarCount[i] = count; return updateUI(); }
        }
    }
    function consumeSelected() { player.hotbarCount[player.selectedSlot]--; if(player.hotbarCount[player.selectedSlot] <= 0) player.hotbar[player.selectedSlot] = 0; updateUI(); }

    // ================= 维度切换 =================
    window.teleport = function(dim) {
        player.dimension = dim;
        while(worldGroup.children.length > 0) worldGroup.remove(worldGroup.children[0]);
        blocks.clear();
        if(dim === 'overworld') { scene.background = new THREE.Color(0x87CEEB); scene.fog.color = new THREE.Color(0x87CEEB); camera.position.set(0, 35, 0); }
        if(dim === 'nether') { scene.background = new THREE.Color(0x550000); scene.fog.color = new THREE.Color(0x550000); camera.position.set(0, 45, 0); }
        if(dim === 'end') { scene.background = new THREE.Color(0x000000); scene.fog.color = new THREE.Color(0x000000); camera.position.set(0, 30, 0); }
        for(let x=-2; x<=2; x++) for(let z=-2; z<=2; z++) generateChunk(x, z, dim);
        document.getElementById('dim-info').innerText = `${dim === 'overworld' ? '主世界' : dim === 'nether' ? '下界' : '末地'} | ${player.mode === 'survival' ? '生存' : '创造'}`;
    }

    window.toggleMode = function() {
        player.mode = player.mode === 'survival' ? 'creative' : 'survival';
        player.flying = player.mode === 'creative';
        document.getElementById('btn-up').style.display = player.flying ? 'flex' : 'none';
        document.getElementById('btn-down').style.display = player.flying ? 'flex' : 'none';
        document.getElementById('btn-jump').style.display = player.flying ? 'none' : 'flex';
        document.getElementById('dim-info').innerText = `${player.dimension === 'overworld' ? '主世界' : player.dimension === 'nether' ? '下界' : '末地'} | ${player.mode === 'survival' ? '生存' : '创造'}`;
        showToast(`已切换为${player.mode === 'survival' ? '生存' : '创造'}模式`);
    }

    // ================= UI 设置 =================
    function setupUI() {
        const hotbar = document.getElementById('hotbar');
        for(let i=0; i<9; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot' + (i === 0 ? ' active' : '');
            slot.dataset.idx = i;
            slot.innerHTML = `<span class="slot-id">${i+1}</span><div class="slot-icon"></div><div class="slot-count"></div>`;
            slot.ontouchstart = (e) => { e.preventDefault(); player.selectedSlot = i; updateUI(); };
            hotbar.appendChild(slot);
        }
        updateUI();
    }

    function updateUI() {
        document.querySelectorAll('#hotbar .slot').forEach((slot, i) => {
            slot.classList.toggle('active', i === player.selectedSlot);
            const id = player.hotbar[i];
            const count = player.hotbarCount[i];
            const icon = slot.querySelector('.slot-icon');
            const ct = slot.querySelector('.slot-count');
            if(id !== 0) {
                icon.style.background = `#${BLOCKS[id].color.toString(16).padStart(6,'0')}`;
                icon.style.border = '1px solid rgba(0,0,0,0.3)';
                ct.innerText = count > 1 ? count : '';
            } else {
                icon.style.background = 'transparent';
                icon.style.border = 'none';
                ct.innerText = '';
            }
        });
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        clearTimeout(window._toastTimer);
        window._toastTimer = setTimeout(() => t.style.display = 'none', 2000);
    }

    // ================= 触屏控制 =================
    let touchState = { move: {active: false, startX: 0, startY: 0, dx: 0, dy: 0}, look: {active: false, lastX: 0, lastY: 0}, breaking: false };
    
    function bindTouchEvents() {
        const jZone = document.getElementById('joystick-zone');
        const jBase = document.getElementById('joystick-base');
        const jThumb = document.getElementById('joystick-thumb');

        // 左半屏移动摇杆
        jZone.ontouchstart = (e) => {
            e.preventDefault();
            const t = e.touches[0];
            touchState.move.active = true;
            touchState.move.startX = t.clientX;
            touchState.move.startY = t.clientY;
            jBase.style.display = 'block';
            jThumb.style.display = 'block';
            jBase.style.left = (t.clientX - 60) + 'px';
            jBase.style.top = (t.clientY - 60) + 'px';
            jThumb.style.left = (t.clientX - 30) + 'px';
            jThumb.style.top = (t.clientY - 30) + 'px';
        };
        jZone.ontouchmove = (e) => {
            e.preventDefault();
            if(!touchState.move.active) return;
            const t = e.touches[0];
            let dx = t.clientX - touchState.move.startX;
            let dy = t.clientY - touchState.move.startY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist > 50) { dx = (dx/dist)*50; dy = (dy/dist)*50; }
            jThumb.style.left = (touchState.move.startX + dx - 30) + 'px';
            jThumb.style.top = (touchState.move.startY + dy - 30) + 'px';
            touchState.move.dx = dx / 50;
            touchState.move.dy = dy / 50;
        };
        jZone.ontouchend = (e) => {
            touchState.move.active = false;
            touchState.move.dx = 0; touchState.move.dy = 0;
            jBase.style.display = 'none';
            jThumb.style.display = 'none';
        };

        // 右半屏视角控制 (利用屏幕右半侧空白区域)
        document.ontouchstart = (e) => {
            for(let i=0; i<e.touches.length; i++) {
                const t = e.touches[i];
                if(t.clientX > window.innerWidth * 0.4 && t.clientY < window.innerHeight * 0.7) {
                    if(e.target === document.body || e.target === renderer.domElement) {
                        touchState.look.active = true;
                        touchState.look.lastX = t.clientX;
                        touchState.look.lastY = t.clientY;
                    }
                }
            }
        };
        document.ontouchmove = (e) => {
            for(let i=0; i<e.touches.length; i++) {
                const t = e.touches[i];
                if(touchState.look.active && t.clientX > window.innerWidth * 0.4) {
                    const dx = t.clientX - touchState.look.lastX;
                    const dy = t.clientY - touchState.look.lastY;
                    player.yaw -= dx * 0.005;
                    player.pitch -= dy * 0.005;
                    player.pitch = Math.max(-Math.PI/2+0.1, Math.min(Math.PI/2-0.1, player.pitch));
                    touchState.look.lastX = t.clientX;
                    touchState.look.lastY = t.clientY;
                }
            }
        };
        document.ontouchend = (e) => {
            if(e.touches.length === 0) touchState.look.active = false;
        };

        // 跳跃/飞行按钮
        const bindBtn = (id, action, isHold) => {
            const btn = document.getElementById(id);
            btn.ontouchstart = (e) => { e.preventDefault(); if(isHold) keys[action] = true; else action(); };
            btn.ontouchend = (e) => { e.preventDefault(); if(isHold) keys[action] = false; };
        };
        bindBtn('btn-jump', () => { if(player.onGround) player.velocity.y = 0.3; }, false);
        bindBtn('btn-up', 'KeySpace', true); // 飞行上升
        bindBtn('btn-down', 'KeyShift', true); // 飞行下降

        // 破坏与放置
        document.getElementById('break-btn').ontouchstart = (e) => { e.preventDefault(); touchState.breaking = true; breakBlock(); };
        document.getElementById('break-btn').ontouchend = (e) => { touchState.breaking = false; };
        document.getElementById('place-btn').ontouchstart = (e) => { e.preventDefault(); placeBlock(); };

        // 菜单
        document.getElementById('menu-btn').ontouchstart = (e) => {
            e.preventDefault();
            document.getElementById('menu-panel').classList.toggle('active');
        };
    }

    const keys = {};
    // ================= 物理与更新 =================
    function updatePhysics() {
        // 更新摄像机旋转
        camera.rotation.order = 'YXZ';
        camera.rotation.y = player.yaw;
        camera.rotation.x = player.pitch;

        const pos = camera.position;
        const vel = player.velocity;
        
        if(!player.flying) vel.y -= 0.015; // 重力

        // 摇杆移动
        let forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
        forward.y = 0; forward.normalize();
        let right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
        right.y = 0; right.normalize();
        
        let move = new THREE.Vector3();
        if(touchState.move.active) {
            move.add(forward.clone().multiplyScalar(-touchState.move.dy)); // 摇杆上推前进
            move.add(right.clone().multiplyScalar(touchState.move.dx));    // 摇杆右推右移
        }
        if(move.length() > 0) move.normalize().multiplyScalar(0.12);
        
        pos.x += move.x;
        pos.z += move.z;
        
        // 飞行控制
        if(player.flying) {
            if(keys['KeySpace']) vel.y = 0.15;
            else if(keys['KeyShift']) vel.y = -0.15;
            else vel.y = 0;
        }

        pos.y += vel.y;
        if(!player.flying) vel.y *= 0.98;

        // 简单碰撞
        const fx = Math.floor(pos.x), fz = Math.floor(pos.z);
        const fy = Math.floor(pos.y - 1.6); // 脚下
        if(getBlock(fx, fy, fz) !== 0 && !BLOCKS[getBlock(fx,fy,fz)].passable) {
            pos.y = fy + 1 + 1.6;
            vel.y = 0;
            player.onGround = true;
        } else {
            player.onGround = false;
        }
        
        if(pos.y < -50) pos.set(0, 40, 0); // 掉虚空重置
    }

    function animate() {
        requestAnimationFrame(animate);
        updatePhysics();
        
        // 持续破坏(每10帧破坏一次)
        if(touchState.breaking && frameCount % 10 === 0) breakBlock();
        frameCount++;
        
        renderer.render(scene, camera);
    }
    let frameCount = 0;

    // 窗口缩放
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
    </script>
</body>
</html>
