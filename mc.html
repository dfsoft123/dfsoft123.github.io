<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的世界 联机版 (修复版)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; }
        body { overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #fff; }
        canvas { display: block; position: absolute; top: 0; left: 0; }

        /* 菜单界面 */
        #lobby { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .panel { background: #222; padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; box-shadow: 0 0 20px #000; text-align: center; margin-bottom: 10px; }
        h1 { color: #5d9b41; margin-bottom: 5px; font-size: 20px; }
        .sub { color: #888; font-size: 12px; margin-bottom: 15px; }
        
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; background: #333; border: 1px solid #444; color: #fff; border-radius: 4px; font-size: 14px; }
        textarea { height: 80px; resize: none; font-family: monospace; font-size: 10px; word-break: break-all; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: #4a9a4a; border: none; color: #fff; font-weight: bold; border-radius: 4px; cursor: pointer; }
        button:active { background: #3a8a3a; }
        button.secondary { background: #555; }
        button.warning { background: #994411; }
        
        #status-msg { margin-top: 10px; color: #ffa; font-size: 12px; min-height: 20px; }
        
        /* 游戏界面 */
        #game-ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; opacity: 0.8; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #fff; }
        #crosshair::before { width: 2px; height: 100%; left: 11px; }
        #crosshair::after { width: 100%; height: 2px; top: 11px; }

        #chat-container { position: absolute; bottom: 60px; left: 10px; width: 40%; height: 200px; display: flex; flex-direction: column-reverse; }
        .chat-msg { background: rgba(0,0,0,0.5); color: #fff; padding: 4px 8px; margin-bottom: 2px; border-radius: 4px; font-size: 12px; }
        #chat-input-box { position: absolute; bottom: 0; left: 0; width: 100%; display: none; pointer-events: auto; }
        #chat-input { width: 100%; background: rgba(0,0,0,0.8); border: none; padding: 10px; color: #fff; outline: none; }

        #info-board { position: absolute; top: 10px; left: 10px; font-size: 12px; color: #fff; text-shadow: 1px 1px 2px #000; }

        .touch-zone { position: absolute; z-index: 20; }
        #joystick-zone { bottom: 0; left: 0; width: 35%; height: 40%; }
        #joystick-base { position: absolute; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); display: none; transform: translate(-50%, -50%); pointer-events: none; }
        #joystick-thumb { position: absolute; width: 40px; height: 40px; background: rgba(255,255,255,0.4); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        
        #action-zone { bottom: 0; right: 0; width: 40%; height: 40%; pointer-events: auto; display: flex; flex-wrap: wrap; align-items: flex-end; justify-content: flex-end; padding: 20px; }
        .v-btn { width: 55px; height: 55px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; margin: 5px; border: 2px solid rgba(255,255,255,0.3); color: #fff; font-size: 12px; }
        
        #look-zone { position: absolute; top: 0; right: 0; width: 60%; height: 70%; z-index: 5; }

        #hotbar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.4); border-radius: 4px; pointer-events: auto; }
        .slot { width: 40px; height: 40px; border: 2px solid #555; margin: 2px; background: rgba(0,0,0,0.2); display: flex; justify-content: center; align-items: center; }
        .slot.active { border-color: #fff; }
    </style>
</head>
<body>

<!-- 大厅 -->
<div id="lobby">
    <div class="panel">
        <h1>我的世界 联机版</h1>
        <div class="sub">若点击无反应，请使用手动模式</div>
        
        <input type="text" id="input-name" placeholder="输入你的昵称" maxlength="10">
        
        <!-- 自动模式 -->
        <button id="btn-auto-create">自动创建房间 (需网络良好)</button>
        <div id="auto-room-info" style="display:none; margin-top:10px;">
            <div style="font-size:12px; color:#888;">房间号:</div>
            <div id="room-id" style="font-size:18px; color:#4a4; font-weight:bold; padding:10px; background:#000; border-radius:4px;">...</div>
            <button class="secondary" style="margin-top:5px;" onclick="navigator.clipboard.writeText($('room-id').innerText).then(()=>alert('已复制'))">复制房间号</button>
        </div>
        <input type="text" id="input-join-auto" placeholder="输入房间号 (自动模式)">
        <button id="btn-auto-join">自动加入房间</button>
        
        <div style="margin: 15px 0; border-bottom: 1px solid #444;"></div>

        <!-- 手动模式 (保底) -->
        <div class="sub" style="color:#ffa">手动模式 (适合网络受限环境)</div>
        <button class="warning" id="btn-manual-start">开启手动模式 (主机点此)</button>
        
        <div id="manual-ui" style="display:none; width:100%;">
            <textarea id="manual-code-out" readonly placeholder="生成的交换码..."></textarea>
            <button class="secondary" onclick="navigator.clipboard.writeText($('manual-code-out').value).then(()=>alert('已复制'))">复制并告诉好友</button>
            
            <div style="margin:5px 0;"></div>
            <textarea id="manual-code-in" placeholder="在此粘贴好友的交换码"></textarea>
            <button id="btn-manual-connect">确认连接</button>
        </div>
    </div>
    <div id="status-msg"></div>
</div>

<!-- 游戏界面 -->
<div id="game-ui">
    <div id="crosshair"></div>
    <div id="info-board"></div>
    
    <div id="chat-container">
        <div id="chat-messages"></div>
        <div id="chat-input-box"><input type="text" id="chat-input" placeholder="按回车发送..."></div>
    </div>

    <div id="look-zone" class="touch-zone"></div>
    <div id="joystick-zone" class="touch-zone">
        <div id="joystick-base"></div>
        <div id="joystick-thumb"></div>
    </div>
    <div id="action-zone" class="touch-zone">
        <div class="v-btn" id="btn-chat">聊天</div>
        <div class="v-btn" id="btn-jump">跳跃</div>
        <div class="v-btn" id="btn-break">挖</div>
        <div class="v-btn" id="btn-place">放</div>
    </div>

    <div id="hotbar"></div>
</div>

<!-- 引入必要的库 -->
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/build/three.module.js" type="module"></script>

<script type="module">
import * as THREE from 'three';

const $ = id => document.getElementById(id);
const isMobile = /Mobile|Android|iPhone/i.test(navigator.userAgent);

// ================= 核心变量 =================
let scene, camera, renderer;
let world = {};
let player = {
    name: "玩家",
    pos: new THREE.Vector3(0, 40, 0),
    vel: new THREE.Vector3(),
    yaw: 0, pitch: 0,
    onGround: false,
    selected: 1
};
let keys = {};
let net = {
    peer: null,
    cons: [], // 连接列表
    isHost: false,
    id: null,
    players: {} // 其他玩家模型
};

// 纹理生成
function makeTex(col) { const c=document.createElement('canvas');c.width=16;c.height=16;const x=c.getContext('2d');x.fillStyle=col;x.fillRect(0,0,16,16);x.fillStyle='rgba(0,0,0,0.2)';for(let i=0;i<20;i++)x.fillRect(Math.random()*16,Math.random()*16,2,2); return new THREE.CanvasTexture(c); }
const TEX = { 1: makeTex('#5d9b41'), 2: makeTex('#8b5a2b'), 3: makeTex('#888'), 8: makeTex('#333') };
const MAT = { 1: new THREE.MeshLambertMaterial({map: TEX[1]}), 2: new THREE.MeshLambertMaterial({map: TEX[2]}), 3: new THREE.MeshLambertMaterial({map: TEX[3]}) };

// ================= 联机逻辑 =================

// 通用连接处理
function setupConn(conn) {
    conn.on('open', () => {
        log("有玩家加入！");
        // 发送自己的信息
        conn.send({ t: 'init', id: net.id || 'host', name: player.name });
        
        // 如果是主机，把新人的信息广播给其他人，并把其他人的信息发给新人
        if(net.isHost) {
            net.cons.forEach(c => {
                if(c !== conn && c.open) {
                    c.send({ t: 'new_player', id: conn.peer, name: conn.metadata ? conn.metadata.name : 'player' });
                    conn.send({ t: 'new_player', id: c.peer, name: c.metadata ? c.metadata.name : 'player' });
                }
            });
        }
    });
    
    conn.on('data', data => handleData(data, conn));
    conn.on('close', () => {
        if(net.players[conn.peer]) {
            scene.remove(net.players[conn.peer].mesh);
            delete net.players[conn.peer];
        }
        net.cons = net.cons.filter(c => c !== conn);
    });
}

function handleData(data, conn) {
    // 主机收到消息，转发给其他人
    if(net.isHost) {
        net.cons.forEach(c => { if(c !== conn && c.open) c.send(data); });
    }

    if(data.t === 'init') {
        createRemotePlayer(data.id, data.name);
    }
    else if(data.t === 'new_player') {
        createRemotePlayer(data.id, data.name);
    }
    else if(data.t === 'pos') {
        updateRemotePlayer(data.id, data);
    }
    else if(data.t === 'chat') {
        addChatMsg(data.name, data.text);
    }
    else if(data.t === 'block') {
        updateBlock(data.x, data.y, data.z, data.type, false);
    }
}

function broadcast(msg) {
    if(net.isHost) {
        net.cons.forEach(c => { if(c.open) c.send(msg); });
    } else if(net.cons[0] && net.cons[0].open) {
        net.cons[0].send(msg);
    }
}

function log(msg) { $('status-msg').innerText = msg; console.log(msg); }

// --- 自动模式 ---
$('btn-auto-create').onclick = () => {
    player.name = $('input-name').value || "主机";
    log("正在连接公共服务器...");
    if(!window.Peer) return log("错误：网络库加载失败，请刷新或检查网络");

    net.peer = new Peer();
    net.peer.on('open', id => {
        net.isHost = true;
        net.id = id;
        $('auto-room-info').style.display = 'block';
        $('room-id').innerText = id;
        log("房间创建成功！");
    });
    net.peer.on('connection', c => setupConn(c));
    net.peer.on('error', err => {
        log("自动模式失败: "+err.type+"。请尝试手动模式！");
        alert("连接失败，请使用界面下方的【手动模式】");
    });
};

$('btn-auto-join').onclick = () => {
    player.name = $('input-name').value || "客机";
    const rid = $('input-join-auto').value.trim();
    if(!rid) return log("请输入房间号");
    log("正在连接...");
    if(!window.Peer) return log("错误：网络库加载失败");

    net.peer = new Peer();
    net.peer.on('open', () => {
        const conn = net.peer.connect(rid, { reliable: true, metadata: { name: player.name } });
        setupConn(conn);
        net.cons = [conn];
    });
    net.peer.on('error', err => {
        log("连接失败: "+err.type+"。请尝试手动模式！");
        alert("连接失败，请使用界面下方的【手动模式】");
    });
};

// --- 手动模式 (支持多人，星型拓扑) ---
let manualPC = null;
let manualChannel = null;
let manualStep = 0; // 0:idle, 1:offer created, 2:answer created

$('btn-manual-start').onclick = async () => {
    player.name = $('input-name').value || "主机";
    net.isHost = true;
    log("手动模式：正在生成邀请码...");
    
    manualPC = new RTCPeerConnection({ iceServers: [{urls: 'stun:stun.l.google.com:19302'}] });
    manualChannel = manualPC.createDataChannel('game');
    
    // 监听连接
    manualChannel.onopen = () => {
        log("连接成功！");
        startGame();
        // 把这个连接加入管理
        net.cons.push({ send: msg => manualChannel.send(JSON.stringify(msg)), open: true, peer: 'manual_1' });
        // 发送初始化信息
        manualChannel.send(JSON.stringify({ t: 'init', id: 'host', name: player.name }));
    };
    manualChannel.onmessage = e => handleData(JSON.parse(e.data), {peer: 'manual_1'});

    manualPC.onicecandidate = () => {};
    const offer = await manualPC.createOffer();
    await manualPC.setLocalDescription(offer);
    
    // 等待5秒收集ICE
    await new Promise(r => setTimeout(r, 5000));
    
    $('manual-ui').style.display = 'block';
    $('manual-code-out').value = btoa(JSON.stringify(manualPC.localDescription));
    log("邀请码已生成，请复制发给好友。");
};

// 客机处理
$('btn-manual-connect').onclick = async () => {
    const code = $('manual-code-in').value.trim();
    if(!code) return alert("请粘贴交换码");
    
    // 如果是客机，还没有创建PC
    if(!manualPC) {
        player.name = $('input-name').value || "客机";
        net.isHost = false;
        manualPC = new RTCPeerConnection({ iceServers: [{urls: 'stun:stun.l.google.com:19302'}] });
        manualPC.ondatachannel = e => {
            manualChannel = e.channel;
            manualChannel.onopen = () => {
                log("连接成功！");
                startGame();
                net.cons.push({ send: msg => manualChannel.send(JSON.stringify(msg)), open: true, peer: 'host' });
                manualChannel.send(JSON.stringify({ t: 'init', id: 'client', name: player.name }));
            };
            manualChannel.onmessage = ev => handleData(JSON.parse(ev.data), {peer: 'host'});
        };
    }

    try {
        const sd = JSON.parse(atob(code));
        await manualPC.setRemoteDescription(sd);
        
        // 如果收到的是offer，就创建answer
        if(sd.type === 'offer') {
            const answer = await manualPC.createAnswer();
            await manualPC.setLocalDescription(answer);
            await new Promise(r => setTimeout(r, 5000));
            $('manual-code-out').value = btoa(JSON.stringify(manualPC.localDescription));
            log("回执已生成，请复制发回给主机。");
            $('manual-ui').style.display = 'block';
        } 
        // 如果收到的是answer，就连接
        else if(sd.type === 'answer') {
            await manualPC.setRemoteDescription(sd);
            log("正在建立连接...");
        }
    } catch(e) {
        log("解析失败，请检查代码");
    }
};

// ================= 玩家模型管理 =================
function createRemotePlayer(id, name) {
    if(net.players[id]) return;
    
    const group = new THREE.Group();
    const mat = new THREE.MeshLambertMaterial({color: new THREE.Color().setHSL(Math.random(), 0.6, 0.6)});
    
    // 头
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), mat);
    head.position.y = 1.4;
    group.add(head);
    
    // 身体
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.3), mat);
    body.position.y = 0.9;
    group.add(body);
    
    // 腿
    const legL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.7, 0.25), mat);
    legL.position.set(-0.15, 0.35, 0);
    const legR = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.7, 0.25), mat);
    legR.position.set(0.15, 0.35, 0);
    group.add(legL, legR);
    
    // 名字
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'white';
    ctx.font = 'bold 50px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(name, 128, 80);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true }));
    sprite.scale.set(1.5, 0.5, 1);
    sprite.position.y = 2.0;
    group.add(sprite);
    
    scene.add(group);
    net.players[id] = { mesh: group, name: name, legs: [legL, legR] };
}

function updateRemotePlayer(id, data) {
    if(!net.players[id]) createRemotePlayer(id, data.name || "Player");
    const p = net.players[id];
    if(p && p.mesh) {
        p.mesh.position.set(data.x, data.y - 1.0, data.z);
        p.mesh.rotation.y = data.yaw;
        
        if(data.moving) {
            const time = Date.now() * 0.01;
            p.legs[0].rotation.x = Math.sin(time) * 0.5;
            p.legs[1].rotation.x = -Math.sin(time) * 0.5;
        } else {
            p.legs[0].rotation.x = 0;
            p.legs[1].rotation.x = 0;
        }
    }
}

// ================= 游戏核心 =================
function startGame() {
    $('lobby').style.display = 'none';
    $('game-ui').style.display = 'block';
    initScene();
    genWorld();
    if(isMobile) setupMobileControls(); else setupPCControls();
    setupChat();
    animate();
}

function initScene() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 40, 100);
    
    camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 200);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);
    
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(50, 100, 50);
    scene.add(sun);
}

function genWorld() {
    for(let cx=-2; cx<=2; cx++) for(let cz=-2; cz<=2; cz++) {
        for(let x=0; x<16; x++) for(let z=0; z<16; z++) {
            const wx = cx*16+x, wz = cz*16+z;
            const h = Math.floor(Math.sin(wx*0.1) * Math.cos(wz*0.1) * 8 + 15);
            for(let y=0; y<=h; y++) {
                let id = 3;
                if(y==h) id = 1;
                else if(y>h-3) id = 2;
                world[`${wx},${y},${wz}`] = id;
            }
        }
    }
    buildMesh();
}

function buildMesh() {
    const geo = new THREE.BoxGeometry(1,1,1);
    const counting = {};
    for(let k in world) counting[world[k]] = (counting[world[k]] || 0) + 1;
    
    for(let type in counting) {
        const mesh = new THREE.InstancedMesh(geo, MAT[type], counting[type]);
        scene.add(mesh);
        const matrix = new THREE.Matrix4();
        let i=0;
        for(let k in world) {
            if(world[k] == Number(type)) {
                const [x,y,z] = k.split(',');
                matrix.setPosition(Number(x), Number(y), Number(z));
                mesh.setMatrixAt(i++, matrix);
            }
        }
        mesh.instanceMatrix.needsUpdate = true;
    }
}

function updateBlock(x,y,z,type, sync=true) {
    const key = `${x},${y},${z}`;
    if(type===0) delete world[key]; else world[key] = type;
    scene.children = scene.children.filter(c => !(c.isInstancedMesh));
    buildMesh();
    if(sync) broadcast({ t: 'block', x, y, z, type });
}

// ================= 控制与物理 =================
function setupPCControls() {
    document.addEventListener('click', () => renderer.domElement.requestPointerLock());
    document.addEventListener('mousemove', e => {
        if(document.pointerLockElement) {
            player.yaw -= e.movementX * 0.002;
            player.pitch -= e.movementY * 0.002;
            player.pitch = Math.max(-1.5, Math.min(1.5, player.pitch));
        }
    });
    document.addEventListener('mousedown', e => { if(document.pointerLockElement) interact(e.button===2); });
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => keys[e.code] = true);
    document.addEventListener('keyup', e => keys[e.code] = false);
}

function setupMobileControls() {
    const joy = { base: $('joystick-base'), thumb: $('joystick-thumb'), active: false, x:0, y:0 };
    
    $('joystick-zone').ontouchstart = e => {
        e.preventDefault();
        joy.active = true;
        joy.base.style.display = 'block';
        joy.base.style.left = e.touches[0].clientX + 'px';
        joy.base.style.top = e.touches[0].clientY + 'px';
        joy.thumb.style.left = e.touches[0].clientX + 'px';
        joy.thumb.style.top = e.touches[0].clientY + 'px';
        joy.sx = e.touches[0].clientX;
        joy.sy = e.touches[0].clientY;
    };
    $('joystick-zone').ontouchmove = e => {
        if(!joy.active) return;
        const t = e.touches[0];
        const dx = t.clientX - joy.sx;
        const dy = t.clientY - joy.sy;
        const dist = Math.min(40, Math.hypot(dx, dy));
        const ang = Math.atan2(dy, dx);
        joy.thumb.style.left = (joy.sx + Math.cos(ang)*dist) + 'px';
        joy.thumb.style.top = (joy.sy + Math.sin(ang)*dist) + 'px';
        joy.x = Math.cos(ang) * (dist/40);
        joy.y = Math.sin(ang) * (dist/40);
    };
    $('joystick-zone').ontouchend = e => { joy.active = false; joy.x=0; joy.y=0; joy.base.style.display='none'; };

    let lastLook = null;
    $('look-zone').ontouchstart = e => lastLook = e.touches[0];
    $('look-zone').ontouchmove = e => {
        if(!lastLook) return;
        const t = e.touches[0];
        player.yaw -= (t.clientX - lastLook.clientX) * 0.005;
        player.pitch -= (t.clientY - lastLook.clientY) * 0.005;
        player.pitch = Math.max(-1.5, Math.min(1.5, player.pitch));
        lastLook = t;
    };
    $('look-zone').ontouchend = () => lastLook = null;

    $('btn-jump').ontouchstart = () => { if(player.onGround) player.vel.y = 0.3; };
    $('btn-break').ontouchstart = () => interact(false);
    $('btn-place').ontouchstart = () => interact(true);
    $('btn-chat').ontouchstart = () => toggleChat();
    
    window.joyState = joy;
}

function interact(place) {
    const dir = new THREE.Vector3(0,0,-1).applyEuler(new THREE.Euler(player.pitch, player.yaw, 0, 'YXZ'));
    raycaster.set(camera.position, dir);
    
    let closest = null, minDist = 6;
    for(let key in world) {
        const [x,y,z] = key.split(',').map(Number);
        const box = new THREE.Box3(new THREE.Vector3(x,y,z), new THREE.Vector3(x+1,y+1,z+1));
        const hit = raycaster.ray.intersectBox(box, new THREE.Vector3());
        if(hit) {
            const d = camera.position.distanceTo(hit);
            if(d < minDist) { minDist = d; closest = { x, y, z, hit }; }
        }
    }
    
    if(closest) {
        if(!place) updateBlock(closest.x, closest.y, closest.z, 0);
        else {
            const n = closest.hit.clone().sub(new THREE.Vector3(closest.x+0.5, closest.y+0.5, closest.z+0.5)).normalize();
            const nx = Math.round(n.x), ny = Math.round(n.y), nz = Math.round(n.z);
            updateBlock(closest.x+nx, closest.y+ny, closest.z+nz, player.selected);
        }
    }
}

// 物理循环
setInterval(() => {
    if(!scene) return;
    
    // PC 输入
    if(!isMobile) {
        const speed = 0.15;
        if(keys['KeyW']) { player.vel.x -= Math.sin(player.yaw) * speed; player.vel.z -= Math.cos(player.yaw) * speed; }
        if(keys['KeyS']) { player.vel.x += Math.sin(player.yaw) * speed; player.vel.z += Math.cos(player.yaw) * speed; }
        if(keys['KeyA']) { player.vel.x -= Math.cos(player.yaw) * speed; player.vel.z += Math.sin(player.yaw) * speed; }
        if(keys['KeyD']) { player.vel.x += Math.cos(player.yaw) * speed; player.vel.z -= Math.sin(player.yaw) * speed; }
        if(keys['Space'] && player.onGround) player.vel.y = 0.3;
    } else {
        if(window.joyState && window.joyState.active) {
            player.vel.x -= window.joyState.x * 0.1;
            player.vel.z -= window.joyState.y * 0.1;
        }
    }
    
    player.vel.y -= 0.015;
    player.pos.add(player.vel);
    
    // 简单碰撞
    player.onGround = false;
    const hw = 0.3, hh = 1.6;
    for(let key in world) {
        const [bx,by,bz] = key.split(',').map(Number);
        if( player.pos.x + hw > bx && player.pos.x - hw < bx+1 &&
            player.pos.y + 0.2 > by && player.pos.y - hh < by+1 &&
            player.pos.z + hw > bz && player.pos.z - hw < bz+1) {
            
            const prevY = player.pos.y - player.vel.y;
            if(prevY + 0.2 < by || prevY - hh > by+1) {
                if(player.vel.y < 0) { player.onGround = true; player.pos.y = by+1+hh; }
                else { player.pos.y = by-0.2; }
                player.vel.y = 0;
            } else {
                const dx = player.pos.x - (bx+0.5);
                const dz = player.pos.z - (bz+0.5);
                if(Math.abs(dx) > Math.abs(dz)) player.pos.x += dx > 0 ? 0.1 : -0.1;
                else player.pos.z += dz > 0 ? 0.1 : -0.1;
            }
        }
    }
    
    player.vel.x *= 0.8; player.vel.z *= 0.8;
    if(player.pos.y < -10) { player.pos.set(0,40,0); player.vel.set(0,0,0); }
    
    // 同步
    if(Math.random() < 0.2) {
        broadcast({ t: 'pos', id: net.id || 'local', name: player.name, x: player.pos.x, y: player.pos.y, z: player.pos.z, yaw: player.yaw, moving: (Math.abs(player.vel.x) > 0.05 || Math.abs(player.vel.z) > 0.05) });
    }
}, 16);

// ================= 聊天 =================
function setupChat() {
    if(!isMobile) {
        window.addEventListener('keydown', e => {
            if(e.code === 'Enter') {
                const box = $('chat-input-box');
                const input = $('chat-input');
                if(box.style.display === 'block') {
                    if(input.value.trim()) {
                        broadcast({ t: 'chat', name: player.name, text: input.value });
                        addChatMsg(player.name, input.value);
                        input.value = '';
                    }
                    box.style.display = 'none';
                    document.body.requestPointerLock();
                } else {
                    box.style.display = 'block';
                    input.focus();
                    if(document.pointerLockElement) document.exitPointerLock();
                }
            }
        });
    }
}

function toggleChat() {
    const box = $('chat-input-box');
    const input = $('chat-input');
    if(box.style.display === 'block') {
        if(input.value.trim()) {
            broadcast({ t: 'chat', name: player.name, text: input.value });
            addChatMsg(player.name, input.value);
            input.value = '';
        }
        box.style.display = 'none';
    } else {
        box.style.display = 'block';
        input.focus();
    }
}

function addChatMsg(name, text) {
    const div = document.createElement('div');
    div.className = 'chat-msg';
    div.innerHTML = `<b style="color:#ffa">${name}:</b> ${text}`;
    $('chat-messages').appendChild(div);
    setTimeout(() => div.remove(), 10000);
}

function animate() {
    requestAnimationFrame(animate);
    if(!camera) return;
    
    camera.position.set(player.pos.x, player.pos.y + 0.7, player.pos.z);
    camera.rotation.order = 'YXZ';
    camera.rotation.y = player.yaw;
    camera.rotation.x = player.pitch;
    
    renderer.render(scene, camera);
}

</script>
