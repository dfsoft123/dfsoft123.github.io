<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0, shrink-to-fit=no">
  <title>伤害：0</title>
  <style>
    :root {
      --bg: #08090f;
      --surface: rgba(18, 20, 35, 0.75);
      --surface2: rgba(28, 30, 50, 0.8);
      --accent: #c084fc;
      --gold: #fbbf24;
      --green: #4ade80;
      --blue: #60a5fa;
      --red: #f87171;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --glow: 0 0 20px rgba(192, 132, 252, 0.3);
      --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
      background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(120, 50, 200, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(251, 191, 36, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(96, 165, 250, 0.04) 0%, transparent 50%);
      background-attachment: fixed;
    }

    #app {
      width: 100%;
      max-width: 920px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      backdrop-filter: blur(2px);
    }

    .status-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      backdrop-filter: blur(25px);
      border-radius: 60px;
      padding: 14px 24px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg), var(--glow);
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.05);
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text2);
      letter-spacing: 0.3px;
      transition: all 0.2s;
    }
    .chip.gold { background: rgba(251, 191, 36, 0.12); border: 1px solid rgba(251, 191, 36, 0.3); color: #fcd34d; }
    .chip.trophy { background: rgba(192, 132, 252, 0.12); border: 1px solid rgba(192, 132, 252, 0.3); color: #d8b4fe; }
    .chip span { font-weight: 700; color: #fff; margin-left: 4px; }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    @media (max-width: 750px) {
      .main-grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      backdrop-filter: blur(25px);
      border-radius: 32px;
      padding: 22px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .card:hover {
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.7), 0 0 25px rgba(192, 132, 252, 0.15);
    }

    .card-header {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #cbd5e1;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding-bottom: 12px;
    }

    .mining-zone {
      background: var(--surface2);
      backdrop-filter: blur(25px);
      border-radius: 32px;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      cursor: pointer;
      transition: all 0.1s ease;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
    }
    .mining-zone::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(192,132,252,0.05) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .mining-zone:active::before { opacity: 1; }
    .mining-zone:active { transform: scale(0.97); background: rgba(32, 34, 55, 0.9); }

    .block-icon {
      font-size: 5.5rem;
      filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
      transition: transform 0.2s;
    }
    .block-name {
      font-weight: 800;
      font-size: 1.4rem;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .hp-bar-wrap { width: 100%; display: flex; flex-direction: column; gap: 5px; }
    .hp-outer { height: 10px; background: rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; }
    .hp-inner { height: 100%; background: linear-gradient(90deg, #f87171, #fbbf24, #4ade80); border-radius: 12px; transition: width 0.2s; }
    .hp-text { font-size: 0.75rem; color: #94a3b8; text-align: center; }

    .zone-controls {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center;
    }
    select, .input-modern {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      padding: 10px 18px;
      border-radius: 40px;
      font-size: 0.8rem;
      outline: none;
      backdrop-filter: blur(15px);
      cursor: pointer;
      transition: border 0.2s;
    }
    select:focus, .input-modern:focus { border-color: var(--accent); }

    .btn {
      padding: 11px 22px;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      background: rgba(255,255,255,0.08);
      color: #fff;
      backdrop-filter: blur(15px);
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      letter-spacing: 0.3px;
    }
    .btn:active { transform: scale(0.95); background: rgba(255,255,255,0.18); }
    .btn-accent { background: linear-gradient(135deg, #c084fc, #a855f7); color: #fff; border-color: transparent; font-weight: 700; }
    .btn-gold { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #0f0f1a; border-color: transparent; font-weight: 700; }
    .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.25); }
    .btn-sm { padding: 8px 18px; font-size: 0.75rem; }
    .btn-xs { padding: 6px 14px; font-size: 0.7rem; border-radius: 30px; }
    .btn-icon { padding: 8px 12px; font-size: 1.2rem; font-weight: 700; }

    .resource-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 8px;
      min-height: 50px;
    }
    .res-item {
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 10px 6px;
      text-align: center;
      font-size: 0.7rem;
      color: #cbd5e1;
      border: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeIn 0.3s ease;
    }
    .res-item:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
    .res-icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }
    .res-val { font-weight: 700; color: #fff; font-size: 0.8rem; }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .current-pick-card {
      background: rgba(192,132,252,0.08);
      border: 1px solid rgba(192,132,252,0.3);
      border-radius: 24px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      backdrop-filter: blur(20px);
    }
    .pick-icon { font-size: 2.2rem; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.4)); }
    .pick-name { font-weight: 700; font-size: 1.2rem; color: #fff; }
    .pick-desc { font-size: 0.8rem; color: #94a3b8; margin-top: 4px; }

    .shop-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 380px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .shop-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 18px;
      padding: 12px 16px;
      backdrop-filter: blur(15px);
      transition: background 0.2s;
      border: 1px solid transparent;
    }
    .shop-row:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); }
    .shop-emoji { font-size: 1.8rem; width: 40px; text-align: center; }
    .shop-name { font-weight: 700; color: #fff; width: 90px; font-size: 0.9rem; }
    .shop-info { font-size: 0.7rem; color: #94a3b8; flex: 1; }
    .shop-count { font-weight: 700; color: #fbbf24; margin: 0 6px; font-size: 0.9rem; }
    .shop-actions { display: flex; gap: 6px; align-items: center; }

    .switch-wrap { display: flex; align-items: center; gap: 12px; font-size: 0.8rem; cursor: pointer; }
    .switch-slider {
      width: 48px; height: 26px; background: #475569; border-radius: 13px;
      position: relative; transition: background 0.3s; box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
    }
    .switch-slider::after {
      content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px;
      border-radius: 50%; background: #fff; transition: left 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    input:checked + .switch-slider { background: #4ade80; }
    input:checked + .switch-slider::after { left: 25px; }

    .exchange-preview {
      font-size: 0.7rem;
      color: #fbbf24;
      background: rgba(251,191,36,0.1);
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
      white-space: nowrap;
    }

    .damage-float {
      position: absolute; pointer-events: none; color: #f87171; font-weight: 800;
      font-size: 1.2rem; text-shadow: 0 0 16px rgba(248,113,113,0.9);
      animation: floatUp 1s ease-out forwards; z-index: 200; white-space: nowrap;
    }
    @keyframes floatUp {
      0% { opacity:1; transform: translateY(0) scale(1); }
      30% { opacity:1; transform: translateY(-25px) scale(1.15); }
      100% { opacity:0; transform: translateY(-80px) scale(0.6); }
    }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      z-index: 300; display: flex; align-items: center; justify-content: center;
    }
    .modal {
      background: var(--surface); border-radius: 28px; padding: 24px;
      max-width: 480px; width: 92%; max-height: 80vh; overflow-y: auto;
      border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    }
    .close-btn {
      position: sticky; top: 0; float: right; background: #ef4444; border: none;
      color: #fff; width: 34px; height: 34px; border-radius: 50%; font-size: 18px;
      cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center;
    }
    .text-muted { color: #94a3b8; }
  </style>
</head>
<body>
  <div id="app">
    <div class="status-bar">
      <div class="chip gold">💰 <span id="goldDisplay">0</span></div>
      <div class="chip trophy">🏆 <span id="trophyDisplay">0</span></div>
      <div class="chip">⭐ Lv <span id="levelDisplay">0</span></div>
      <div class="chip">⚡ <span id="dmgDisplay">0</span></div>
      <div class="chip">⏱ <span id="onlineDisplay">0s</span></div>
    </div>

    <div class="main-grid">
      <div class="mining-zone" id="blockArea">
        <div style="font-size:0.75rem;color:#94a3b8;letter-spacing:1px;">📍 区域 <span id="zoneLabel">1</span></div>
        <div class="block-icon" id="blockVisual">🌿</div>
        <div class="block-name" id="blockName">草</div>
        <div class="hp-bar-wrap">
          <div class="hp-outer"><div class="hp-inner" id="hpBar" style="width:100%"></div></div>
          <div class="hp-text" id="hpText">100/100</div>
        </div>
        <div class="zone-controls">
          <button class="btn btn-sm btn-icon" id="prevBlockBtn" title="上一个方块 (←)">◀</button>
          <select id="blockSelect" class="input-modern"></select>
          <button class="btn btn-sm btn-icon" id="nextBlockBtn" title="下一个方块 (→)">▶</button>
          <button class="btn btn-sm" id="zoneSwitchBtn">🌍 切换区域</button>
        </div>
        <div class="switch-wrap">
          <label style="display:flex;align-items:center;gap:12px;cursor:pointer;">
            <input type="checkbox" id="autoMineToggle" hidden>
            <span class="switch-slider"></span> 🤖 自动挖矿
          </label>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:18px;">
        <div class="card">
          <div class="card-header">📊 实时增益</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:0.8rem;">
            <div style="display:flex;justify-content:space-between;background:rgba(255,255,255,0.03);padding:8px 12px;border-radius:12px;"><span>镐子</span><span class="val" id="statPick">1</span></div>
            <div style="display:flex;justify-content:space-between;background:rgba(255,255,255,0.03);padding:8px 12px;border-radius:12px;"><span>奖杯</span><span class="val" id="statTrophy">1</span></div>
            <div style="display:flex;justify-content:space-between;background:rgba(255,255,255,0.03);padding:8px 12px;border-radius:12px;"><span>等级</span><span class="val" id="statLevel">1</span></div>
            <div style="display:flex;justify-content:space-between;background:rgba(255,255,255,0.03);padding:8px 12px;border-radius:12px;"><span>使用</span><span class="val" id="statUsage">1</span></div>
            <div style="display:flex;justify-content:space-between;background:rgba(255,255,255,0.03);padding:8px 12px;border-radius:12px;"><span>物品</span><span class="val" id="statItem">1</span></div>
            <div style="display:flex;justify-content:space-between;background:rgba(255,255,255,0.03);padding:8px 12px;border-radius:12px;"><span>时间</span><span class="val" id="statTime">1</span></div>
          </div>
          <div style="margin-top:6px;">
            <div style="display:flex;justify-content:space-between;font-size:0.7rem;color:#94a3b8;">
              <span>经验进度</span><span id="expText">0/1</span>
            </div>
            <div class="hp-outer" style="height:6px;margin-top:5px;"><div class="hp-inner" id="expBar" style="width:0%;background:var(--blue);"></div></div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <button class="btn btn-accent btn-sm" id="manualExchangeBtn">🔄 手动兑换奖杯</button>
            <span class="exchange-preview" id="manualExchangePreview">+0 🏆</span>
            <span style="font-size:0.6rem;color:#f87171;">(重置使用增益)</span>
          </div>
          <div class="switch-wrap" id="autoExchangeWrap" style="opacity:0.4;pointer-events:none;">
            <label style="display:flex;align-items:center;gap:12px;cursor:pointer;">
              <input type="checkbox" id="autoExchangeToggle" hidden>
              <span class="switch-slider"></span> 🏅 自动兑换
            </label>
            <span style="font-size:0.65rem;">≥</span>
            <input type="number" id="autoExchangeThreshold" value="10000" min="100" class="input-modern" style="width:70px;padding:6px 10px;">
            <span class="exchange-preview" id="autoExchangePreview">+0 🏆</span>
          </div>
        </div>

        <div class="card" id="resourceCard">
          <div class="card-header">💎 资源碎片</div>
          <div class="resource-grid" id="resourceGrid">
            <div style="color:#64748b;font-size:0.8rem;text-align:center;grid-column:1/-1;">尚未获得碎片</div>
          </div>
        </div>
      </div>
    </div>

    <div class="current-pick-card">
      <div class="pick-icon">⛏️</div>
      <div>
        <div class="pick-name" id="cpName">木镐</div>
        <div class="pick-desc" id="cpStats">间隔1s | 增益1</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">🏪 镐具商店 / 合成台</div>
      <div class="shop-list" id="shopList"></div>
    </div>

    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px;">
      <button class="btn btn-sm" id="attrBtn">📋 详细属性</button>
      <button class="btn btn-sm" id="saveBtn">💾 存档管理</button>
      <button class="btn btn-sm" style="color:#f87171;border-color:#f87171;" id="resetBtn">⚠️ 重置游戏</button>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal" id="modalContent"></div>
  </div>

  <script>
    (function() {
      const UNITS = ['', '万', '亿', '万亿', '兆', '万兆', '亿兆', '万亿兆', '京', '万京', '亿京', '万亿京', '兆京', '万兆京', '亿兆京', '万亿兆京', '垓', '万垓', '亿垓', '万亿垓', '兆垓', '万兆垓', '亿兆垓', '万亿兆垓', '京垓', '万京垓', '亿京垓', '万亿京垓', '兆京垓', '万兆京垓', '亿兆京垓', '万亿兆京垓', '杼'];
      function formatNum(n) {
        if (n == null || isNaN(n)) return '0';
        if (n === 0) return '0';
        if (n < 0) return '-' + formatNum(-n);
        if (n < 10000) return Number.isInteger(n) ? n.toLocaleString('en-US') : n.toFixed(2);
        let idx = 0, v = n;
        while (v >= 10000 && idx < UNITS.length - 1) { v /= 10000; idx++; }
        return v.toFixed(2) + UNITS[idx];
      }
      function formatNumFull(n) {
        if (n == null || isNaN(n)) return '0';
        if (n === 0) return '0';
        if (n < 0) return '-' + formatNumFull(-n);
        if (n < 10000) return n.toLocaleString('en-US');
        let idx = 0, v = n;
        while (v >= 10000 && idx < UNITS.length - 1) { v /= 10000; idx++; }
        return v.toFixed(4) + ' ' + UNITS[idx];
      }

      const PICKS = [
        {id:'wood',name:'木镐',interval:1,pickGain:1,usageGain:0.01,goldMult:1,costTrophy:1,craft:null,emoji:'🪵'},
        {id:'stone',name:'石镐',interval:0.9,pickGain:2,usageGain:0.02,goldMult:1,costTrophy:2,craft:null,emoji:'🪨'},
        {id:'iron',name:'铁镐',interval:0.8,pickGain:5,usageGain:0.03,goldMult:1,costTrophy:6,craft:null,emoji:'⛏️'},
        {id:'gold',name:'金镐',interval:0.7,pickGain:15,usageGain:0.05,goldMult:1,costTrophy:24,craft:null,emoji:'🥇'},
        {id:'diamond',name:'钻石镐',interval:0.65,pickGain:50,usageGain:0.08,goldMult:1,costTrophy:120,craft:null,emoji:'💎'},
        {id:'netherite',name:'下界合金镐',interval:0.6,pickGain:150,usageGain:0.1,goldMult:1,costTrophy:600,craft:null,emoji:'🔥'},
        {id:'reinforced_gold',name:'强化金镐',interval:0.55,pickGain:400,usageGain:0.12,goldMult:1,costTrophy:3000,craft:null,emoji:'⚡'},
        {id:'reinforced_diamond',name:'强化钻石镐',interval:0.5,pickGain:1000,usageGain:0.15,goldMult:1,costTrophy:15000,craft:null,emoji:'💠'},
        {id:'reinforced_netherite',name:'强化下界合金镐',interval:0.45,pickGain:2500,usageGain:0.2,goldMult:1,costTrophy:75000,craft:null,emoji:'🌋'},
        {id:'obsidian',name:'黑曜石镐',interval:0.4,pickGain:5000,usageGain:0.25,goldMult:1,costTrophy:375000,craft:null,emoji:'🖤'},
        {id:'red_obsidian',name:'红曜石镐',interval:0.35,pickGain:8000,usageGain:0.3,goldMult:1,costTrophy:null,craft:{reqPick:'obsidian',reqPickName:'黑曜石镐',reqPickQty:1,fragments:{redObsidian:10}},emoji:'❤️'},
        {id:'blue_obsidian',name:'蓝曜石镐',interval:0.3,pickGain:12000,usageGain:0.4,goldMult:1,costTrophy:null,craft:{reqPick:'red_obsidian',reqPickName:'红曜石镐',reqPickQty:1,fragments:{blueObsidian:10}},emoji:'💙'},
        {id:'red_blue',name:'红蓝镐',interval:0.25,pickGain:20000,usageGain:0.5,goldMult:1.5,costTrophy:null,craft:{reqPick:'red_obsidian',reqPickName:'红曜石镐',reqPickQty:1,reqPick2:'blue_obsidian',reqPick2Name:'蓝曜石镐',reqPick2Qty:1,fragments:{redObsidian:50,blueObsidian:50}},emoji:'💜'},
        {id:'green_obsidian',name:'绿曜石镐',interval:0.25,pickGain:25000,usageGain:0.5,goldMult:1.5,costTrophy:null,craft:{reqPick:'blue_obsidian',reqPickName:'蓝曜石镐',reqPickQty:1,fragments:{greenObsidian:10}},emoji:'💚'},
        {id:'yellow_obsidian',name:'黄曜石镐',interval:0.25,pickGain:35000,usageGain:0.6,goldMult:1.5,costTrophy:null,craft:{reqPick:'green_obsidian',reqPickName:'绿曜石镐',reqPickQty:1,fragments:{yellowObsidian:10}},emoji:'💛'},
        {id:'yellow_green',name:'黄绿镐',interval:0.2,pickGain:50000,usageGain:0.8,goldMult:2,costTrophy:null,craft:{reqPick:'yellow_obsidian',reqPickName:'黄曜石镐',reqPickQty:1,reqPick2:'green_obsidian',reqPick2Name:'绿曜石镐',reqPick2Qty:1,fragments:{greenObsidian:50,yellowObsidian:50}},emoji:'💚💛'},
        {id:'cyan_obsidian',name:'青曜石镐',interval:0.2,pickGain:60000,usageGain:0.8,goldMult:2,costTrophy:null,craft:{reqPick:'yellow_obsidian',reqPickName:'黄曜石镐',reqPickQty:1,fragments:{cyanObsidian:10}},emoji:'🩵'},
        {id:'rainbow_obsidian',name:'彩曜石镐',interval:0.15,pickGain:100000,usageGain:1,goldMult:2.5,costTrophy:null,craft:{reqPick:'red_blue',reqPickName:'红蓝镐',reqPickQty:1,reqPick2:'yellow_green',reqPick2Name:'黄绿镐',reqPick2Qty:1,reqPick3:'cyan_obsidian',reqPick3Name:'青曜石镐',reqPick3Qty:1,fragments:{redObsidian:100,blueObsidian:100,greenObsidian:100,yellowObsidian:100,cyanObsidian:100}},emoji:'🌈'},
        {id:'bedrock',name:'基岩镐',interval:0.15,pickGain:150000,usageGain:1.5,goldMult:3,costTrophy:null,craft:{reqPick:'rainbow_obsidian',reqPickName:'彩曜石镐',reqPickQty:1,fragments:{bedrockFragment:100}},emoji:'🪨⚡'},
        {id:'pick220',name:'220镐[特殊]',interval:0.1,pickGain:220220,usageGain:2.2,goldMult:4.84,costTrophy:null,craft:{fragments:{fragment220:100}},emoji:'⚡220'},
      ];

      const ZONE1 = [
        {id:'grass',name:'草',hp:100,gold:1,emoji:'🌿'},{id:'dirt',name:'土',hp:200,gold:2,emoji:'🟫'},
        {id:'stone',name:'石',hp:500,gold:4,emoji:'🪨'},{id:'reinforced_grass',name:'加强草',hp:1200,gold:8,emoji:'🌱'},
        {id:'reinforced_dirt',name:'加强土',hp:2500,gold:15,emoji:'🏾'},{id:'reinforced_stone',name:'加强石',hp:10000,gold:50,emoji:'⛰️'},
        {id:'super_stone',name:'超强石',hp:100000,gold:384,emoji:'🏔️'},{id:'220_primary',name:'220初级',hp:220220,gold:660,emoji:'2️⃣2️⃣0️⃣',dropFrag:'fragment220',dropRate:0.0001},
        {id:'coal',name:'煤',hp:1000000,gold:2000,emoji:'🪨⚫'},{id:'iron_ore',name:'铁',hp:20000000,gold:10000,emoji:'🪨🔩'},
        {id:'gold_ore',name:'金',hp:500000000,gold:80000,emoji:'🪨🌟'},{id:'diamond_ore',name:'钻',hp:10000000000,gold:500000,emoji:'💎⛏️'},
      ];
      const ZONE2 = [
        {id:'coal_block',name:'煤块',hp:4000000,gold:1200000,emoji:'⬛'},{id:'iron_block',name:'铁块',hp:10000000,gold:2000000,emoji:'🔩⬛'},
        {id:'gold_block',name:'金块',hp:50000000,gold:5000000,emoji:'🌟⬛'},{id:'diamond_block',name:'钻石块',hp:200000000,gold:25000000,emoji:'💎⬛'},
        {id:'ancient_debris',name:'远古残骸',hp:500000000,gold:80000000,emoji:'🦴⬛'},{id:'netherite_block',name:'下界合金块',hp:1500000000,gold:200000000,emoji:'🔥⬛'},
        {id:'red_obsidian_frag',name:'红曜石碎片',hp:5000000000,gold:500000000,emoji:'❤️💎',dropFrag:'redObsidian',dropRate:0.1},
        {id:'blue_obsidian_frag',name:'蓝曜石碎片',hp:6000000000,gold:600000000,emoji:'💙💎',dropFrag:'blueObsidian',dropRate:0.1},
        {id:'green_obsidian_frag',name:'绿曜石碎片',hp:15000000000,gold:1500000000,emoji:'💚💎',dropFrag:'greenObsidian',dropRate:0.1},
        {id:'yellow_obsidian_frag',name:'黄曜石碎片',hp:20000000000,gold:2000000000,emoji:'💛💎',dropFrag:'yellowObsidian',dropRate:0.1},
        {id:'cyan_obsidian_frag',name:'青曜石碎片',hp:60000000000,gold:6000000000,emoji:'🩵💎',dropFrag:'cyanObsidian',dropRate:0.1},
        {id:'bedrock_frag',name:'基岩碎片',hp:220000000000,gold:22000000000,emoji:'🪨💎',dropFrag:'bedrockFragment',dropRate:0.1},
        {id:'220_mid',name:'220中级',hp:220220000000,gold:22022000000,emoji:'2️⃣2️⃣0️⃣⭐',dropFrag:'fragment220',dropRate:0.001},
      ];

      const FRAG_ICONS = { redObsidian:'❤️', blueObsidian:'💙', greenObsidian:'💚', yellowObsidian:'💛', cyanObsidian:'🩵', bedrockFragment:'🪨', fragment220:'⚡' };
      const FRAG_NAMES = { redObsidian:'红曜石', blueObsidian:'蓝曜石', greenObsidian:'绿曜石', yellowObsidian:'黄曜石', cyanObsidian:'青曜石', bedrockFragment:'基岩', fragment220:'220' };

      function createState() {
        return {
          gold:0, trophies:0, level:0, exp:0, usageGain:1, onlineSeconds:0,
          currentPickId:'wood', pickCounts:{wood:1},
          fragmentCounts:{redObsidian:0,blueObsidian:0,greenObsidian:0,yellowObsidian:0,cyanObsidian:0,bedrockFragment:0,fragment220:0},
          currentZone:1, currentBlockId:'grass', blockHpRemaining:{},
          autoMine:false, autoExchangeEnabled:false, autoExchangeThreshold:10000,
          isHolding:false,
        };
      }

      function initHp(s) { [...ZONE1,...ZONE2].forEach(b=>{ if(!(b.id in s.blockHpRemaining)) s.blockHpRemaining[b.id]=b.hp; }); }
      function getBlock(s) { const zone = s.currentZone===1?ZONE1:ZONE2; return zone.find(b=>b.id===s.currentBlockId)||zone[0]; }
      function getPick(id) { return PICKS.find(p=>p.id===id); }
      function itemGain(s) { const f=s.fragmentCounts; return 1+(f.redObsidian||0)*0.1+(f.blueObsidian||0)*0.2+(f.greenObsidian||0)*0.3+(f.yellowObsidian||0)*0.4+(f.cyanObsidian||0)*0.5+(f.bedrockFragment||0)*0.8+(f.fragment220||0)*220; }
      function calcDmg(s) {
        const p = getPick(s.currentPickId); if(!p) return 0;
        const trophyG = 1+Math.pow(Math.max(0,s.trophies),3/5);
        const levelG = 1+Math.pow(Math.max(0,s.level),0.5);
        const timeG = s.onlineSeconds>100 ? 1+Math.log(s.onlineSeconds/100) : 1;
        const base = p.pickGain * trophyG * levelG * Math.max(1,s.usageGain) * itemGain(s);
        return Math.pow(Math.max(1,base), 1/s.currentZone) * timeG;
      }
      function expNeed(lv) { return Math.pow(lv+1,2); }
      function calcExchangePreview(gold) {
        if (gold < 100) return 0;
        const base = Math.floor(gold / 100);
        return Math.floor(Math.pow(base, 2 / 3));
      }
      function mine(s) {
        const block = getBlock(s); if(!block) return;
        const pick = getPick(s.currentPickId); if(!pick) return;
        const dmg = calcDmg(s);
        let hp = s.blockHpRemaining[block.id] ?? block.hp;
        hp -= dmg;
        let mined = false;
        if(hp<=0) {
          hp = block.hp; mined = true;
          const goldEarned = block.gold * pick.goldMult;
          s.gold += goldEarned;
          s.exp += Math.pow(goldEarned, 1.2);
          if(block.dropFrag && Math.random()<(block.dropRate||0)) s.fragmentCounts[block.dropFrag] = (s.fragmentCounts[block.dropFrag]||0)+1;
          while(s.exp >= expNeed(s.level)) { s.exp -= expNeed(s.level); s.level++; }
        }
        s.blockHpRemaining[block.id] = Math.max(0,hp);
        s.usageGain += pick.usageGain;
        return {dmg, mined};
      }
      function manualExchange(s) {
        if(s.gold<100) return 0;
        const base = Math.floor(s.gold/100);
        const gained = Math.floor(Math.pow(base,2/3));
        s.gold -= base*100; s.trophies += gained; s.usageGain = 1;
        return gained;
      }
      function autoExchange(s) {
        if(s.gold < Math.max(100, s.autoExchangeThreshold)) return;
        const base = Math.floor(s.gold/100);
        const gained = Math.floor(Math.pow(base,2/3));
        s.gold -= base*100; s.trophies += gained;
      }
      function save(s, slot) { localStorage.setItem('pickGame_save_'+slot, JSON.stringify(JSON.parse(JSON.stringify(s)))); }
      function load(slot) {
        const raw = localStorage.getItem('pickGame_save_'+slot);
        if(!raw) return null;
        try {
          const d = JSON.parse(raw);
          initHp(d);
          if(!d.fragmentCounts) d.fragmentCounts = {redObsidian:0,blueObsidian:0,greenObsidian:0,yellowObsidian:0,cyanObsidian:0,bedrockFragment:0,fragment220:0};
          if(!d.pickCounts) d.pickCounts = {wood:1};
          if(!d.pickCounts[d.currentPickId]) d.pickCounts[d.currentPickId]=1;
          d.autoExchangeThreshold = d.autoExchangeThreshold||10000;
          d.autoExchangeEnabled = d.autoExchangeEnabled||false;
          if(d.usageGain===undefined) d.usageGain=1;
          return d;
        } catch(e){ return null; }
      }

      let game = createState(); initHp(game);
      let saveSlot = 0, lastTick = Date.now(), lastMine = Date.now();

      function ensurePick(id) { if(!game.pickCounts[id]) game.pickCounts[id]=0; }
      function switchPick(id) { ensurePick(id); if(game.pickCounts[id]>=1){ game.currentPickId=id; return true; } return false; }
      function buyPick(id) { const p=getPick(id); if(!p||p.costTrophy===null||game.trophies<p.costTrophy) return false; game.trophies-=p.costTrophy; ensurePick(id); game.pickCounts[id]++; return true; }
      function craftPick(id) {
        const p=getPick(id); if(!p||!p.craft) return {ok:false,msg:'不可合成'};
        const c=p.craft;
        if(c.reqPick && (game.pickCounts[c.reqPick]||0)<c.reqPickQty) return {ok:false,msg:'缺少'+c.reqPickName};
        if(c.reqPick2 && (game.pickCounts[c.reqPick2]||0)<c.reqPick2Qty) return {ok:false,msg:'缺少'+c.reqPick2Name};
        if(c.reqPick3 && (game.pickCounts[c.reqPick3]||0)<c.reqPick3Qty) return {ok:false,msg:'缺少'+c.reqPick3Name};
        if(c.fragments) for(const [k,v] of Object.entries(c.fragments)) if((game.fragmentCounts[k]||0)<v) return {ok:false,msg:'碎片不足'};
        if(c.reqPick) game.pickCounts[c.reqPick]-=c.reqPickQty;
        if(c.reqPick2) game.pickCounts[c.reqPick2]-=c.reqPick2Qty;
        if(c.reqPick3) game.pickCounts[c.reqPick3]-=c.reqPick3Qty;
        if(c.fragments) for(const [k,v] of Object.entries(c.fragments)) game.fragmentCounts[k]-=v;
        ensurePick(id); game.pickCounts[id]++; return {ok:true};
      }

      function switchBlock(direction) {
        const zone = game.currentZone === 1 ? ZONE1 : ZONE2;
        const currentIndex = zone.findIndex(b => b.id === game.currentBlockId);
        let newIndex;
        if (direction === 'prev') {
          newIndex = currentIndex <= 0 ? zone.length - 1 : currentIndex - 1;
        } else {
          newIndex = currentIndex >= zone.length - 1 ? 0 : currentIndex + 1;
        }
        const newBlock = zone[newIndex];
        game.currentBlockId = newBlock.id;
        if (!(newBlock.id in game.blockHpRemaining)) {
          game.blockHpRemaining[newBlock.id] = newBlock.hp;
        }
        updateUI();
      }

      function updateUI() {
        const pick = getPick(game.currentPickId);
        const block = getBlock(game);
        const dmg = calcDmg(game);
        document.getElementById('goldDisplay').textContent = formatNum(game.gold);
        document.getElementById('trophyDisplay').textContent = formatNum(game.trophies);
        document.getElementById('levelDisplay').textContent = game.level;
        document.getElementById('dmgDisplay').textContent = formatNum(dmg);
        document.getElementById('onlineDisplay').textContent = Math.floor(game.onlineSeconds)+'s';
        document.getElementById('zoneLabel').textContent = game.currentZone;
        document.getElementById('blockVisual').textContent = block?.emoji||'?';
        document.getElementById('blockName').textContent = block?.name||'?';
        const hp = game.blockHpRemaining[block?.id] ?? block?.hp ?? 100;
        const maxHp = block?.hp ?? 100;
        document.getElementById('hpBar').style.width = Math.max(0,(hp/maxHp)*100)+'%';
        document.getElementById('hpText').textContent = formatNumFull(hp)+' / '+formatNumFull(maxHp);
        document.getElementById('statPick').textContent = formatNum(pick?.pickGain||1);
        document.getElementById('statTrophy').textContent = formatNum(1+Math.pow(Math.max(0,game.trophies),3/5));
        document.getElementById('statLevel').textContent = formatNum(1+Math.pow(Math.max(0,game.level),0.5));
        document.getElementById('statUsage').textContent = formatNum(game.usageGain);
        document.getElementById('statItem').textContent = formatNum(itemGain(game));
        const timeG = game.onlineSeconds>100?1+Math.log(game.onlineSeconds/100):1;
        document.getElementById('statTime').textContent = formatNum(timeG);
        const need = expNeed(game.level);
        document.getElementById('expBar').style.width = Math.min(100,(game.exp/need)*100)+'%';
        document.getElementById('expText').textContent = formatNumFull(game.exp)+' / '+formatNumFull(need);
        document.getElementById('cpName').textContent = (pick?.emoji||'')+' '+(pick?.name||'木镐');
        document.getElementById('cpStats').textContent = `间隔${pick?.interval||1}s | 增益${formatNum(pick?.pickGain||1)} | 使用+${pick?.usageGain||0}`;
        document.title = '伤害：'+formatNum(dmg);
        const autoWrap = document.getElementById('autoExchangeWrap');
        if(game.trophies>=10000){ autoWrap.style.opacity='1'; autoWrap.style.pointerEvents='auto'; }
        else { autoWrap.style.opacity='0.4'; autoWrap.style.pointerEvents='none'; }
        document.getElementById('autoExchangeToggle').checked = game.autoExchangeEnabled;
        document.getElementById('autoExchangeThreshold').value = game.autoExchangeThreshold;
        document.getElementById('autoMineToggle').checked = game.autoMine;

        const manualPreview = calcExchangePreview(game.gold);
        document.getElementById('manualExchangePreview').textContent = '+' + formatNum(manualPreview) + ' 🏆';
        const autoPreview = calcExchangePreview(game.gold);
        document.getElementById('autoExchangePreview').textContent = '+' + formatNum(autoPreview) + ' 🏆';

        renderResources();
        renderShop();
        renderBlockSelect();
      }

      function renderResources() {
        const grid = document.getElementById('resourceGrid');
        grid.innerHTML = '';
        const fragments = Object.entries(game.fragmentCounts).filter(([,v])=> v > 0);
        if (fragments.length === 0) {
          grid.innerHTML = '<div style="color:#64748b;font-size:0.8rem;text-align:center;grid-column:1/-1;">尚未获得碎片</div>';
          return;
        }
        fragments.forEach(([key, val]) => {
          const div = document.createElement('div');
          div.className = 'res-item';
          div.innerHTML = `<span class="res-icon">${FRAG_ICONS[key]}</span>${FRAG_NAMES[key]}<br><span class="res-val">${formatNum(val)}</span>`;
          grid.appendChild(div);
        });
      }

      function renderBlockSelect() {
        const sel = document.getElementById('blockSelect');
        sel.innerHTML = '';
        const zone = game.currentZone===1?ZONE1:ZONE2;
        zone.forEach(b=>{
          const opt = document.createElement('option');
          opt.value = b.id; opt.textContent = b.emoji+' '+b.name;
          if(b.id===game.currentBlockId) opt.selected = true;
          sel.appendChild(opt);
        });
      }

      function renderShop() {
        const list = document.getElementById('shopList');
        list.innerHTML = '';
        PICKS.forEach(p=>{
          const qty = game.pickCounts[p.id]||0;
          const isCur = game.currentPickId===p.id;
          const row = document.createElement('div');
          row.className = 'shop-row';
          let actionHtml = '';
          if(p.costTrophy!==null) actionHtml = `<button class="btn btn-gold btn-xs buy-btn" data-id="${p.id}">🏆${formatNum(p.costTrophy)}</button>`;
          else if(p.craft) actionHtml = `<button class="btn btn-accent btn-xs craft-btn" data-id="${p.id}">🔧合成</button>`;
          const useBtn = `<button class="btn btn-outline btn-xs use-btn" data-id="${p.id}" ${qty<1?'disabled':''}>${isCur?'✅使用中':'使用'}</button>`;
          row.innerHTML = `<span class="shop-emoji">${p.emoji}</span><span class="shop-name">${p.name}</span><span class="shop-info">${p.craft?'合成':'🏆'+formatNum(p.costTrophy||0)}</span><span class="shop-count">x${qty}</span><div class="shop-actions">${actionHtml}${useBtn}</div>`;
          list.appendChild(row);
        });
      }

      // 使用事件委托处理所有商店按钮点击
      document.getElementById('shopList').addEventListener('click', function(e) {
        const target = e.target.closest('button');
        if (!target) return;
        const id = target.dataset.id;
        if (!id) return;
        if (target.classList.contains('buy-btn')) {
          if (buyPick(id)) updateUI();
          else showToast('奖杯不足');
        } else if (target.classList.contains('craft-btn')) {
          const res = craftPick(id);
          if (res.ok) updateUI();
          else showToast(res.msg);
        } else if (target.classList.contains('use-btn')) {
          if (switchPick(id)) updateUI();
          else showToast('数量不足');
        }
      });

      function showToast(msg) {
        let t = document.getElementById('toastMsg');
        if(!t){ t=document.createElement('div'); t.id='toastMsg'; t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e1e2f;color:#fff;padding:10px 24px;border-radius:40px;font-size:14px;z-index:400;box-shadow:0 10px 25px rgba(0,0,0,0.5);'; document.body.appendChild(t); }
        t.textContent=msg; t.style.opacity='1'; clearTimeout(t._to); t._to=setTimeout(()=>t.style.opacity='0',2000);
      }

      function spawnFloat(x,y,dmg){
        const el = document.createElement('div'); el.className='damage-float';
        el.textContent = formatNum(dmg);
        const area = document.getElementById('blockArea');
        const rect = area.getBoundingClientRect();
        el.style.left = (x-rect.left+(Math.random()-0.5)*90)+'px';
        el.style.top = (y-rect.top-20+(Math.random()-0.5)*40)+'px';
        area.appendChild(el);
        el.addEventListener('animationend',()=>el.remove());
      }

      function tick() {
        const now = Date.now();
        const dt = (now-lastTick)/1000;
        lastTick = now;
        if(dt>0 && dt<3600) game.onlineSeconds += dt;
        const pick = getPick(game.currentPickId);
        const interval = pick?pick.interval:1;
        if((game.autoMine||game.isHolding) && (now-lastMine)>=interval*1000){
          const res = mine(game);
          if(res && res.dmg>0){
            const area = document.getElementById('blockArea');
            const rect = area.getBoundingClientRect();
            spawnFloat(rect.left+rect.width/2, rect.top+rect.height/3, res.dmg);
          }
          lastMine = now;
        }
        if(game.autoExchangeEnabled && game.trophies>=10000 && game.gold>=Math.max(100,game.autoExchangeThreshold)) autoExchange(game);
        updateUI();
      }

      setInterval(tick, 80);
      setInterval(()=>save(game, saveSlot), 1000);

      const area = document.getElementById('blockArea');
      area.addEventListener('mousedown', e=>{ e.preventDefault(); game.isHolding=true; lastMine=Date.now(); });
      area.addEventListener('mouseup', e=>{ e.preventDefault(); game.isHolding=false; });
      area.addEventListener('mouseleave', ()=> game.isHolding=false);
      area.addEventListener('touchstart', e=>{ e.preventDefault(); game.isHolding=true; lastMine=Date.now(); });
      area.addEventListener('touchend', e=>{ e.preventDefault(); game.isHolding=false; });
      area.addEventListener('touchcancel', ()=> game.isHolding=false);
      area.addEventListener('contextmenu', e=>e.preventDefault());

      document.addEventListener('keydown', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
        if (e.key === 'ArrowLeft') { e.preventDefault(); switchBlock('prev'); }
        else if (e.key === 'ArrowRight') { e.preventDefault(); switchBlock('next'); }
      });

      document.getElementById('prevBlockBtn').addEventListener('click', () => switchBlock('prev'));
      document.getElementById('nextBlockBtn').addEventListener('click', () => switchBlock('next'));

      document.getElementById('autoMineToggle').addEventListener('change', function(){ game.autoMine=this.checked; });
      document.getElementById('manualExchangeBtn').addEventListener('click', ()=>{
        if(game.gold>=100){ const g=manualExchange(game); if(g) showToast('获得 '+formatNum(g)+' 奖杯，使用增益重置'); }
        else showToast('金币不足100');
      });
      document.getElementById('autoExchangeToggle').addEventListener('change', function(){
        if(game.trophies>=10000) game.autoExchangeEnabled=this.checked;
        else { this.checked=false; game.autoExchangeEnabled=false; }
      });
      document.getElementById('autoExchangeThreshold').addEventListener('change', function(){
        const v=parseInt(this.value); game.autoExchangeThreshold = isNaN(v)||v<100?100:v; this.value=game.autoExchangeThreshold;
      });
      document.getElementById('zoneSwitchBtn').addEventListener('click', ()=>{
        game.currentZone = game.currentZone===1?2:1;
        game.currentBlockId = (game.currentZone===1?ZONE1:ZONE2)[0].id;
        if (!(game.currentBlockId in game.blockHpRemaining)) {
          const block = getBlock(game);
          game.blockHpRemaining[game.currentBlockId] = block.hp;
        }
        updateUI();
      });
      document.getElementById('blockSelect').addEventListener('change', function(){ game.currentBlockId=this.value; });
      document.getElementById('attrBtn').addEventListener('click', ()=>{
        const dmg = calcDmg(game);
        let html = `<button class="close-btn" id="modalClose">✕</button><h3>📋 详细属性</h3>
        <p>💰 金币 <b>${formatNumFull(game.gold)}</b></p><p>🏆 奖杯 <b>${formatNumFull(game.trophies)}</b></p>
        <p>⭐ 等级 <b>${game.level}</b> | 经验 <b>${formatNumFull(game.exp)}/${formatNumFull(expNeed(game.level))}</b></p>
        <p>⚡ 每次伤害 <b>${formatNumFull(dmg)}</b></p><hr>
        <p>镐子增益 <b>${formatNumFull(getPick(game.currentPickId)?.pickGain||1)}</b></p>
        <p>奖杯增益 <b>${formatNumFull(1+Math.pow(Math.max(0,game.trophies),3/5))}</b></p>
        <p>等级增益 <b>${formatNumFull(1+Math.pow(Math.max(0,game.level),0.5))}</b></p>
        <p>使用增益 <b>${formatNumFull(game.usageGain)}</b></p>
        <p>物品增益 <b>${formatNumFull(itemGain(game))}</b></p>
        <p>在线时间 <b>${Math.floor(game.onlineSeconds)}秒</b></p>`;
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modalOverlay').style.display='flex';
        document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('modalOverlay').style.display='none');
      });
      document.getElementById('modalOverlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) e.currentTarget.style.display='none'; });
      document.getElementById('saveBtn').addEventListener('click',()=>{
        const saves = []; for(let i=0;i<10;i++){ const d=load(i); saves.push({slot:i,data:d}); }
        let html = `<button class="close-btn" id="modalClose2">✕</button><h3>💾 存档 (当前槽${saveSlot})</h3>`;
        saves.forEach(s=>{
          const info = s.data ? `💰${formatNum(s.data.gold)} Lv${s.data.level}` : '空';
          html += `<div style="display:flex;gap:8px;align-items:center;padding:8px;border-bottom:1px solid rgba(255,255,255,0.06);">槽${s.slot}: ${info} <button class="btn btn-xs load-slot" data-slot="${s.slot}">加载</button><button class="btn btn-xs del-slot" data-slot="${s.slot}">删除</button></div>`;
        });
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modalOverlay').style.display='flex';
        document.getElementById('modalClose2').addEventListener('click',()=>document.getElementById('modalOverlay').style.display='none');
        document.querySelectorAll('.load-slot').forEach(b=>b.addEventListener('click',(e)=>{
          const slot = parseInt(e.target.dataset.slot);
          const loaded = load(slot);
          if(loaded){ game=loaded; saveSlot=slot; initHp(game); lastTick=Date.now(); lastMine=Date.now(); updateUI(); document.getElementById('modalOverlay').style.display='none'; }
          else showToast('存档为空');
        }));
        document.querySelectorAll('.del-slot').forEach(b=>b.addEventListener('click',(e)=>{
          const slot = parseInt(e.target.dataset.slot);
          localStorage.removeItem('pickGame_save_'+slot);
          if(slot===saveSlot){ game=createState(); initHp(game); saveSlot=0; }
          document.getElementById('modalOverlay').style.display='none';
        }));
      });
      document.getElementById('resetBtn').addEventListener('click',()=>{
        if(confirm('重置所有进度？')){ game=createState(); initHp(game); saveSlot=0; lastTick=Date.now(); lastMine=Date.now(); updateUI(); }
      });

      const initial = load(0);
      if(initial){ game=initial; saveSlot=0; initHp(game); lastTick=Date.now(); lastMine=Date.now(); }
      else { save(game,0); }
      updateUI();
      document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible'){ lastTick=Date.now(); lastMine=Date.now(); } });
    })();
  </script>
</body>
</html>
