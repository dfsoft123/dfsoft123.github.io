  function formatNum(n) {
    if (n == null || isNaN(n)) return '0';
    if (n < 0) return '-' + formatNum(-n);
    if (n < 10000) return Number.isInteger(n) ? n.toLocaleString() : n.toFixed(2);
    let idx = 0, v = n;
    while (v >= 10000 && idx < UNITS.length - 1) { v /= 10000; idx++; }
    return v.toFixed(2) + UNITS[idx];
  }

  function createState() {
    return {
      gold:0, trophies:0, level:0, exp:0, usageGain:1, onlineSeconds:0,
      currentPickId:'wood', pickCounts:{wood:1},
      fragmentCounts:{},
      bitcoinGain:1, bitcoinUsageMult:1, bitcoinGoldMult:1,
      currentZone:1, currentBlockId:'grass', blockHpRemaining:{},
      autoMine:false, autoExchangeEnabled:false, autoExchangeThreshold:10000,
    };
  }

  function initFragments(state) {
    const allKeys = Object.keys(FRAG_ICONS);
    allKeys.forEach(k => { if(!(k in state.fragmentCounts)) state.fragmentCounts[k] = 0; });
  }

  function getBlock(state) {
    const zone = [ZONE1,ZONE2,ZONE3,ZONE4][state.currentZone-1];
    return zone.find(b=>b.id===state.currentBlockId) || zone[0];
  }

  function getPick(id) { return PICKS.find(p=>p.id===id); }

  function itemGain(state) {
    let total = 1;
    for(const [key, val] of Object.entries(state.fragmentCounts)) {
      if(ITEM_GAIN_COEFF[key]) total += val * ITEM_GAIN_COEFF[key];
    }
    return total;
  }

  function calcDmg(state) {
    const pick = getPick(state.currentPickId); if(!pick) return 0;
    const trophyG = 1 + Math.pow(Math.max(0, state.trophies), 3/5);
    const levelG = 1 + Math.pow(Math.max(0, state.level), 0.5);
    const timeG = state.onlineSeconds > 100 ? 1 + Math.log(state.onlineSeconds/100) : 1;
    const base = pick.pickGain * trophyG * levelG * Math.max(1, state.usageGain) * state.bitcoinGain;
    return Math.pow(Math.max(1, base), 1/state.currentZone) * timeG;
  }

  function expNeed(lv) { return Math.pow(lv+1, 2); }

  function mine(state) {
    const block = getBlock(state); if(!block) return;
    const pick = getPick(state.currentPickId); if(!pick) return;
    const dmg = calcDmg(state);
    let hp = state.blockHpRemaining[block.id];
    if(hp === undefined) hp = block.hp;
    hp -= dmg;
    if(hp <= 0) {
      hp = block.hp || 0;
      const goldEarned = (block.gold || 0) * (pick.goldMult || 1) * state.bitcoinGoldMult;
      state.gold += goldEarned;
      state.exp += Math.pow(goldEarned, 1.2);
      if(block.drop && Math.random() < (block.rate || 0)) {
        const qty = typeof block.rate === 'number' && block.rate >= 1 ? block.rate : 1;
        state.fragmentCounts[block.drop] = (state.fragmentCounts[block.drop] || 0) + qty;
      }
      while(state.exp >= expNeed(state.level)) {
        state.exp -= expNeed(state.level);
        state.level++;
      }
    }
    state.blockHpRemaining[block.id] = Math.max(0, hp);
    state.usageGain += (pick.usageGain || 0) * state.bitcoinUsageMult;
    return dmg;
  }

  function switchPick(state, id) {
    if(!state.pickCounts[id]) state.pickCounts[id] = 0;
    if(state.pickCounts[id] >= 1) { state.currentPickId = id; return true; }
    return false;
  }

  function buyPick(state, id) {
    const p = getPick(id);
    if(!p || p.costTrophy == null || state.trophies < p.costTrophy) return false;
    state.trophies -= p.costTrophy;
    state.pickCounts[id] = (state.pickCounts[id]||0) + 1;
    return true;
  }

  function craftPick(state, id) {
    const p = getPick(id); if(!p || !p.craft) return {ok:false, msg:'不可合成'};
    const c = p.craft;
    if(c.reqPick && (state.pickCounts[c.reqPick]||0) < (c.reqPickQty||1)) return {ok:false, msg:'缺少镐子'};
    if(c.reqPick2 && (state.pickCounts[c.reqPick2]||0) < (c.reqPick2Qty||1)) return {ok:false, msg:'缺少镐子'};
    if(c.reqPick3 && (state.pickCounts[c.reqPick3]||0) < (c.reqPick3Qty||1)) return {ok:false, msg:'缺少镐子'};
    for(const [k, v] of Object.entries(c.fragments||{})) {
      if((state.fragmentCounts[k]||0) < v) return {ok:false, msg:'碎片不足'};
    }
    if(c.reqPick) state.pickCounts[c.reqPick] -= (c.reqPickQty||1);
    if(c.reqPick2) state.pickCounts[c.reqPick2] -= (c.reqPick2Qty||1);
    if(c.reqPick3) state.pickCounts[c.reqPick3] -= (c.reqPick3Qty||1);
    for(const [k, v] of Object.entries(c.fragments||{})) state.fragmentCounts[k] -= v;
    state.pickCounts[id] = (state.pickCounts[id]||0) + 1;
    return {ok:true};
  }

  function updateUI(state) {
    const pick = getPick(state.currentPickId);
    const block = getBlock(state);
    const dmg = calcDmg(state);
    document.getElementById('goldDisplay').textContent = formatNum(state.gold);
    document.getElementById('trophyDisplay').textContent = formatNum(state.trophies);
    document.getElementById('levelDisplay').textContent = state.level;
    document.getElementById('dmgDisplay').textContent = formatNum(dmg);
    document.getElementById('onlineDisplay').textContent = Math.floor(state.onlineSeconds)+'s';
    document.getElementById('zoneLabel').textContent = state.currentZone;
    document.getElementById('blockVisual').textContent = block?.emoji||'?';
    document.getElementById('blockName').textContent = block?.name||'?';
    const hp = state.blockHpRemaining[block?.id] || 0;
    document.getElementById('hpBar').style.width = (hp/(block?.hp||1)*100)+'%';
    document.getElementById('hpText').textContent = formatNumFull(hp)+' / '+formatNumFull(block?.hp||0);
    document.getElementById('statPick').textContent = formatNum(pick?.pickGain||1);
    document.getElementById('statTrophy').textContent = formatNum(1+Math.pow(Math.max(0,state.trophies),3/5));
    document.getElementById('statLevel').textContent = formatNum(1+Math.pow(Math.max(0,state.level),0.5));
    document.getElementById('statUsage').textContent = formatNum(state.usageGain);
    document.getElementById('statBitcoinGain').textContent = formatNum(state.bitcoinGain);
    document.getElementById('statTime').textContent = formatNum(state.onlineSeconds>100?1+Math.log(state.onlineSeconds/100):1);
    document.getElementById('expText').textContent = formatNumFull(state.exp)+' / '+formatNumFull(expNeed(state.level));
    document.getElementById('expBar').style.width = Math.min(100, state.exp/expNeed(state.level)*100)+'%';
    document.getElementById('cpName').textContent = (pick?.emoji||'')+' '+(pick?.name||'木镐');
    document.getElementById('cpStats').textContent = `间隔${pick?.interval||1}s | 增益${formatNum(pick?.pickGain||1)}`;
    document.title = '伤害：'+formatNum(dmg);
    const autoWrap = document.getElementById('autoExchangeWrap');
    if(state.trophies>=10000){ autoWrap.style.opacity='1'; autoWrap.style.pointerEvents='auto'; }
    else { autoWrap.style.opacity='0.4'; autoWrap.style.pointerEvents='none'; }
    document.getElementById('autoExchangeToggle').checked = state.autoExchangeEnabled;
    document.getElementById('autoExchangeThreshold').value = state.autoExchangeThreshold;
    document.getElementById('autoMineToggle').checked = state.autoMine;
    const preview = state.gold>=100 ? Math.floor(Math.pow(Math.floor(state.gold/100),2/3)) : 0;
    document.getElementById('manualExchangePreview').textContent = '+'+formatNum(preview)+' 🏆';
    document.getElementById('autoExchangePreview').textContent = '+'+formatNum(preview)+' 🏆';
    document.getElementById('bitcoinGainVal').textContent = state.bitcoinGain.toFixed(1);
    document.getElementById('bitcoinUsageMultVal').textContent = state.bitcoinUsageMult.toFixed(1);
    document.getElementById('bitcoinGoldMultVal').textContent = state.bitcoinGoldMult.toFixed(1);
    renderResources(state);
    renderShop(state);
    renderBlockSelect(state);
  }

  function renderResources(state) {
    const grid = document.getElementById('resourceGrid');
    grid.innerHTML = '';
    const entries = Object.entries(state.fragmentCounts).filter(([,v])=> v > 0);
    if(!entries.length) { grid.innerHTML = '<div style="color:#64748b;text-align:center;grid-column:1/-1;">尚未获得碎片</div>'; return; }
    entries.forEach(([k,v])=>{
      const div = document.createElement('div'); div.className='res-item';
      div.innerHTML = `<span class="res-icon">${FRAG_ICONS[k]||'?'}</span>${FRAG_NAMES[k]||k}<br><span class="res-val">${formatNum(v)}</span>`;
      grid.appendChild(div);
    });
  }

  function renderBlockSelect(state) {
    const sel = document.getElementById('blockSelect');
    sel.innerHTML = '';
    const zone = [ZONE1,ZONE2,ZONE3,ZONE4][state.currentZone-1];
    zone.forEach(b=>{
      const opt = document.createElement('option'); opt.value=b.id;
      opt.textContent = b.emoji+' '+b.name+(b.rate?` ${(b.rate*100).toFixed(2)}%`:'');
      if(b.id===state.currentBlockId) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  function renderShop(state) {
    const list = document.getElementById('shopList');
    list.innerHTML = '';
    PICKS.forEach(p=>{
      const qty = state.pickCounts[p.id]||0;
      const isCur = state.currentPickId===p.id;
      const row = document.createElement('div'); row.className='shop-row';
      let act = '';
      if(p.costTrophy != null) act = `<button class="btn btn-gold btn-xs buy-btn" data-id="${p.id}">🏆${formatNum(p.costTrophy)}</button>`;
      else if(p.craft) act = `<button class="btn btn-accent btn-xs craft-btn" data-id="${p.id}">🔧合成</button>`;
      const use = `<button class="btn btn-outline btn-xs use-btn" data-id="${p.id}" ${qty<1?'disabled':''}>${isCur?'✅使用中':'使用'}</button>`;
      row.innerHTML = `<span class="shop-emoji">${p.emoji}</span><span class="shop-name">${p.name}</span><span class="shop-info">${p.craft?'合成':'🏆'+formatNum(p.costTrophy||0)}</span><span class="shop-count">x${qty}</span>${act}${use}`;
      list.appendChild(row);
    });
    list.querySelectorAll('.buy-btn').forEach(b=>b.onclick = (e) => {
      if(buyPick(state, e.target.dataset.id)) updateUI(state); else showToast('奖杯不足');
    });
    list.querySelectorAll('.craft-btn').forEach(b=>b.onclick = (e) => {
      const res = craftPick(state, e.target.dataset.id);
      if(res.ok) updateUI(state); else showToast(res.msg);
    });
    list.querySelectorAll('.use-btn').forEach(b=>b.onclick = (e) => {
      if(switchPick(state, e.target.dataset.id)) updateUI(state); else showToast('数量不足');
    });
  }

  function showToast(msg) {
    let t = document.getElementById('toastMsg');
    if(!t){ t=document.createElement('div'); t.id='toastMsg'; t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e1e2f;color:#fff;padding:10px 24px;border-radius:40px;z-index:400;'; document.body.appendChild(t); }
    t.textContent=msg; t.style.opacity='1'; clearTimeout(t._to); t._to=setTimeout(()=>t.style.opacity='0',2000);
  }

  let state = createState();
  initFragments(state);
  [ZONE1,ZONE2,ZONE3,ZONE4].flat().forEach(b=>{ if(!(b.id in state.blockHpRemaining)) state.blockHpRemaining[b.id] = b.hp; });
  let lastTick = Date.now(), lastMine = Date.now();

  function tick() {
    const now = Date.now();
    state.onlineSeconds += (now - lastTick)/1000;
    lastTick = now;
    const pick = getPick(state.currentPickId);
    if((state.autoMine || window.isHolding) && (now-lastMine) >= (pick?.interval||1)*1000) {
      const dmg = mine(state);
      if(dmg) {
        const area = document.getElementById('blockArea');
        const rect = area.getBoundingClientRect();
        const el = document.createElement('div'); el.className='damage-float';
        el.textContent = formatNum(dmg);
        el.style.left = (rect.width/2 + (Math.random()-0.5)*80)+'px';
        el.style.top = (rect.height/3 + (Math.random()-0.5)*30)+'px';
        area.appendChild(el);
        setTimeout(()=>el.remove(), 1000);
      }
      lastMine = now;
    }
    if(state.autoExchangeEnabled && state.trophies>=10000 && state.gold>=Math.max(100, state.autoExchangeThreshold)) {
      const base = Math.floor(state.gold/100);
      state.trophies += Math.floor(Math.pow(base,2/3));
      state.gold -= base*100;
    }
    updateUI(state);
  }
  setInterval(tick, 80);
  setInterval(() => localStorage.setItem('pick_save', JSON.stringify(state)), 1000);

  const area = document.getElementById('blockArea');
  window.isHolding = false;
  area.addEventListener('mousedown', e => {
    if (e.target.closest('button, select, input, label')) return;
    e.preventDefault(); window.isHolding = true; lastMine = Date.now();
  });
  area.addEventListener('mouseup', () => window.isHolding = false);
  area.addEventListener('mouseleave', () => window.isHolding = false);
  area.addEventListener('touchstart', e => {
    if (e.target.closest('button, select, input, label')) return;
    e.preventDefault(); window.isHolding = true; lastMine = Date.now();
  });
  area.addEventListener('touchend', () => window.isHolding = false);
  area.addEventListener('touchcancel', () => window.isHolding = false);

  document.getElementById('prevBlockBtn').addEventListener('click', ()=>{
    const zone = [ZONE1,ZONE2,ZONE3,ZONE4][state.currentZone-1];
    const idx = zone.findIndex(b=>b.id===state.currentBlockId);
    state.currentBlockId = zone[(idx-1+zone.length)%zone.length].id;
  });
  document.getElementById('nextBlockBtn').addEventListener('click', ()=>{
    const zone = [ZONE1,ZONE2,ZONE3,ZONE4][state.currentZone-1];
    const idx = zone.findIndex(b=>b.id===state.currentBlockId);
    state.currentBlockId = zone[(idx+1)%zone.length].id;
  });
  document.getElementById('blockSelect').addEventListener('change', e => state.currentBlockId = e.target.value);
  document.getElementById('zoneSwitchBtn').addEventListener('click', ()=>{
    state.currentZone = (state.currentZone % 4) + 1;
    state.currentBlockId = [ZONE1,ZONE2,ZONE3,ZONE4][state.currentZone-1][0].id;
  });
  document.getElementById('autoMineToggle').addEventListener('change', e => state.autoMine = e.target.checked);
  document.getElementById('manualExchangeBtn').addEventListener('click', ()=>{
    if(state.gold>=100){
      const base = Math.floor(state.gold/100);
      const gained = Math.floor(Math.pow(base,2/3));
      state.gold -= base*100; state.trophies += gained; state.usageGain = 1;
      showToast('获得 '+formatNum(gained)+' 奖杯');
    } else showToast('金币不足100');
  });
  document.getElementById('autoExchangeToggle').addEventListener('change', e => {
    if(state.trophies>=10000) state.autoExchangeEnabled = e.target.checked;
    else e.target.checked = false;
  });
  document.getElementById('autoExchangeThreshold').addEventListener('change', e => {
    state.autoExchangeThreshold = Math.max(100, parseInt(e.target.value)||100);
  });

  // 比特币商店逻辑
  function bitcoinUpgrade(type) {
    const input = document.getElementById('bitcoinInput'+type);
    let amount = parseInt(input.value) || 0;
    if(amount <= 0) return;
    const cost = type===1 ? amount : (type===2 ? amount*10 : amount*100);
    if(state.fragmentCounts.bitcoin < cost) { showToast('比特币不足'); return; }
    state.fragmentCounts.bitcoin -= cost;
    if(type===1) state.bitcoinGain += amount * 0.1;
    else if(type===2) state.bitcoinUsageMult += amount * 0.1;
    else if(type===3) state.bitcoinGoldMult += amount * 0.1;
    updateUI(state);
  }
  function bitcoinMax(type) {
    const bitcoin = state.fragmentCounts.bitcoin;
    if(bitcoin <= 0) return;
    let amount = 0;
    if(type===1) amount = Math.floor(bitcoin);
    else if(type===2) amount = Math.floor(bitcoin/10);
    else if(type===3) amount = Math.floor(bitcoin/100);
    if(amount <= 0) return;
    document.getElementById('bitcoinInput'+type).value = amount;
    bitcoinUpgrade(type);
  }
  document.getElementById('bitcoinUpgrade1').addEventListener('click', ()=> bitcoinUpgrade(1));
  document.getElementById('bitcoinUpgrade2').addEventListener('click', ()=> bitcoinUpgrade(2));
  document.getElementById('bitcoinUpgrade3').addEventListener('click', ()=> bitcoinUpgrade(3));
  document.getElementById('bitcoinMax1').addEventListener('click', ()=> bitcoinMax(1));
  document.getElementById('bitcoinMax2').addEventListener('click', ()=> bitcoinMax(2));
  document.getElementById('bitcoinMax3').addEventListener('click', ()=> bitcoinMax(3));

  document.getElementById('attrBtn').addEventListener('click', ()=>{
    const dmg = calcDmg(state);
    let html = `<button class="close-btn" id="modalClose">✕</button><h3>详细属性</h3>
    <p>💰${formatNumFull(state.gold)} 🏆${formatNumFull(state.trophies)}</p>
    <p>Lv${state.level} 经验${formatNumFull(state.exp)}/${formatNumFull(expNeed(state.level))}</p>
    <p>伤害/次 ${formatNumFull(dmg)}</p><hr>
    <p>镐子 ${formatNumFull(getPick(state.currentPickId)?.pickGain||1)}</p>
    <p>奖杯 ${formatNumFull(1+Math.pow(Math.max(0,state.trophies),3/5))}</p>
    <p>等级 ${formatNumFull(1+Math.pow(Math.max(0,state.level),0.5))}</p>
    <p>使用 ${formatNumFull(state.usageGain)}</p>
    <p>比特币增益 ${formatNumFull(state.bitcoinGain)}</p>
    <p>比特币使用 ${formatNumFull(state.bitcoinUsageMult)}</p>
    <p>比特币金币 ${formatNumFull(state.bitcoinGoldMult)}</p>
    <p>在线 ${Math.floor(state.onlineSeconds)}s</p>`;
    document.getElementById('modalContent').innerHTML = html;
    document.getElementById('modalOverlay').style.display='flex';
    document.getElementById('modalClose').onclick = ()=> document.getElementById('modalOverlay').style.display='none';
  });
  document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target === e.currentTarget) e.currentTarget.style.display='none'; });

  const saved = JSON.parse(localStorage.getItem('pick_save'));
  if(saved) {
    state = saved;
    initFragments(state);
    [ZONE1,ZONE2,ZONE3,ZONE4].flat().forEach(b=>{ if(!(b.id in state.blockHpRemaining)) state.blockHpRemaining[b.id] = b.hp; });
  }
  updateUI(state);
})();
</script>
</body>
</html>
