<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0, shrink-to-fit=no">
  <title>伤害：0</title>
  <style>
    :root {
      --bg: #08090f;
      --surface: rgba(18, 20, 35, 0.75);
      --surface2: rgba(28, 30, 50, 0.8);
      --accent: #c084fc;
      --gold: #fbbf24;
      --green: #4ade80;
      --blue: #60a5fa;
      --red: #f87171;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --glow: 0 0 20px rgba(192, 132, 252, 0.3);
      --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
      background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(120, 50, 200, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(251, 191, 36, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(96, 165, 250, 0.04) 0%, transparent 50%);
      background-attachment: fixed;
    }

    #app {
      width: 100%;
      max-width: 920px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      backdrop-filter: blur(2px);
    }

    .status-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      backdrop-filter: blur(25px);
      border-radius: 60px;
      padding: 14px 24px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg), var(--glow);
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.05);
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text2);
      letter-spacing: 0.3px;
      transition: all 0.2s;
    }
    .chip.gold { background: rgba(251, 191, 36, 0.12); border: 1px solid rgba(251, 191, 36, 0.3); color: #fcd34d; }
    .chip.trophy { background: rgba(192, 132, 252, 0.12); border: 1px solid rgba(192, 132, 252, 0.3); color: #d8b4fe; }
    .chip span { font-weight: 700; color: #fff; margin-left: 4px; }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    @media (max-width: 750px) {
      .main-grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      backdrop-filter: blur(25px);
      border-radius: 32px;
      padding: 22px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card-header {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #cbd5e1;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding-bottom: 12px;
    }

    .mining-zone {
      background: var(--surface2);
      backdrop-filter: blur(25px);
      border-radius: 32px;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      cursor: pointer;
      transition: all 0.1s ease;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
    }
    .mining-zone:active { transform: scale(0.97); background: rgba(32, 34, 55, 0.9); }

    .block-icon {
      font-size: 5.5rem;
      filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
      transition: transform 0.2s;
    }
    .block-name {
      font-weight: 800;
      font-size: 1.4rem;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .hp-bar-wrap { width: 100%; display: flex; flex-direction: column; gap: 5px; }
    .hp-outer { height: 10px; background: rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; }
    .hp-inner { height: 100%; background: linear-gradient(90deg, #f87171, #fbbf24, #4ade80); border-radius: 12px; transition: width 0.2s; }
    .hp-text { font-size: 0.75rem; color: #94a3b8; text-align: center; }

    .zone-controls {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center;
    }
    select, .input-modern {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      padding: 10px 18px;
      border-radius: 40px;
      font-size: 0.8rem;
      outline: none;
      backdrop-filter: blur(15px);
      cursor: pointer;
    }

    .btn {
      padding: 11px 22px;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      background: rgba(255,255,255,0.08);
      color: #fff;
      backdrop-filter: blur(15px);
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.95); }
    .btn-accent { background: linear-gradient(135deg, #c084fc, #a855f7); color: #fff; border-color: transparent; font-weight: 700; }
    .btn-gold { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #0f0f1a; border-color: transparent; font-weight: 700; }
    .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.25); }
    .btn-sm { padding: 8px 18px; font-size: 0.75rem; }
    .btn-xs { padding: 6px 14px; font-size: 0.7rem; border-radius: 30px; }
    .btn-icon { padding: 8px 12px; font-size: 1.2rem; font-weight: 700; }

    .resource-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 8px;
      min-height: 50px;
    }
    .res-item {
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 10px 6px;
      text-align: center;
      font-size: 0.7rem;
      color: #cbd5e1;
      border: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }
    .res-icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }
    .res-val { font-weight: 700; color: #fff; font-size: 0.8rem; }

    .current-pick-card {
      background: rgba(192,132,252,0.08);
      border: 1px solid rgba(192,132,252,0.3);
      border-radius: 24px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .pick-icon { font-size: 2.2rem; }
    .pick-name { font-weight: 700; font-size: 1.2rem; color: #fff; }
    .pick-desc { font-size: 0.8rem; color: #94a3b8; }

    .shop-list { display: flex; flex-direction: column; gap: 8px; max-height: 380px; overflow-y: auto; }
    .shop-row {
      display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03);
      border-radius: 18px; padding: 12px 16px;
    }
    .shop-emoji { font-size: 1.8rem; width: 40px; }
    .shop-name { font-weight: 700; color: #fff; width: 90px; }
    .shop-info { font-size: 0.7rem; color: #94a3b8; flex: 1; }
    .shop-count { font-weight: 700; color: #fbbf24; }

    .switch-wrap { display: flex; align-items: center; gap: 12px; font-size: 0.8rem; }
    .switch-slider {
      width: 48px; height: 26px; background: #475569; border-radius: 13px; position: relative;
    }
    .switch-slider::after {
      content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px;
      border-radius: 50%; background: #fff; transition: left 0.3s;
    }
    input:checked + .switch-slider { background: #4ade80; }
    input:checked + .switch-slider::after { left: 25px; }

    .exchange-preview {
      font-size: 0.7rem; color: #fbbf24; background: rgba(251,191,36,0.1);
      padding: 4px 10px; border-radius: 20px;
    }

    .damage-float {
      position: absolute; pointer-events: none; color: #f87171; font-weight: 800;
      font-size: 1.2rem; text-shadow: 0 0 16px rgba(248,113,113,0.9);
      animation: floatUp 1s ease-out forwards; z-index: 200;
    }
    @keyframes floatUp {
      0% { opacity:1; transform: translateY(0) scale(1); }
      100% { opacity:0; transform: translateY(-80px) scale(0.6); }
    }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      z-index: 300; display: flex; align-items: center; justify-content: center;
    }
    .modal {
      background: var(--surface); border-radius: 28px; padding: 24px;
      max-width: 480px; width: 92%; max-height: 80vh; overflow-y: auto;
    }
    .close-btn {
      position: sticky; top: 0; float: right; background: #ef4444; border: none;
      color: #fff; width: 34px; height: 34px; border-radius: 50%; font-size: 18px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="status-bar">

      <div style="display:flex;flex-direction:column;gap:18px;">

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <div><span>镐子</span> <span id="statPick">1</span></div>
            <div><span>奖杯</span> <span id="statTrophy">1</span></div>
            <div><span>等级</span> <span id="statLevel">1</span></div>
            <div><span>使用</span> <span id="statUsage">1</span></div>
            <div><span>物品</span> <span id="statItem">1</span></div>
            <div><span>时间</span> <span id="statTime">1</span></div>
          </div>
          <div>
            <span id="expText">0/1</span>
            <div class="hp-outer"><div class="hp-inner" id="expBar" style="width:0%"></div></div>
          </div>
          <button class="btn btn-accent btn-sm" id="manualExchangeBtn">🔄 手动兑换奖杯</button>
          <span class="exchange-preview" id="manualExchangePreview">+0 🏆</span>
          <div class="switch-wrap" id="autoExchangeWrap" style="opacity:0.4;pointer-events:none;">
            <label><input type="checkbox" id="autoExchangeToggle"> 🏅 自动兑换</label>
            <input type="number" id="autoExchangeThreshold" value="10000" class="input-modern" style="width:70px;">
            <span class="exchange-preview" id="autoExchangePreview">+0 🏆</span>
          </div>
        </div>
        <div class="card">
          <div class="card-header">💎 资源碎片</div>
          <div class="resource-grid" id="resourceGrid"></div>
        </div>
      </div>
    </div>

    <div class="current-pick-card">
      <div class="pick-icon">⛏️</div>
      <div>
        <div class="pick-name" id="cpName">木镐</div>
        <div class="pick-desc" id="cpStats">间隔1s | 增益1</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">🏪 镐具商店 / 合成台</div>
      <div class="shop-list" id="shopList"></div>
    </div>

    <div style="display:flex;gap:12px;justify-content:center;">
      <button class="btn btn-sm" id="attrBtn">📋 详细属性</button>
      <button class="btn btn-sm" id="saveBtn">💾 存档管理</button>
      <button class="btn btn-sm" id="resetBtn">⚠️ 重置游戏</button>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal" id="modalContent"></div>
  </div>

  <script>
    (function() {
      const UNITS = ['', '万', '亿', '万亿', '兆', '万兆', '亿兆', '万亿兆', '京', '万京', '亿京', '万亿京', '兆京', '万兆京', '亿兆京', '万亿兆京', '垓'];
      function formatNum(n) {
        if (n == null || isNaN(n)) return '0';
        if (n < 0) return '-' + formatNum(-n);
        if (n < 10000) return Number.isInteger(n) ? n.toLocaleString() : n.toFixed(2);
        let idx = 0, v = n;
        while (v >= 10000 && idx < UNITS.length - 1) { v /= 10000; idx++; }
        return v.toFixed(2) + UNITS[idx];
      }
      function formatNumFull(n) {
        if (n == null || isNaN(n)) return '0';
        if (n < 0) return '-' + formatNumFull(-n);
        if (n < 10000) return n.toLocaleString();
        let idx = 0, v = n;
        while (v >= 10000 && idx < UNITS.length - 1) { v /= 10000; idx++; }
        return v.toFixed(4) + ' ' + UNITS[idx];
      }

        {id:'220_mid',name:'220中级',hp:220220000000,gold:22022000000,dropFrag:'fragment220',dropRate:0.001,emoji:'2️⃣2️⃣0️⃣⭐'},
      ];

      const FRAG_ICONS = { redObsidian:'❤️', blueObsidian:'💙', greenObsidian:'💚', yellowObsidian:'💛', cyanObsidian:'🩵', bedrockFragment:'🪨', fragment220:'⚡' };
      const FRAG_NAMES = { redObsidian:'红曜石', blueObsidian:'蓝曜石', greenObsidian:'绿曜石', yellowObsidian:'黄曜石', cyanObsidian:'青曜石', bedrockFragment:'基岩', fragment220:'220' };

      let game = {
        gold:0, trophies:0, level:0, exp:0, usageGain:1, onlineSeconds:0,
        currentPickId:'wood', pickCounts:{wood:1},
        fragmentCounts:{redObsidian:0,blueObsidian:0,greenObsidian:0,yellowObsidian:0,cyanObsidian:0,bedrockFragment:0,fragment220:0},
        currentZone:1, currentBlockId:'grass', blockHpRemaining:{},
        autoMine:false, autoExchangeEnabled:false, autoExchangeThreshold:10000,
      };
      [...ZONE1,...ZONE2].forEach(b=>{ game.blockHpRemaining[b.id] = b.hp; });

      function getBlock() { return (game.currentZone===1?ZONE1:ZONE2).find(b=>b.id===game.currentBlockId); }
      function getPick(id) { return PICKS.find(p=>p.id===id); }
      function itemGain() {
        const f = game.fragmentCounts;
        return 1 + (f.redObsidian||0)*0.1 + (f.blueObsidian||0)*0.2 + (f.greenObsidian||0)*0.3 + (f.yellowObsidian||0)*0.4 + (f.cyanObsidian||0)*0.5 + (f.bedrockFragment||0)*0.8 + (f.fragment220||0)*220;
      }
      function calcDmg() {
        const p = getPick(game.currentPickId); if(!p) return 0;
        const trophyG = 1+Math.pow(Math.max(0,game.trophies),3/5);
        const levelG = 1+Math.pow(Math.max(0,game.level),0.5);
        const timeG = game.onlineSeconds>100 ? 1+Math.log(game.onlineSeconds/100) : 1;
        const base = p.pickGain * trophyG * levelG * Math.max(1,game.usageGain) * itemGain();
        return Math.pow(Math.max(1,base), 1/game.currentZone) * timeG;
      }
      function expNeed(lv) { return Math.pow(lv+1,2); }

      function mine() {
        const block = getBlock(); if(!block) return;
        const p = getPick(game.currentPickId); if(!p) return;
        const dmg = calcDmg();
        let hp = game.blockHpRemaining[block.id];
        hp -= dmg;
        if(hp <= 0) {
          hp = block.hp;
          const goldEarned = block.gold * (p.goldMult||1);
          game.gold += goldEarned;
          game.exp += Math.pow(goldEarned, 1.2);
          if(block.dropFrag && Math.random() < (block.dropRate||0)) {
            game.fragmentCounts[block.dropFrag] = (game.fragmentCounts[block.dropFrag]||0)+1;
          }
          while(game.exp >= expNeed(game.level)) { game.exp -= expNeed(game.level); game.level++; }
        }
        game.blockHpRemaining[block.id] = hp;
        game.usageGain += p.usageGain;
        return dmg;
      }

      function switchPick(id) {
        if(!game.pickCounts[id]) game.pickCounts[id]=0;
        if(game.pickCounts[id] >= 1) { game.currentPickId = id; return true; }
        return false;
      }
      function buyPick(id) {
        const p = getPick(id); if(!p || p.costTrophy == null || game.trophies < p.costTrophy) return false;
        game.trophies -= p.costTrophy;
        game.pickCounts[id] = (game.pickCounts[id]||0)+1;
        return true;
      }
      function craftPick(id) {
        const p = getPick(id); if(!p || !p.craft) return {ok:false,msg:'不可合成'};
        const c = p.craft;
        if(c.reqPick && (game.pickCounts[c.reqPick]||0) < 1) return {ok:false,msg:'缺少'+c.reqPickName};
        if(c.reqPick2 && (game.pickCounts[c.reqPick2]||0) < 1) return {ok:false,msg:'缺少'+c.reqPick2Name};
        if(c.reqPick3 && (game.pickCounts[c.reqPick3]||0) < 1) return {ok:false,msg:'缺少'+c.reqPick3Name};
        for(const [k,v] of Object.entries(c.fragments||{})) {
          if((game.fragmentCounts[k]||0) < v) return {ok:false,msg:'碎片不足'};
        }
        if(c.reqPick) game.pickCounts[c.reqPick]--;
        if(c.reqPick2) game.pickCounts[c.reqPick2]--;
        if(c.reqPick3) game.pickCounts[c.reqPick3]--;
        for(const [k,v] of Object.entries(c.fragments||{})) game.fragmentCounts[k] -= v;
        game.pickCounts[id] = (game.pickCounts[id]||0)+1;
        return {ok:true};
      }

      function updateUI() {
        const p = getPick(game.currentPickId);
        const block = getBlock();
        const dmg = calcDmg();
        document.getElementById('goldDisplay').textContent = formatNum(game.gold);
        document.getElementById('trophyDisplay').textContent = formatNum(game.trophies);
        document.getElementById('levelDisplay').textContent = game.level;
        document.getElementById('dmgDisplay').textContent = formatNum(dmg);
        document.getElementById('onlineDisplay').textContent = Math.floor(game.onlineSeconds)+'s';
        document.getElementById('zoneLabel').textContent = game.currentZone;
        document.getElementById('blockVisual').textContent = block?.emoji||'?';
        document.getElementById('blockName').textContent = block?.name||'?';
        const hp = game.blockHpRemaining[block?.id] || 0;
        document.getElementById('hpBar').style.width = (hp/block.hp*100)+'%';
        document.getElementById('hpText').textContent = formatNumFull(hp)+' / '+formatNumFull(block.hp);
        document.getElementById('statPick').textContent = formatNum(p?.pickGain||1);
        document.getElementById('statTrophy').textContent = formatNum(1+Math.pow(Math.max(0,game.trophies),3/5));
        document.getElementById('statLevel').textContent = formatNum(1+Math.pow(Math.max(0,game.level),0.5));
        document.getElementById('statUsage').textContent = formatNum(game.usageGain);
        document.getElementById('statItem').textContent = formatNum(itemGain());
        document.getElementById('statTime').textContent = formatNum(game.onlineSeconds>100?1+Math.log(game.onlineSeconds/100):1);
        const need = expNeed(game.level);
        document.getElementById('expBar').style.width = Math.min(100,(game.exp/need)*100)+'%';
        document.getElementById('expText').textContent = formatNumFull(game.exp)+' / '+formatNumFull(need);
        document.getElementById('cpName').textContent = (p?.emoji||'')+' '+(p?.name||'木镐');
        document.getElementById('cpStats').textContent = `间隔${p?.interval||1}s | 增益${formatNum(p?.pickGain||1)}`;
        document.title = '伤害：'+formatNum(dmg);
        const autoWrap = document.getElementById('autoExchangeWrap');
        if(game.trophies>=10000){ autoWrap.style.opacity='1'; autoWrap.style.pointerEvents='auto'; }
        else { autoWrap.style.opacity='0.4'; autoWrap.style.pointerEvents='none'; }
        document.getElementById('autoExchangeToggle').checked = game.autoExchangeEnabled;
        document.getElementById('autoExchangeThreshold').value = game.autoExchangeThreshold;
        document.getElementById('autoMineToggle').checked = game.autoMine;
        const preview = game.gold>=100 ? Math.floor(Math.pow(Math.floor(game.gold/100),2/3)) : 0;
        document.getElementById('manualExchangePreview').textContent = '+' + formatNum(preview) + ' 🏆';
        document.getElementById('autoExchangePreview').textContent = '+' + formatNum(preview) + ' 🏆';
        renderShop();
        renderBlockSelect();
        renderResources();
      }

      function renderResources() {
        const grid = document.getElementById('resourceGrid');
        grid.innerHTML = '';
        const frags = Object.entries(game.fragmentCounts).filter(([,v])=>v>0);
        if(!frags.length) grid.innerHTML = '<div style="color:#64748b;">尚未获得碎片</div>';
        else frags.forEach(([k,v])=>{
          const d = document.createElement('div'); d.className='res-item';
          d.innerHTML = `<span class="res-icon">${FRAG_ICONS[k]}</span>${FRAG_NAMES[k]}<br><span class="res-val">${formatNum(v)}</span>`;
          grid.appendChild(d);
        });
      }

      function renderBlockSelect() {
        const sel = document.getElementById('blockSelect');
        sel.innerHTML = '';
        (game.currentZone===1?ZONE1:ZONE2).forEach(b=>{
          const o = document.createElement('option'); o.value=b.id; o.textContent=b.emoji+' '+b.name;
          if(b.id===game.currentBlockId) o.selected=true;
          sel.appendChild(o);
        });
      }

      function renderShop() {
        const list = document.getElementById('shopList');
        list.innerHTML = '';
        PICKS.forEach(p=>{
          const qty = game.pickCounts[p.id]||0;
          const isCur = game.currentPickId===p.id;
          const row = document.createElement('div'); row.className='shop-row';
          let act = '';
          if(p.costTrophy != null) act = `<button class="btn btn-gold btn-xs buy-btn" data-id="${p.id}">🏆${formatNum(p.costTrophy)}</button>`;
          else if(p.craft) act = `<button class="btn btn-accent btn-xs craft-btn" data-id="${p.id}">🔧合成</button>`;
          const use = `<button class="btn btn-outline btn-xs use-btn" data-id="${p.id}" ${qty<1?'disabled':''}>${isCur?'✅使用中':'使用'}</button>`;
          row.innerHTML = `<span class="shop-emoji">${p.emoji}</span><span class="shop-name">${p.name}</span><span class="shop-info">${p.craft?'合成':'🏆'+formatNum(p.costTrophy||0)}</span><span class="shop-count">x${qty}</span>${act}${use}`;
          list.appendChild(row);
        });
        // 绑定事件
        list.querySelectorAll('.buy-btn').forEach(b=>b.onclick = (e) => {
          if(buyPick(e.target.dataset.id)) updateUI(); else showToast('奖杯不足');
        });
        list.querySelectorAll('.craft-btn').forEach(b=>b.onclick = (e) => {
          const res = craftPick(e.target.dataset.id);
          if(res.ok) updateUI(); else showToast(res.msg);
        });
        list.querySelectorAll('.use-btn').forEach(b=>b.onclick = (e) => {
          if(switchPick(e.target.dataset.id)) updateUI(); else showToast('数量不足');
        });
      }

      function showToast(msg) {
        let t = document.getElementById('toastMsg');
        if(!t){ t=document.createElement('div'); t.id='toastMsg'; t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e1e2f;color:#fff;padding:10px 24px;border-radius:40px;z-index:400;'; document.body.appendChild(t); }
        t.textContent=msg; t.style.opacity='1'; clearTimeout(t._to); t._to=setTimeout(()=>t.style.opacity='0',2000);
      }

      let lastTick = Date.now(), lastMine = Date.now();
      function tick() {
        const now = Date.now();
        game.onlineSeconds += (now-lastTick)/1000;
        lastTick = now;
        const p = getPick(game.currentPickId);
        if((game.autoMine || window.isHolding) && (now-lastMine) >= (p?.interval||1)*1000) {
          const dmg = mine();
          if(dmg) {
            const area = document.getElementById('blockArea');
            const rect = area.getBoundingClientRect();
            const el = document.createElement('div'); el.className='damage-float';
            el.textContent = formatNum(dmg);
            el.style.left = (rect.width/2 + (Math.random()-0.5)*80)+'px';
            el.style.top = (rect.height/3 + (Math.random()-0.5)*30)+'px';
            area.appendChild(el);
            setTimeout(()=>el.remove(), 1000);
          }
          lastMine = now;
        }
        if(game.autoExchangeEnabled && game.trophies>=10000 && game.gold>=Math.max(100,game.autoExchangeThreshold)) {
          const base = Math.floor(game.gold/100);
          game.trophies += Math.floor(Math.pow(base,2/3));
          game.gold -= base*100;
        }
        updateUI();
      }
      setInterval(tick, 80);
      setInterval(() => localStorage.setItem('pick_save', JSON.stringify(game)), 1000);

      // 修复按钮点击：只在方块区域本身按下时阻止默认，避免影响内部按钮
      const area = document.getElementById('blockArea');
      window.isHolding = false;
      area.addEventListener('mousedown', e => {
        if (e.target.closest('button, select, input, label')) return;
        e.preventDefault();
        window.isHolding = true;
        lastMine = Date.now();
      });
      area.addEventListener('mouseup', e => { window.isHolding = false; });
      area.addEventListener('mouseleave', () => { window.isHolding = false; });
      area.addEventListener('touchstart', e => {
        if (e.target.closest('button, select, input, label')) return;
        e.preventDefault();
        window.isHolding = true;
        lastMine = Date.now();
      });
      area.addEventListener('touchend', e => { window.isHolding = false; });
      area.addEventListener('touchcancel', () => { window.isHolding = false; });

      document.getElementById('prevBlockBtn').addEventListener('click', () => {
        const zone = game.currentZone===1?ZONE1:ZONE2;
        const idx = zone.findIndex(b=>b.id===game.currentBlockId);
        game.currentBlockId = zone[(idx-1+zone.length)%zone.length].id;
        game.blockHpRemaining[game.currentBlockId] = zone.find(b=>b.id===game.currentBlockId).hp;
      });
      document.getElementById('nextBlockBtn').addEventListener('click', () => {
        const zone = game.currentZone===1?ZONE1:ZONE2;
        const idx = zone.findIndex(b=>b.id===game.currentBlockId);
        game.currentBlockId = zone[(idx+1)%zone.length].id;
        game.blockHpRemaining[game.currentBlockId] = zone.find(b=>b.id===game.currentBlockId).hp;
      });
      document.getElementById('blockSelect').addEventListener('change', e => game.currentBlockId = e.target.value);
      document.getElementById('zoneSwitchBtn').addEventListener('click', () => {
        game.currentZone = game.currentZone===1?2:1;
        game.currentBlockId = (game.currentZone===1?ZONE1:ZONE2)[0].id;
        game.blockHpRemaining[game.currentBlockId] = (game.currentZone===1?ZONE1:ZONE2)[0].hp;
      });
      document.getElementById('autoMineToggle').addEventListener('change', e => game.autoMine = e.target.checked);
      document.getElementById('manualExchangeBtn').addEventListener('click', () => {
        if(game.gold>=100) {
          const base = Math.floor(game.gold/100);
          const gained = Math.floor(Math.pow(base,2/3));
          game.gold -= base*100;
          game.trophies += gained;
          game.usageGain = 1;
          showToast('获得 '+formatNum(gained)+' 奖杯，使用增益重置');
        } else showToast('金币不足100');
      });
      document.getElementById('autoExchangeToggle').addEventListener('change', e => {
        if(game.trophies>=10000) game.autoExchangeEnabled = e.target.checked;
        else e.target.checked = false;
      });
      document.getElementById('autoExchangeThreshold').addEventListener('change', e => {
        game.autoExchangeThreshold = Math.max(100, parseInt(e.target.value)||100);
        e.target.value = game.autoExchangeThreshold;
      });

      // 存档与重置
      document.getElementById('saveBtn').addEventListener('click', ()=>{
        const saves = [];
        for(let i=0;i<10;i++) { const d=localStorage.getItem('pick_save_'+i); saves.push(d?JSON.parse(d):null); }
        let html = '<button class="close-btn" id="modalClose2">✕</button><h3>存档管理</h3>';
        saves.forEach((s,i)=>{
          html += `<div>槽${i}: ${s?`💰${formatNum(s.gold)} Lv${s.level}`:'空'} <button class="btn btn-xs load-save" data-slot="${i}">加载</button><button class="btn btn-xs del-save" data-slot="${i}">删除</button></div>`;
        });
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modalOverlay').style.display='flex';
        document.getElementById('modalClose2').onclick = ()=> document.getElementById('modalOverlay').style.display='none';
        document.querySelectorAll('.load-save').forEach(b=>b.onclick = (e)=>{
          const data = JSON.parse(localStorage.getItem('pick_save_'+e.target.dataset.slot));
          if(data) { game = data; lastTick=Date.now(); lastMine=Date.now(); }
          document.getElementById('modalOverlay').style.display='none';
        });
        document.querySelectorAll('.del-save').forEach(b=>b.onclick = (e)=>{
          localStorage.removeItem('pick_save_'+e.target.dataset.slot);
          document.getElementById('modalOverlay').style.display='none';
        });
      });
      document.getElementById('resetBtn').addEventListener('click', ()=>{
        if(confirm('重置？')) {
          game = { gold:0, trophies:0, level:0, exp:0, usageGain:1, onlineSeconds:0, currentPickId:'wood', pickCounts:{wood:1}, fragmentCounts:{redObsidian:0,blueObsidian:0,greenObsidian:0,yellowObsidian:0,cyanObsidian:0,bedrockFragment:0,fragment220:0}, currentZone:1, currentBlockId:'grass', blockHpRemaining:{}, autoMine:false, autoExchangeEnabled:false, autoExchangeThreshold:10000 };
          [...ZONE1,...ZONE2].forEach(b=> game.blockHpRemaining[b.id]=b.hp);
        }
      });

      const saved = JSON.parse(localStorage.getItem('pick_save'));
      if(saved) game = saved;
      updateUI();
    })();
  </script>
</body>
</html>
