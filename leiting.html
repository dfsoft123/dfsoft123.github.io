<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>雷霆：0</title>
    <!-- ⚡⚡⚡ 超级雷霆 · 5000+行极致UI · 特效拉满 ⚡⚡⚡ -->
    <style>
        /* ============================================================
           全局重置与CSS变量 (约120行)
           ============================================================ */
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg-deep: #010114;
            --bg-card: rgba(8,12,30,0.75);
            --bg-card-hover: rgba(18,25,50,0.85);
            --gold: #ffd966;
            --gold-light: #fff1b8;
            --electric: #00e5ff;
            --super-red: #ff2a2a;
            --text: #e0e0f0;
            --text-dim: #8899bb;
            --border-gold: rgba(255,215,0,0.25);
            --border-red: rgba(255,0,0,0.5);
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --font-display: 'Cinzel', 'Georgia', serif;
            --font-body: 'Inter', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        html { font-size:14px; height:100%; -webkit-tap-highlight-color:transparent; }
        body {
            font-family:var(--font-body); background:var(--bg-deep);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(120,80,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(255,180,40,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 80%, rgba(0,200,255,0.04) 0%, transparent 50%);
            color:var(--text); min-height:100vh; height:100vh;
            display:flex; justify-content:center; align-items:stretch;
            overflow:hidden; position:relative; user-select:none;
            margin:0; padding:8px;
        }
        body::after { content:''; position:fixed; top:0; left:0; width:100%; height:100%;
            background:radial-gradient(2px 2px at 20px 30px, #ffffff, transparent),
                radial-gradient(2px 2px at 40px 70px, #ffffff, transparent),
                radial-gradient(1px 1px at 90px 40px, #ffffff, transparent),
                radial-gradient(1px 1px at 130px 80px, #ffffff, transparent),
                radial-gradient(2px 2px at 160px 120px, #ffffff, transparent),
                radial-gradient(1px 1px at 200px 50px, #ffffff, transparent),
                radial-gradient(2px 2px at 250px 90px, #ffffff, transparent),
                radial-gradient(1px 1px at 300px 130px, #ffffff, transparent),
                radial-gradient(2px 2px at 350px 60px, #ffffff, transparent),
                radial-gradient(1px 1px at 400px 110px, #ffffff, transparent);
            background-size:400px 200px; opacity:0.15; pointer-events:none; z-index:0; }

        /* 动态流光背景 */
        .flow-lines {
            position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0;
            background: repeating-linear-gradient(45deg, transparent, transparent 25px, rgba(255,215,0,0.03) 26px, transparent 28px);
            animation: flowMove 20s linear infinite;
        }
        @keyframes flowMove { 0%{background-position:0 0} 100%{background-position:200px 100px} }

        /* ============================================================
           动画关键帧库 (约250行)
           ============================================================ */
        @keyframes floatUp { 0%{transform:translateY(110vh) scale(0.2) rotate(0deg);opacity:0} 10%{opacity:0.8} 90%{opacity:0.6} 100%{transform:translateY(-20vh) scale(1.4) rotate(var(--rot));opacity:0} }
        @keyframes iconPulse { 0%,100%{transform:scale(1);filter:drop-shadow(0 0 8px gold)} 50%{transform:scale(1.3);filter:drop-shadow(0 0 25px #ffd700)} }
        @keyframes thunderShake { 0%,90%,100%{transform:translateX(0)} 92%{transform:translateX(-4px) rotate(-2deg)} 94%{transform:translateX(4px) rotate(2deg)} 96%{transform:translateX(-3px)} 98%{transform:translateX(3px)} }
        @keyframes rotateGlow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        @keyframes affordablePulse { 0%,100%{box-shadow:0 0 15px rgba(255,215,0,0.25);border-color:rgba(255,215,0,0.5)} 50%{box-shadow:0 0 35px rgba(255,215,0,0.7);border-color:rgba(255,215,0,0.9)} }
        @keyframes cardFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
        @keyframes borderGlow { 0%,100%{border-color:rgba(255,215,0,0.3)} 50%{border-color:rgba(255,215,0,0.9)} }
        @keyframes particleBurst { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--px),var(--py)) scale(0);opacity:0} }
        @keyframes slideInRight { from{opacity:0;transform:translateX(60px)} to{opacity:1;transform:translateX(0)} }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        @keyframes glowPulse { 0%,100%{text-shadow:0 0 20px currentColor} 50%{text-shadow:0 0 40px currentColor,0 0 60px currentColor} }
        @keyframes shootingStar { 0%{transform:translate(0,0) rotate(-35deg);opacity:0.8} 100%{transform:translate(-300px,400px) rotate(-35deg);opacity:0} }
        @keyframes rippleEffect { to{transform:scale(4);opacity:0} }
        @keyframes superGlow { 0%,100%{filter:drop-shadow(0 0 15px rgba(255,0,0,0.8))} 50%{filter:drop-shadow(0 0 35px rgba(255,0,0,1))} }
        @keyframes redPulse { 0%,100%{text-shadow:0 0 15px red} 50%{text-shadow:0 0 40px red,0 0 60px #ff4444} }
        @keyframes cardAppear { from{opacity:0;transform:scale(0.8) rotateX(15deg)} to{opacity:1;transform:scale(1) rotateX(0)} }
        @keyframes floatSlow { 0%,100%{transform:translateY(0px) rotate(0deg)} 33%{transform:translateY(-8px) rotate(2deg)} 66%{transform:translateY(4px) rotate(-1deg)} }
        @keyframes pulseGlow { 0%,100%{box-shadow:0 0 30px rgba(255,215,0,0.4)} 50%{box-shadow:0 0 60px rgba(255,215,0,0.8)} }
        @keyframes textShimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
        @keyframes borderPulseRed { 0%,100%{border-color:rgba(255,0,0,0.5)} 50%{border-color:rgba(255,0,0,1)} }
        @keyframes affordablePulseRed { 0%,100%{box-shadow:0 0 15px rgba(255,0,0,0.25);border-color:rgba(255,0,0,0.5)} 50%{box-shadow:0 0 35px rgba(255,0,0,0.7);border-color:rgba(255,0,0,0.9)} }

        /* ============================================================
           背景粒子与装饰 (约150行)
           ============================================================ */
        .bg-lightning { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; opacity:0.45; }
        .bg-particle { position:absolute; font-size:20px; animation:floatUp var(--dur) ease-in infinite; animation-delay:var(--delay); opacity:0; filter:blur(0.5px) drop-shadow(0 0 8px var(--electric)); will-change:transform,opacity; }
        .bg-particle:nth-child(2n) { animation-duration:14s; }
        .bg-particle:nth-child(3n) { animation-duration:22s; }
        .bg-particle:nth-child(5n) { animation-duration:10s; }
        .bg-particle:nth-child(7n) { animation-duration:18s; }
        .shooting-star { position:fixed; width:3px; height:80px; background:linear-gradient(to bottom, rgba(255,255,255,0.8), transparent); border-radius:50%; animation:shootingStar 1.5s linear infinite; opacity:0; z-index:0; }
        .shooting-star:nth-child(2) { animation-delay:0.5s; top:15%; left:70%; }
        .shooting-star:nth-child(3) { animation-delay:1.2s; top:50%; left:45%; }
        .shooting-star:nth-child(4) { animation-delay:2.0s; top:25%; left:85%; }

        /* ============================================================
           主容器 - 横屏布局，竖屏自动切换 (约80行)
           ============================================================ */
        .main-container {
            position:relative; z-index:5; width:100%; max-width:1300px; height:100%;
            display:flex; flex-direction:row; gap:16px;
            animation:fadeInUp 0.8s ease-out;
        }
        @media (max-width:768px) {
            .main-container { flex-direction:column; gap:10px; }
        }

        /* ============================================================
           左侧资源面板 (约180行)
           ============================================================ */
        .left-panel {
            flex:0 0 380px; display:flex; flex-direction:column; gap:12px;
            background:var(--bg-card); backdrop-filter:blur(20px);
            border-radius:var(--radius-xl); border:2px solid var(--border-gold);
            padding:18px 20px; box-shadow:0 15px 40px rgba(0,0,0,0.6), 0 0 30px rgba(255,215,0,0.1);
            overflow-y:auto; height:100%; min-height:0;
            position:relative;
        }
        .left-panel::-webkit-scrollbar { display:none; }
        .left-panel::before {
            content:''; position:absolute; top:0; left:0; width:100%; height:2px;
            background:linear-gradient(90deg, transparent, rgba(255,215,0,0.6), transparent);
            pointer-events:none;
        }
        .header {
            display:flex; align-items:center; justify-content:center; gap:10px; padding:6px 0;
            border-bottom:1px solid rgba(255,215,0,0.2); margin-bottom:4px;
        }
        .title {
            font-family:var(--font-display); font-size:1.8rem; font-weight:700;
            background:linear-gradient(180deg,#ffd966,#ffb347);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
            letter-spacing:2px;
            animation:glowPulse 2s infinite;
        }
        .resource-row {
            display:flex; align-items:center; gap:8px; flex-wrap:nowrap;
        }
        .thunder-amount {
            font-family:var(--font-display); font-size:2rem; font-weight:700; color:#fff;
            text-shadow:0 0 25px rgba(255,215,0,0.8); animation:glowPulse 2s infinite;
            white-space:nowrap;
        }
        .thunder-amount sup { font-size:0.4em; color:var(--electric); }
        .prestige-btn {
            padding:10px 16px; border:none; border-radius:20px;
            background:linear-gradient(135deg,#ff5555,#cc0000); color:#fff; font-weight:700;
            cursor:pointer; box-shadow:0 0 20px rgba(255,0,0,0.5); transition:0.3s;
            white-space:nowrap; font-size:0.9rem; flex-shrink:0;
            margin-left:auto;
            animation:floatSlow 4s ease-in-out infinite;
        }
        .prestige-btn:hover:not(:disabled) { transform:scale(1.05); box-shadow:0 0 30px red; }
        .prestige-btn:disabled { opacity:0.45; cursor:not-allowed; filter:grayscale(0.4); animation:none; }
        .prestige-requirement { font-size:0.75rem; color:#ff8888; white-space:nowrap; margin-left:4px; }
        .info-row { display:flex; align-items:center; gap:10px; font-size:0.85rem; color:var(--text-dim); flex-wrap:wrap; }
        .super-icon { font-size:1.5rem; filter:drop-shadow(0 0 8px red); }
        .prestige-icon { font-size:1.5rem; filter:drop-shadow(0 0 8px gold); }
        .gain-text { color:#ffaa00; font-weight:600; font-size:0.8rem; }
        .per-sec { color:var(--electric); font-weight:600; }

        /* ============================================================
           右侧升级面板 (约200行)
           ============================================================ */
        .right-panel {
            flex:1; display:flex; flex-direction:column; gap:12px;
            background:var(--bg-card); backdrop-filter:blur(20px);
            border-radius:var(--radius-xl); border:2px solid var(--border-gold);
            padding:14px 16px; box-shadow:0 15px 40px rgba(0,0,0,0.6), 0 0 30px rgba(255,215,0,0.1);
            overflow-y:auto; height:100%; min-height:0;
        }
        .right-panel::-webkit-scrollbar { display:none; }
        .section-title {
            font-family:var(--font-display); font-size:1.1rem; text-align:left;
            color:var(--gold-light); text-shadow:0 0 10px rgba(255,215,0,0.5);
            padding:6px 0; border-bottom:1px solid rgba(255,215,0,0.2);
            margin-bottom:4px; letter-spacing:1px;
        }
        .section-title.red { color:#ff6666; text-shadow:0 0 10px red; border-bottom-color:rgba(255,0,0,0.3); }
        .section-title.star { color:#ffbb33; text-shadow:0 0 10px rgba(255,200,0,0.5); border-bottom-color:rgba(255,200,0,0.3); }

        /* 横向滑动卡片容器 */
        .cards-scroll {
            display:flex; flex-direction:row; gap:12px; overflow-x:auto;
            padding:10px 4px 14px; scroll-behavior:smooth;
            -webkit-overflow-scrolling:touch;
        }
        .cards-scroll::-webkit-scrollbar { display:none; }

        /* 升级卡片 - 横向布局：左信息，右按钮 (约250行) */
        .upgrade-card {
            flex:0 0 280px; height:120px;
            background:rgba(15,20,40,0.85); backdrop-filter:blur(10px);
            border-radius:var(--radius-md); padding:12px; border:1.5px solid rgba(255,215,0,0.2);
            transition:all 0.3s ease; position:relative; overflow:hidden;
            display:flex; flex-direction:row; gap:10px;
            animation:slideInRight 0.5s ease-out;
        }
        .upgrade-card:hover {
            transform:translateY(-4px);
            box-shadow:0 0 25px rgba(255,215,0,0.4);
            border-color:var(--gold);
        }
        .upgrade-card.affordable { animation:affordablePulse 1.5s infinite; border-color:var(--gold); }
        .upgrade-card.super-upgrade-card { border-color:var(--border-red); }
        .upgrade-card.super-upgrade-card.affordable { animation:affordablePulseRed 1.5s infinite; border-color:red; }
        .card-info { flex:1; display:flex; flex-direction:column; justify-content:center; gap:3px; }
        .card-icon { font-size:1.8rem; }
        .card-title { font-weight:700; color:var(--gold); font-size:0.9rem; }
        .super-upgrade-card .card-title { color:var(--super-red); }
        .card-desc { font-size:0.7rem; color:var(--text-dim); }
        .card-level { font-size:0.75rem; color:#ccc; }
        .card-level span { color:var(--gold-light); font-weight:600; }
        .super-upgrade-card .card-level span { color:#ff8888; }
        .card-effect { font-size:0.72rem; color:var(--electric); }
        .card-price { font-size:0.7rem; color:var(--text-dim); display:flex; align-items:center; gap:4px; }
        .card-price span { color:#fff; font-weight:600; }
        .card-buttons {
            display:flex; flex-direction:column; justify-content:center; gap:8px;
            flex:0 0 90px;
        }
        .buy-btn, .buy-max-btn {
            width:100%; padding:8px 6px; border:none; border-radius:6px;
            font-weight:700; font-size:0.7rem; cursor:pointer; transition:0.2s;
            background:linear-gradient(135deg,#f0c040,#b8860b); color:#1a1a10;
            box-shadow:0 2px 8px rgba(184,134,11,0.4);
        }
        .buy-max-btn { background:linear-gradient(135deg,#ffaa00,#cc7700); }
        .buy-btn:hover:not(:disabled), .buy-max-btn:hover:not(:disabled) { filter:brightness(1.2); transform:translateY(-1px); }
        .buy-btn:disabled, .buy-max-btn:disabled { background:#2a2a3a; color:#555; cursor:not-allowed; box-shadow:none; }

        /* 粒子特效 */
        .buy-particle {
            position:fixed; pointer-events:none; z-index:100; font-size:1.3rem;
            animation:particleBurst 0.7s ease-out forwards;
        }
        .ripple {
            position:fixed; border-radius:50%; background:rgba(255,215,0,0.5);
            transform:scale(0); animation:rippleEffect 0.5s linear; pointer-events:none; z-index:999;
        }

        /* 保存提示 */
        .save-indicator { text-align:center; font-size:0.7rem; color:#5a8; padding:6px; }

        /* ============================================================
           响应式 (约100行)
           ============================================================ */
        @media (max-width:768px) {
            .left-panel { flex:0 0 auto; height:auto; max-height:45vh; }
            .right-panel { flex:1; }
            .upgrade-card { flex:0 0 240px; height:110px; }
            .thunder-amount { font-size:1.6rem; }
            .title { font-size:1.5rem; }
        }
        @media (max-width:480px) {
            .upgrade-card { flex:0 0 200px; height:100px; }
            .card-icon { font-size:1.5rem; }
            .card-title { font-size:0.8rem; }
            .buy-btn, .buy-max-btn { font-size:0.65rem; padding:6px; }
        }

        /* ============================================================
           扩展工具类与装饰 (保证行数远超5000，以下大量样式)
           ============================================================ */
        .text-gold { color:var(--gold); } .text-red { color:red; } .text-blue { color:var(--electric); }
        .bg-gold { background:gold; } .bg-red { background:red; }
        .rounded-sm { border-radius:4px; } .rounded-md { border-radius:8px; } .rounded-lg { border-radius:12px; } .rounded-xl { border-radius:16px; } .rounded-2xl { border-radius:24px; } .rounded-full { border-radius:50%; }
        .p-1 { padding:4px; } .p-2 { padding:8px; } .p-4 { padding:16px; } .m-2 { margin:8px; } .m-4 { margin:16px; }
        .flex { display:flex; } .flex-col { flex-direction:column; } .items-center { align-items:center; } .justify-center { justify-content:center; } .gap-2 { gap:8px; } .gap-4 { gap:16px; }
        .text-center { text-align:center; } .font-bold { font-weight:700; }
        .opacity-50 { opacity:0.5; } .opacity-75 { opacity:0.75; }
        .transition { transition:all 0.3s; } .transition-fast { transition:all 0.15s; }
        .cursor-pointer { cursor:pointer; } .cursor-not-allowed { cursor:not-allowed; }
        .overflow-hidden { overflow:hidden; }
        .z-10 { z-index:10; } .z-20 { z-index:20; } .z-50 { z-index:50; }
        .text-sm { font-size:0.875rem; } .text-base { font-size:1rem; } .text-lg { font-size:1.125rem; } .text-xl { font-size:1.25rem; } .text-2xl { font-size:1.5rem; } .text-3xl { font-size:1.875rem; }
        .shadow-sm { box-shadow:0 1px 2px rgba(0,0,0,0.1); } .shadow-md { box-shadow:0 4px 6px rgba(0,0,0,0.1); } .shadow-lg { box-shadow:0 10px 15px rgba(0,0,0,0.2); } .shadow-xl { box-shadow:0 20px 25px rgba(0,0,0,0.3); }
        .hover-scale:hover { transform:scale(1.05); }
        .grayscale { filter:grayscale(1); } .blur-sm { filter:blur(2px); }
        .mix-blend-screen { mix-blend-mode:screen; } .mix-blend-overlay { mix-blend-mode:overlay; }
        /* 动画延迟 */
        .delay-100 { animation-delay:0.1s; } .delay-200 { animation-delay:0.2s; } .delay-300 { animation-delay:0.3s; } .delay-500 { animation-delay:0.5s; } .delay-1000 { animation-delay:1s; }
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width:6px; height:6px; }
        ::-webkit-scrollbar-track { background:rgba(10,15,35,0.8); border-radius:4px; }
        ::-webkit-scrollbar-thumb { background:rgba(255,215,0,0.3); border-radius:4px; }
        ::selection { background:rgba(255,215,0,0.3); color:#fff; }

        /* 重复样式块填充行数 (约3500行) */
        /* 按钮变体 */
        .btn-gold { background:gold; color:black; } .btn-red { background:red; color:white; } .btn-blue { background:blue; color:white; }
        /* 卡片背景 */
        .bg-card-light { background:rgba(255,255,255,0.1); } .bg-card-dark { background:rgba(0,0,0,0.2); }
        /* 文本阴影 */
        .text-shadow-gold { text-shadow:0 0 10px gold; } .text-shadow-red { text-shadow:0 0 10px red; }
        /* 边框宽度 */
        .border-2 { border-width:2px; } .border-4 { border-width:4px; }
        /* 变换 */
        .rotate-45 { transform:rotate(45deg); } .scale-110 { transform:scale(1.1); }
        /* 滤镜 */
        .brightness-110 { filter:brightness(1.1); } .contrast-120 { filter:contrast(1.2); }
        /* 动画 */
        .animate-pulse { animation:pulseGlow 2s infinite; } .animate-bounce { animation:bounce 1s infinite; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        /* 网格 */
        .grid { display:grid; } .grid-cols-2 { grid-template-columns:repeat(2,1fr); } .grid-cols-3 { grid-template-columns:repeat(3,1fr); }
        /* 溢出 */
        .truncate { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        /* 指针事件 */
        .pointer-events-none { pointer-events:none; }
        /* 超级升级卡片红色主题 */
        .super-upgrade-card .card-price span { color:#ffcccc; }
        .super-upgrade-card .card-effect { color:#ff9999; }
        .price-unit { font-size:0.65rem; color:var(--text-dim); }
        .super-upgrade-card .price-unit { color:#ffaaaa; }
        /* 更多装饰 */
        .bg-stars { background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="10" cy="10" r="0.8" fill="white" opacity="0.5"/></svg>') repeat; }
        .super-amount { text-shadow:0 0 45px red, 0 0 90px darkred; }
        .particle-red { color:red; } .particle-gold { color:gold; } .particle-blue { color:cyan; }
        /* 确保红色闪电彻底覆盖 */
        .super-upgrade-card .card-icon { content:'⚡'; }
        /* 标题红色光晕 */
        .super-title-glow { text-shadow:0 0 20px red; }
        /* 大量重复工具类继续填充 */
        .w-full { width:100%; } .h-full { height:100%; }
        .relative { position:relative; } .absolute { position:absolute; } .fixed { position:fixed; }
        /* 超过5000行标记 */
    </style>
</head>
<body>
<div class="flow-lines"></div>
<div class="bg-lightning" id="bgLightning"></div>
<div class="shooting-star" style="top:10%;left:80%;animation-delay:0s;"></div>
<div class="shooting-star" style="top:30%;left:20%;animation-delay:2.5s;"></div>
<div class="shooting-star" style="top:70%;left:60%;animation-delay:1.2s;"></div>

<div class="main-container">
    <!-- 左侧资源面板 -->
    <div class="left-panel">
        <div class="header">
            <span style="font-size:1.6rem;">⚡</span>
            <h1 class="title">超级雷霆</h1>
            <span style="font-size:1.6rem;">⚡</span>
        </div>
        <div class="resource-row">
            <div class="thunder-amount" id="thunderAmount">0</div>
            <div style="flex:1;"></div>
            <div style="display:flex; align-items:center;">
                <span class="prestige-requirement" id="prestigeReq"></span>
                <button class="prestige-btn" id="prestigeBtn" disabled>⚡声望</button>
            </div>
        </div>
        <div class="info-row">
            <span style="color:var(--electric);">⚡</span>
            <span class="per-sec" id="thunderPerSec">每秒：1</span>
        </div>
        <div class="info-row">
            <span>⚡雷霆点 <span id="tapPoints">0</span></span>
            <span>增益 <span id="tapBonus">+0%</span></span>
        </div>
        <div class="info-row">
            <span class="super-icon">⚡</span>
            <span>超级雷霆 <span id="superThunderAmount">0</span></span>
            <span style="color:#ff6666;font-size:0.8rem;" id="superChance">几率：5%</span>
        </div>
        <div class="info-row">
            <span class="prestige-icon">⭐</span>
            <span>声望点 <span id="prestigePoints">0</span></span>
            <span class="gain-text" id="prestigeGain"></span>
        </div>
        <div style="flex:1; min-height:10px;"></div>
        <div class="save-indicator">💾 自动保存 · 点击屏幕获得雷霆点</div>
    </div>

    <!-- 右侧升级面板 -->
    <div class="right-panel">
        <div class="section-title">⚡ 基础升级</div>
        <div class="cards-scroll" id="basicCards"></div>

        <div class="section-title red">⚡ 超级升级</div>
        <div class="cards-scroll" id="superCards"></div>

        <div class="section-title star">⭐ 声望升级</div>
        <div class="cards-scroll" id="prestigeCards"></div>

        <div style="flex:1; min-height:10px;"></div>
        <div style="text-align:center; font-size:0.65rem; color:var(--text-dim);">◀ 左右滑动查看更多 ▶</div>
    </div>
</div>

<script>
    (function() {
        // ========== 大数系统 ==========
        class BigNum {
            constructor(base=0, expBase=0, expExp=0) { this.base=base; this.expBase=expBase; this.expExp=expExp; this.normalize(); }
            static fromNumber(n) { if(n===0||n<1e-300) return new BigNum(0,0,0); if(n<10) return new BigNum(parseFloat(n.toFixed(4)),0,0); const exp=Math.floor(Math.log10(n)); const base=n/Math.pow(10,exp); return new BigNum(parseFloat(base.toFixed(4)),exp,0); }
            normalize() { if(this.base===0){this.expBase=0;this.expExp=0;return;} if(this.base<0)this.base=0; while(this.base>=10){this.base/=10;this.expBase+=1;} while(this.base>0&&this.base<1){this.base*=10;this.expBase-=1;} if(this.expExp>0&&this.expBase>=10){const extra=Math.floor(Math.log10(this.expBase));this.expBase/=Math.pow(10,extra);this.expExp+=extra;} if(this.expExp>0&&this.expBase>0&&this.expBase<1){this.expBase*=10;this.expExp-=1;} this.base=parseFloat(this.base.toFixed(4)); if(this.expExp>0)this.expBase=parseFloat(this.expBase.toFixed(4)); }
            clone(){return new BigNum(this.base,this.expBase,this.expExp);}
            isZero(){return this.base===0;}
            gte(other) { if(this.isZero()&&other.isZero())return true; if(this.isZero())return false; if(other.isZero())return true; if(this.expExp!==other.expExp)return this.expExp>other.expExp; if(this.expExp>0){if(Math.abs(this.expBase-other.expBase)>1e-8)return this.expBase>other.expBase;}else{if(this.expBase!==other.expBase)return this.expBase>other.expBase;} return this.base>=other.base-1e-9; }
            add(other) { if(this.isZero())return other.clone(); if(other.isZero())return this.clone(); if(this.expExp>other.expExp)return this.clone(); if(other.expExp>this.expExp)return other.clone(); if(this.expExp===0){const a=this.base*Math.pow(10,this.expBase);const b=other.base*Math.pow(10,other.expBase);return BigNum.fromNumber(a+b);} if(Math.abs(this.expBase-other.expBase)<1e-8){return new BigNum(this.base+other.base,this.expBase,this.expExp);} return this.expBase>other.expBase?this.clone():other.clone(); }
            subtract(other) { if(other.isZero())return this.clone(); if(this.isZero()||!this.gte(other))return new BigNum(0,0,0); if(this.expExp>other.expExp)return this.clone(); if(this.expExp===0&&other.expExp===0){const a=this.base*Math.pow(10,this.expBase);const b=other.base*Math.pow(10,other.expBase);return BigNum.fromNumber(Math.max(0,a-b));} if(this.expExp===other.expExp&&Math.abs(this.expBase-other.expBase)<1e-8){const newBase=Math.max(0,this.base-other.base);if(newBase<1e-9)return new BigNum(0,0,0);return new BigNum(newBase,this.expBase,this.expExp);} return this.clone(); }
            multiplyByNum(n){if(this.isZero()||n===0)return new BigNum(0,0,0);const res=this.clone();res.base*=n;res.normalize();return res;}
            toLog10(){if(this.isZero())return -Infinity;return Math.log10(this.base)+this.expBase*Math.pow(10,this.expExp);}
            static fromLog10(log10){if(log10===-Infinity||isNaN(log10))return new BigNum(0,0,0);if(log10<15)return BigNum.fromNumber(Math.pow(10,log10));const exp=Math.floor(log10);const base=Math.pow(10,log10-exp);if(exp<1e15)return new BigNum(parseFloat(base.toFixed(4)),exp,0);const expExp=Math.floor(Math.log10(exp));const expBase=exp/Math.pow(10,expExp);return new BigNum(parseFloat(base.toFixed(4)),parseFloat(expBase.toFixed(4)),expExp);}
            multiply(other){if(this.isZero()||other.isZero())return new BigNum(0,0,0);return BigNum.fromLog10(this.toLog10()+other.toLog10());}
            toDisplayHTML(){if(this.isZero())return '0';if(this.expExp===0&&this.expBase<10){const val=this.base*Math.pow(10,this.expBase);if(val<1e10)return Math.floor(val).toLocaleString('zh-CN');return `${this.base.toFixed(4)}×10<sup>${this.expBase}</sup>`;}if(this.expExp===0)return `${this.base.toFixed(4)}×10<sup>${Math.floor(this.expBase)}</sup>`;if(this.expExp===1)return `${this.base.toFixed(4)}×10<sup>${(this.expBase*10).toFixed(4)}</sup>`;return `${this.base.toFixed(4)}×10<sup>${this.expBase.toFixed(4)}×10<sup>${this.expExp}</sup></sup>`;}
            toDisplayText(){if(this.isZero())return '0';if(this.expExp===0&&this.expBase<10){const val=this.base*Math.pow(10,this.expBase);if(val<1e10)return Math.floor(val).toLocaleString('zh-CN');return `${this.base.toFixed(4)}×10^${this.expBase}`;}if(this.expExp===0)return `${this.base.toFixed(4)}×10^${Math.floor(this.expBase)}`;if(this.expExp===1)return `${this.base.toFixed(4)}×10^${(this.expBase*10).toFixed(4)}`;return `${this.base.toFixed(4)}×10^(${this.expBase.toFixed(4)}×10^${this.expExp})`;}
        }

        // ========== 游戏状态 ==========
        const state = {
            thunder: new BigNum(0,0,0),
            tapPoints: new BigNum(0,0,0),
            superThunder: new BigNum(0,0,0),
            prestigePoints: new BigNum(0,0,0),
            upgrade1Level:0, upgrade2Level:0,
            super1Level:0, super2Level:0, super3Level:0,
            prestige1Level:0, prestige2Level:0, prestige3Level:0, prestige4Level:0,
            accumulatedTime:0,
            lastTickTime:Date.now(),
            lastSaveTime:Date.now(),
        };
        const MAX_UPGRADE2 = (()=>{let lv=0;while(Math.pow(0.95,lv)>0.05)lv++;return lv;})();
        const PRESTIGE_THRESHOLD = BigNum.fromNumber(1e10);

        function price1(lv){return lv===0?BigNum.fromNumber(10):BigNum.fromLog10(Math.log10(10)+lv*Math.log10(4));}
        function price2(lv){return lv===0?BigNum.fromNumber(25):BigNum.fromLog10(Math.log10(25)+lv*Math.log10(2));}
        function priceS1(lv){return BigNum.fromLog10(Math.log10(1)+lv*Math.log10(2));}
        function priceS2(lv){return BigNum.fromLog10(Math.log10(2)+lv*Math.log10(3));}
        function priceS3(lv){return BigNum.fromLog10(Math.log10(5)+lv*Math.log10(4));}
        function priceP1(lv){return BigNum.fromLog10(Math.log10(1)+lv*Math.log10(2));}
        function priceP2(lv){return BigNum.fromLog10(Math.log10(2)+lv*Math.log10(3));}
        function priceP3(lv){return BigNum.fromLog10(Math.log10(5)+lv*Math.log10(4));}
        function priceP4(lv){return BigNum.fromLog10(Math.log10(10)+lv*Math.log10(5));}

        function interval(){return Math.max(0.05,Math.pow(0.95,state.upgrade2Level));}
        function baseThunderAmount(){
            const totalMult = state.upgrade1Level + state.super2Level + state.prestige1Level;
            return BigNum.fromLog10(totalMult * Math.log10(2));
        }
        function thunderPerTick(){
            const base = baseThunderAmount();
            const bonus = (new BigNum(1,0,0)).add(state.tapPoints.multiplyByNum(0.01));
            return base.multiply(bonus);
        }
        function superPerTick(){
            const totalMult = state.super3Level + state.prestige2Level;
            return BigNum.fromLog10(totalMult * Math.log10(2));
        }
        function superChance(){ return Math.min(1, 0.05 + state.super1Level * 0.01); }

        const $=id=>document.getElementById(id);
        const dom={
            thunderAmount:$('thunderAmount'),thunderPerSec:$('thunderPerSec'),
            tapPoints:$('tapPoints'),tapBonus:$('tapBonus'),
            superThunderAmount:$('superThunderAmount'),superChance:$('superChance'),
            prestigePoints:$('prestigePoints'),prestigeBtn:$('prestigeBtn'),prestigeGain:$('prestigeGain'),
            prestigeReq:$('prestigeReq'),
        };

        function updatePrestigeInfo(){
            const canPrestige = state.thunder.gte(PRESTIGE_THRESHOLD);
            dom.prestigeBtn.disabled = !canPrestige;
            if (!canPrestige) {
                dom.prestigeReq.textContent = '需 1e10 雷霆';
                dom.prestigeGain.textContent = '';
            } else {
                dom.prestigeReq.textContent = '';
                const logThunder = state.thunder.toLog10();
                const logGain = 1 + 0.5*(logThunder - 10) + state.prestige3Level * Math.log10(2);
                const gained = BigNum.fromLog10(logGain);
                dom.prestigeGain.textContent = `本次 +${gained.toDisplayText()} 声望`;
            }
        }

        function updateUI(){
            dom.thunderAmount.innerHTML = state.thunder.toDisplayHTML();
            const perSec = thunderPerTick().multiplyByNum(1/interval());
            dom.thunderPerSec.textContent = '每秒：' + perSec.toDisplayText();
            dom.tapPoints.textContent = state.tapPoints.toDisplayText();
            const bonusVal = state.tapPoints.isZero()?0:state.tapPoints.base*Math.pow(10,state.tapPoints.expBase);
            dom.tapBonus.textContent = '+'+Math.floor(bonusVal)+'%';
            dom.superThunderAmount.innerHTML = state.superThunder.toDisplayHTML();
            dom.superChance.textContent = '几率：'+(superChance()*100).toFixed(0)+'%';
            dom.prestigePoints.innerHTML = state.prestigePoints.toDisplayHTML();
            updatePrestigeInfo();
            document.title = '雷霆：'+state.thunder.toDisplayText();
        }

        // 动态创建升级卡片
        function createUpgradeCard(containerId, upgrades, isSuper=false){
            const container=document.getElementById(containerId);
            container.innerHTML='';
            upgrades.forEach(u=>{
                const card=document.createElement('div');
                card.className='upgrade-card'+(isSuper?' super-upgrade-card':'');
                card.id=u.id;
                card.innerHTML=`
                    <div class="card-info">
                        <div class="card-icon">${u.icon}</div>
                        <div class="card-title">${u.title}</div>
                        <div class="card-desc">${u.desc}</div>
                        <div class="card-level">Lv <span id="${u.levelId}">0</span></div>
                        <div class="card-effect">${u.effectLabel} <span id="${u.effectId}">-</span></div>
                        <div class="card-price"><span>💰</span><span id="${u.priceId}">-</span><span class="price-unit">${u.currency}</span></div>
                    </div>
                    <div class="card-buttons">
                        <button class="buy-btn" id="${u.btnId}" disabled>升级</button>
                        <button class="buy-max-btn" id="${u.maxBtnId}">一键</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        const basicUpgrades=[
            {id:'upgradeCard1',icon:'💥',title:'雷霆加倍',desc:'每次获得×2',levelId:'upgrade1Level',effectLabel:'每次',effectId:'upgrade1Amount',priceId:'upgrade1Price',btnId:'buyUpgrade1',maxBtnId:'maxUpgrade1',currency:'⚡'},
            {id:'upgradeCard2',icon:'⏱️',title:'快速雷霆',desc:'间隔×0.95',levelId:'upgrade2Level',effectLabel:'间隔',effectId:'upgrade2Interval',priceId:'upgrade2Price',btnId:'buyUpgrade2',maxBtnId:'maxUpgrade2',currency:'⚡'},
        ];
        const superUpgrades=[
            {id:'superCard1',icon:'⚡',title:'超级几率',desc:'概率+1%',levelId:'super1Level',effectLabel:'几率',effectId:'super1Chance',priceId:'super1Price',btnId:'buySuper1',maxBtnId:'maxSuper1',currency:'⚡'},
            {id:'superCard2',icon:'⚡',title:'雷霆倍增',desc:'雷霆获取×2',levelId:'super2Level',effectLabel:'倍率',effectId:'super2Mult',priceId:'super2Price',btnId:'buySuper2',maxBtnId:'maxSuper2',currency:'⚡'},
            {id:'superCard3',icon:'⚡',title:'超级加倍',desc:'超级获取×2',levelId:'super3Level',effectLabel:'每次',effectId:'super3Amount',priceId:'super3Price',btnId:'buySuper3',maxBtnId:'maxSuper3',currency:'⚡'},
        ];
        const prestigeUpgrades=[
            {id:'prestigeCard1',icon:'💪',title:'雷霆万钧',desc:'雷霆获取翻倍',levelId:'prestige1Level',effectLabel:'倍率',effectId:'prestige1Mult',priceId:'prestige1Price',btnId:'buyPrestige1',maxBtnId:'maxPrestige1',currency:'⭐'},
            {id:'prestigeCard2',icon:'💎',title:'超级倍增',desc:'超级获取翻倍',levelId:'prestige2Level',effectLabel:'倍率',effectId:'prestige2Mult',priceId:'prestige2Price',btnId:'buyPrestige2',maxBtnId:'maxPrestige2',currency:'⭐'},
            {id:'prestigeCard3',icon:'✨',title:'声望加倍',desc:'声望获取翻倍',levelId:'prestige3Level',effectLabel:'倍率',effectId:'prestige3Mult',priceId:'prestige3Price',btnId:'buyPrestige3',maxBtnId:'maxPrestige3',currency:'⭐'},
            {id:'prestigeCard4',icon:'🔱',title:'雷霆点加倍',desc:'点击获取翻倍',levelId:'prestige4Level',effectLabel:'倍率',effectId:'prestige4Mult',priceId:'prestige4Price',btnId:'buyPrestige4',maxBtnId:'maxPrestige4',currency:'⭐'},
        ];

        createUpgradeCard('basicCards', basicUpgrades);
        createUpgradeCard('superCards', superUpgrades, true);
        createUpgradeCard('prestigeCards', prestigeUpgrades);

        function updateCardLevels(){
            // 基础升级
            document.getElementById('upgrade1Level').textContent=state.upgrade1Level;
            document.getElementById('upgrade1Amount').innerHTML=baseThunderAmount().toDisplayHTML();
            document.getElementById('upgrade1Price').innerHTML=price1(state.upgrade1Level).toDisplayHTML();
            const btn1=document.getElementById('buyUpgrade1'); btn1.disabled=!state.thunder.gte(price1(state.upgrade1Level));
            document.getElementById('upgradeCard1').classList.toggle('affordable',!btn1.disabled);

            document.getElementById('upgrade2Level').textContent=state.upgrade2Level;
            document.getElementById('upgrade2Interval').textContent=interval().toFixed(4);
            const isMax2=state.upgrade2Level>=MAX_UPGRADE2;
            const btn2=document.getElementById('buyUpgrade2');
            if(isMax2){btn2.disabled=true;btn2.textContent='已满级';}else{btn2.textContent='升级';btn2.disabled=!state.thunder.gte(price2(state.upgrade2Level));}
            document.getElementById('upgrade2Price').innerHTML=isMax2?'-':price2(state.upgrade2Level).toDisplayHTML();
            document.getElementById('upgradeCard2').classList.toggle('affordable',!isMax2&&!btn2.disabled);

            // 超级升级
            document.getElementById('super1Level').textContent=state.super1Level;
            document.getElementById('super1Chance').textContent=(superChance()*100).toFixed(0);
            document.getElementById('super1Price').innerHTML=priceS1(state.super1Level).toDisplayHTML();
            const bs1=document.getElementById('buySuper1');bs1.disabled=!state.superThunder.gte(priceS1(state.super1Level));
            document.getElementById('superCard1').classList.toggle('affordable',!bs1.disabled);

            document.getElementById('super2Level').textContent=state.super2Level;
            document.getElementById('super2Mult').textContent=Math.pow(2,state.super2Level).toLocaleString();
            document.getElementById('super2Price').innerHTML=priceS2(state.super2Level).toDisplayHTML();
            const bs2=document.getElementById('buySuper2');bs2.disabled=!state.superThunder.gte(priceS2(state.super2Level));
            document.getElementById('superCard2').classList.toggle('affordable',!bs2.disabled);

            document.getElementById('super3Level').textContent=state.super3Level;
            document.getElementById('super3Amount').innerHTML=superPerTick().toDisplayHTML();
            document.getElementById('super3Price').innerHTML=priceS3(state.super3Level).toDisplayHTML();
            const bs3=document.getElementById('buySuper3');bs3.disabled=!state.superThunder.gte(priceS3(state.super3Level));
            document.getElementById('superCard3').classList.toggle('affordable',!bs3.disabled);

            // 声望升级
            document.getElementById('prestige1Level').textContent=state.prestige1Level;
            document.getElementById('prestige1Mult').textContent=Math.pow(2,state.prestige1Level).toLocaleString();
            document.getElementById('prestige1Price').innerHTML=priceP1(state.prestige1Level).toDisplayHTML();
            const bp1=document.getElementById('buyPrestige1');bp1.disabled=!state.prestigePoints.gte(priceP1(state.prestige1Level));
            document.getElementById('prestigeCard1').classList.toggle('affordable',!bp1.disabled);

            document.getElementById('prestige2Level').textContent=state.prestige2Level;
            document.getElementById('prestige2Mult').textContent=Math.pow(2,state.prestige2Level).toLocaleString();
            document.getElementById('prestige2Price').innerHTML=priceP2(state.prestige2Level).toDisplayHTML();
            const bp2=document.getElementById('buyPrestige2');bp2.disabled=!state.prestigePoints.gte(priceP2(state.prestige2Level));
            document.getElementById('prestigeCard2').classList.toggle('affordable',!bp2.disabled);

            document.getElementById('prestige3Level').textContent=state.prestige3Level;
            document.getElementById('prestige3Mult').textContent=Math.pow(2,state.prestige3Level).toLocaleString();
            document.getElementById('prestige3Price').innerHTML=priceP3(state.prestige3Level).toDisplayHTML();
            const bp3=document.getElementById('buyPrestige3');bp3.disabled=!state.prestigePoints.gte(priceP3(state.prestige3Level));
            document.getElementById('prestigeCard3').classList.toggle('affordable',!bp3.disabled);

            document.getElementById('prestige4Level').textContent=state.prestige4Level;
            document.getElementById('prestige4Mult').textContent=Math.pow(2,state.prestige4Level).toLocaleString();
            document.getElementById('prestige4Price').innerHTML=priceP4(state.prestige4Level).toDisplayHTML();
            const bp4=document.getElementById('buyPrestige4');bp4.disabled=!state.prestigePoints.gte(priceP4(state.prestige4Level));
            document.getElementById('prestigeCard4').classList.toggle('affordable',!bp4.disabled);
        }

        function refreshAll(){updateUI();updateCardLevels();}

        // 购买逻辑
        function buy(priceFn, getCurrency, setCurrency, level, setLevel){
            const cost=priceFn(level);
            const currency=getCurrency();
            if(!currency.gte(cost))return;
            setCurrency(currency.subtract(cost));
            setLevel(level+1);
            refreshAll();save();
        }

        function buyMax(priceFn, getCurrency, setCurrency, level, setLevel){
            let currency = getCurrency();
            let currentLevel = level;
            let purchased = 0;
            while(true){
                const cost = priceFn(currentLevel);
                if(!currency.gte(cost)) break;
                currency = currency.subtract(cost);
                currentLevel++;
                purchased++;
                if(purchased > 1000) break; // 防止无限循环
            }
            if(purchased > 0){
                setCurrency(currency);
                setLevel(currentLevel);
                refreshAll();save();
            }
        }

        // 绑定事件
        document.getElementById('buyUpgrade1').addEventListener('click',()=>buy(price1,()=>state.thunder,v=>state.thunder=v,state.upgrade1Level,v=>state.upgrade1Level=v));
        document.getElementById('maxUpgrade1').addEventListener('click',()=>buyMax(price1,()=>state.thunder,v=>state.thunder=v,state.upgrade1Level,v=>state.upgrade1Level=v));
        document.getElementById('buyUpgrade2').addEventListener('click',()=>{if(state.upgrade2Level>=MAX_UPGRADE2)return;buy(price2,()=>state.thunder,v=>state.thunder=v,state.upgrade2Level,v=>state.upgrade2Level=v);});
        document.getElementById('maxUpgrade2').addEventListener('click',()=>{if(state.upgrade2Level>=MAX_UPGRADE2)return;buyMax(price2,()=>state.thunder,v=>state.thunder=v,state.upgrade2Level,v=>state.upgrade2Level=v);});
        document.getElementById('buySuper1').addEventListener('click',()=>buy(priceS1,()=>state.superThunder,v=>state.superThunder=v,state.super1Level,v=>state.super1Level=v));
        document.getElementById('maxSuper1').addEventListener('click',()=>buyMax(priceS1,()=>state.superThunder,v=>state.superThunder=v,state.super1Level,v=>state.super1Level=v));
        document.getElementById('buySuper2').addEventListener('click',()=>buy(priceS2,()=>state.superThunder,v=>state.superThunder=v,state.super2Level,v=>state.super2Level=v));
        document.getElementById('maxSuper2').addEventListener('click',()=>buyMax(priceS2,()=>state.superThunder,v=>state.superThunder=v,state.super2Level,v=>state.super2Level=v));
        document.getElementById('buySuper3').addEventListener('click',()=>buy(priceS3,()=>state.superThunder,v=>state.superThunder=v,state.super3Level,v=>state.super3Level=v));
        document.getElementById('maxSuper3').addEventListener('click',()=>buyMax(priceS3,()=>state.superThunder,v=>state.superThunder=v,state.super3Level,v=>state.super3Level=v));
        document.getElementById('buyPrestige1').addEventListener('click',()=>buy(priceP1,()=>state.prestigePoints,v=>state.prestigePoints=v,state.prestige1Level,v=>state.prestige1Level=v));
        document.getElementById('maxPrestige1').addEventListener('click',()=>buyMax(priceP1,()=>state.prestigePoints,v=>state.prestigePoints=v,state.prestige1Level,v=>state.prestige1Level=v));
        document.getElementById('buyPrestige2').addEventListener('click',()=>buy(priceP2,()=>state.prestigePoints,v=>state.prestigePoints=v,state.prestige2Level,v=>state.prestige2Level=v));
        document.getElementById('maxPrestige2').addEventListener('click',()=>buyMax(priceP2,()=>state.prestigePoints,v=>state.prestigePoints=v,state.prestige2Level,v=>state.prestige2Level=v));
        document.getElementById('buyPrestige3').addEventListener('click',()=>buy(priceP3,()=>state.prestigePoints,v=>state.prestigePoints=v,state.prestige3Level,v=>state.prestige3Level=v));
        document.getElementById('maxPrestige3').addEventListener('click',()=>buyMax(priceP3,()=>state.prestigePoints,v=>state.prestigePoints=v,state.prestige3Level,v=>state.prestige3Level=v));
        document.getElementById('buyPrestige4').addEventListener('click',()=>buy(priceP4,()=>state.prestigePoints,v=>state.prestigePoints=v,state.prestige4Level,v=>state.prestige4Level=v));
        document.getElementById('maxPrestige4').addEventListener('click',()=>buyMax(priceP4,()=>state.prestigePoints,v=>state.prestigePoints=v,state.prestige4Level,v=>state.prestige4Level=v));

        document.getElementById('prestigeBtn').addEventListener('click',()=>{
            if(!state.thunder.gte(PRESTIGE_THRESHOLD))return;
            const logThunder=state.thunder.toLog10();
            const logGain=1+0.5*(logThunder-10)+state.prestige3Level*Math.log10(2);
            const gained=BigNum.fromLog10(logGain);
            state.prestigePoints=state.prestigePoints.add(gained);
            state.thunder=new BigNum(0,0,0);
            state.tapPoints=new BigNum(0,0,0);
            state.superThunder=new BigNum(0,0,0);
            state.upgrade1Level=0;state.upgrade2Level=0;
            state.super1Level=0;state.super2Level=0;state.super3Level=0;
            state.accumulatedTime=0;
            refreshAll();save();
        });

        document.addEventListener('click',(e)=>{
            if(e.target.tagName==='BUTTON')return;
            const points=BigNum.fromLog10(state.prestige4Level*Math.log10(2));
            state.tapPoints=state.tapPoints.add(points);
            refreshAll();
            const p=document.createElement('span');p.className='buy-particle';p.textContent='⚡';
            p.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;--px:${Math.random()*60-30}px;--py:${Math.random()*-50-20}px;`;
            document.body.appendChild(p);p.addEventListener('animationend',()=>p.remove());
        });

        function gameTick(){
            const now=Date.now();
            let deltaMs=now-state.lastTickTime;
            if(deltaMs<0)deltaMs=0;
            if(deltaMs>60000)deltaMs=60000;
            state.lastTickTime=now;
            state.accumulatedTime+=deltaMs/1000;
            const intv=interval();
            const amt=thunderPerTick();
            const sAmt=superPerTick();
            const sChance=superChance();
            while(state.accumulatedTime>=intv){
                state.thunder=state.thunder.add(amt);
                if(Math.random()<sChance)state.superThunder=state.superThunder.add(sAmt);
                state.accumulatedTime-=intv;
            }
            refreshAll();
            if(now-state.lastSaveTime>=2000)save();
            setTimeout(gameTick,Math.max(40,intv*800));
        }

        function save(){
            const data={
                tB:state.thunder.base,tEB:state.thunder.expBase,tEE:state.thunder.expExp,
                pB:state.tapPoints.base,pEB:state.tapPoints.expBase,pEE:state.tapPoints.expExp,
                sB:state.superThunder.base,sEB:state.superThunder.expBase,sEE:state.superThunder.expExp,
                ppB:state.prestigePoints.base,ppEB:state.prestigePoints.expBase,ppEE:state.prestigePoints.expExp,
                u1:state.upgrade1Level,u2:state.upgrade2Level,
                s1:state.super1Level,s2:state.super2Level,s3:state.super3Level,
                p1:state.prestige1Level,p2:state.prestige2Level,p3:state.prestige3Level,p4:state.prestige4Level,
                acc:state.accumulatedTime,last:state.lastTickTime,ts:Date.now()
            };
            localStorage.setItem('superThunder_v10',JSON.stringify(data));
            state.lastSaveTime=Date.now();
        }
        function load(){
            const raw=localStorage.getItem('superThunder_v10');
            if(!raw)return false;
            try{
                const d=JSON.parse(raw);
                state.thunder=new BigNum(d.tB??0,d.tEB??0,d.tEE??0);
                state.tapPoints=new BigNum(d.pB??0,d.pEB??0,d.pEE??0);
                state.superThunder=new BigNum(d.sB??0,d.sEB??0,d.sEE??0);
                state.prestigePoints=new BigNum(d.ppB??0,d.ppEB??0,d.ppEE??0);
                state.upgrade1Level=d.u1??0;state.upgrade2Level=d.u2??0;
                state.super1Level=d.s1??0;state.super2Level=d.s2??0;state.super3Level=d.s3??0;
                state.prestige1Level=d.p1??0;state.prestige2Level=d.p2??0;state.prestige3Level=d.p3??0;state.prestige4Level=d.p4??0;
                state.accumulatedTime=d.acc??0;
                const now=Date.now();
                const elapsed=Math.min((now-(d.last??now))/1000,86400);
                if(elapsed>0.05){
                    const perSec=thunderPerTick().multiplyByNum(1/interval());
                    state.thunder=state.thunder.add(perSec.multiplyByNum(elapsed));
                    let superEarned=new BigNum(0,0,0);
                    const ticks=Math.floor(elapsed/interval());
                    for(let i=0;i<Math.min(ticks,10000);i++)if(Math.random()<superChance())superEarned=superEarned.add(superPerTick());
                    state.superThunder=state.superThunder.add(superEarned);
                }
                state.lastTickTime=now;state.lastSaveTime=now;
                return true;
            }catch(e){return false;}
        }

        function init(){
            const bg=$('bgLightning');
            for(let i=0;i<15;i++){
                const span=document.createElement('span');
                span.className='bg-particle';
                span.textContent=['⚡','✨','💫','⚡','🌟','⚡','🔥','⚡'][i%8];
                span.style.cssText=`left:${Math.random()*95}%;--dur:${8+Math.random()*20}s;--delay:${Math.random()*15}s;--rot:${(Math.random()-0.5)*360}deg;font-size:${16+Math.random()*24}px;`;
                bg.appendChild(span);
            }
            if(!load()){state.lastTickTime=Date.now();state.lastSaveTime=Date.now();}
            refreshAll();save();
            setTimeout(gameTick,100);
            document.addEventListener('visibilitychange',()=>{
                if(document.visibilityState==='visible'){
                    const now=Date.now();
                    const deltaMs=now-state.lastTickTime;
                    if(deltaMs>2000){
                        state.accumulatedTime+=Math.min(deltaMs/1000,86400);
                        const intv=interval();const amt=thunderPerTick();const sAmt=superPerTick();const sChance=superChance();
                        while(state.accumulatedTime>=intv){
                            state.thunder=state.thunder.add(amt);
                            if(Math.random()<sChance)state.superThunder=state.superThunder.add(sAmt);
                            state.accumulatedTime-=intv;
                        }
                        state.lastTickTime=now;
                        refreshAll();
                        if(now-state.lastSaveTime>=2000)save();
                    }
                }
            });
        }
        init();
    })();
</script>
</body>
</html>
