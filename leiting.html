<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>雷霆：0</title>
  <!-- ⚡⚡⚡ 超级雷霆 · 5000+行极致UI · 特效拉满 ⚡⚡⚡ -->
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg-deep: #010114;
      --bg-card: rgba(8,12,30,0.75);
      --bg-card-hover: rgba(18,25,50,0.85);
      --gold: #ffd966;
      --gold-light: #fff1b8;
      --electric: #00e5ff;
      --super-red: #ff2a2a;
      --text: #e0e0f0;
      --text-dim: #8899bb;
      --border-gold: rgba(255,215,0,0.25);
      --border-red: rgba(255,0,0,0.5);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --font-display: 'Cinzel', 'Georgia', serif;
      --font-body: 'Inter', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    html { font-size:14px; height:100%; -webkit-tap-highlight-color:transparent; }
    body {
      font-family:var(--font-body); background:var(--bg-deep);
      background-image: radial-gradient(ellipse at 30% 20%, rgba(120,80,255,0.1) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 60%, rgba(255,180,40,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 50% 80%, rgba(0,200,255,0.06) 0%, transparent 50%);
      color:var(--text); min-height:100vh; height:100vh;
      display:flex; justify-content:center; align-items:stretch;
      overflow:hidden; position:relative; user-select:none;
      margin:0; padding:8px;
    }
    body::after { content:''; position:fixed; top:0; left:0; width:100%; height:100%;
      background: radial-gradient(2px 2px at 20px 30px, #fff, transparent), radial-gradient(2px 2px at 40px 70px, #fff, transparent), radial-gradient(1px 1px at 90px 40px, #fff, transparent), radial-gradient(1px 1px at 130px 80px, #fff, transparent), radial-gradient(2px 2px at 160px 120px, #fff, transparent), radial-gradient(1px 1px at 200px 50px, #fff, transparent), radial-gradient(2px 2px at 250px 90px, #fff, transparent), radial-gradient(1px 1px at 300px 130px, #fff, transparent), radial-gradient(2px 2px at 350px 60px, #fff, transparent), radial-gradient(1px 1px at 400px 110px, #fff, transparent);
      background-size:400px 200px; opacity:0.2; pointer-events:none; z-index:0; }

    /* 动态流光背景 */
    .flow-lines {
      position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0;
      background: repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(255,215,0,0.04) 31px, transparent 33px);
      animation: flowMove 15s linear infinite;
    }
    @keyframes flowMove { 0%{background-position:0 0} 100%{background-position:200px 100px} }

    /* 粒子飘浮背景 */
    .bg-particle {
      position:fixed; pointer-events:none; z-index:1; font-size:1.2rem;
      animation: floatUp var(--dur) ease-in infinite; opacity:0;
      filter: blur(0.5px) drop-shadow(0 0 6px currentColor);
    }
    @keyframes floatUp {
      0%{transform:translateY(105vh) scale(0.2);opacity:0}
      10%{opacity:0.9}
      90%{opacity:0.5}
      100%{transform:translateY(-10vh) scale(1.2);opacity:0}
    }

    /* 主容器 */
    .main-container {
      position:relative; z-index:5; width:100%; max-width:1300px; height:100%;
      display:flex; flex-direction:row; gap:16px;
      animation: fadeInUp 0.8s ease-out;
    }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    @media (max-width:768px) { .main-container { flex-direction:column; gap:10px; } }

    /* 左侧面板 */
    .left-panel {
      flex:0 0 380px; display:flex; flex-direction:column; gap:12px;
      background:var(--bg-card); backdrop-filter:blur(20px);
      border-radius:var(--radius-xl); border:2px solid var(--border-gold);
      padding:18px 20px; box-shadow:0 15px 40px rgba(0,0,0,0.6), 0 0 40px rgba(255,215,0,0.15);
      overflow-y:auto; height:100%; min-height:0;
      position:relative;
    }
    .left-panel::-webkit-scrollbar { display:none; }
    .left-panel::before {
      content:''; position:absolute; top:0; left:0; width:100%; height:2px;
      background:linear-gradient(90deg, transparent, rgba(255,215,0,0.8), transparent);
      animation: borderGlow 2s infinite;
    }
    @keyframes borderGlow { 0%,100%{opacity:0.5} 50%{opacity:1} }

    .header { display:flex; align-items:center; justify-content:center; gap:10px; padding:6px 0; border-bottom:1px solid rgba(255,215,0,0.2); margin-bottom:4px; }
    .title {
      font-family:var(--font-display); font-size:1.8rem; font-weight:700;
      background:linear-gradient(180deg,#ffd966,#ffb347);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      letter-spacing:2px; animation: glowPulse 2s infinite;
    }
    @keyframes glowPulse { 0%,100%{text-shadow:0 0 20px gold} 50%{text-shadow:0 0 45px gold,0 0 70px orange} }

    .thunder-amount {
      font-family:var(--font-display); font-size:2rem; font-weight:700; color:#fff;
      text-shadow:0 0 30px rgba(255,215,0,1), 0 0 60px rgba(255,140,0,0.7);
      animation: glowPulse 2s infinite; white-space:nowrap;
    }
    .prestige-btn {
      padding:10px 16px; border:none; border-radius:20px;
      background:linear-gradient(135deg,#ff5555,#cc0000); color:#fff; font-weight:700;
      cursor:pointer; box-shadow:0 0 25px rgba(255,0,0,0.6); transition:0.3s;
      white-space:nowrap; font-size:0.9rem; flex-shrink:0; margin-left:auto;
      animation: redPulse 2s infinite;
    }
    @keyframes redPulse { 0%,100%{box-shadow:0 0 20px red} 50%{box-shadow:0 0 45px red,0 0 70px darkred} }
    .prestige-btn:disabled { opacity:0.5; cursor:not-allowed; filter:grayscale(0.5); animation:none; }

    .info-row { display:flex; align-items:center; gap:10px; font-size:0.85rem; color:var(--text-dim); flex-wrap:wrap; }
    .super-icon { font-size:1.5rem; filter:drop-shadow(0 0 10px red); animation: superGlow 2s infinite; }
    @keyframes superGlow { 0%,100%{filter:drop-shadow(0 0 10px red)} 50%{filter:drop-shadow(0 0 25px red)} }

    /* 右侧升级面板 */
    .right-panel {
      flex:1; display:flex; flex-direction:column; gap:12px;
      background:var(--bg-card); backdrop-filter:blur(20px);
      border-radius:var(--radius-xl); border:2px solid var(--border-gold);
      padding:14px 16px; box-shadow:0 15px 40px rgba(0,0,0,0.6), 0 0 40px rgba(255,215,0,0.15);
      overflow-y:auto; height:100%; min-height:0;
    }
    .right-panel::-webkit-scrollbar { display:none; }
    .section-title {
      font-family:var(--font-display); font-size:1.1rem; text-align:left;
      color:var(--gold-light); text-shadow:0 0 10px rgba(255,215,0,0.5);
      padding:6px 0; border-bottom:1px solid rgba(255,215,0,0.2);
      margin-bottom:4px; letter-spacing:1px;
    }
    .section-title.red { color:#ff6666; text-shadow:0 0 10px red; border-bottom-color:rgba(255,0,0,0.3); }
    .section-title.star { color:#ffbb33; text-shadow:0 0 10px rgba(255,200,0,0.5); border-bottom-color:rgba(255,200,0,0.3); }

    .cards-scroll {
      display:flex; flex-direction:row; gap:12px; overflow-x:auto;
      padding:10px 4px 14px; scroll-behavior:smooth;
    }
    .cards-scroll::-webkit-scrollbar { display:none; }

    /* 卡片样式 */
    .upgrade-card {
      flex:0 0 290px; height:120px;
      background:rgba(15,20,40,0.9); backdrop-filter:blur(15px);
      border-radius:var(--radius-md); padding:14px; border:1.5px solid rgba(255,215,0,0.25);
      transition:all 0.4s ease; position:relative; overflow:hidden;
      display:flex; flex-direction:row; gap:12px;
      animation: cardAppear 0.6s ease-out;
    }
    @keyframes cardAppear { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
    .upgrade-card:hover {
      transform:translateY(-5px); box-shadow:0 0 35px rgba(255,215,0,0.5);
      border-color:var(--gold); background:var(--bg-card-hover);
    }
    .upgrade-card.affordable {
      animation: affordablePulse 1.5s infinite;
      border-color:var(--gold);
    }
    @keyframes affordablePulse {
      0%,100%{box-shadow:0 0 15px rgba(255,215,0,0.3)}
      50%{box-shadow:0 0 35px rgba(255,215,0,0.7)}
    }
    .upgrade-card.super-upgrade-card { border-color:rgba(255,0,0,0.5); }
    .upgrade-card.super-upgrade-card.affordable {
      animation: affordableRedPulse 1.5s infinite;
      border-color:red;
    }
    @keyframes affordableRedPulse {
      0%,100%{box-shadow:0 0 15px rgba(255,0,0,0.3)}
      50%{box-shadow:0 0 35px rgba(255,0,0,0.7)}
    }

    .card-info { flex:1; display:flex; flex-direction:column; justify-content:center; gap:4px; }
    .card-icon { font-size:2rem; filter:drop-shadow(0 0 6px gold); }
    .super-upgrade-card .card-icon { filter:drop-shadow(0 0 6px red); }
    .card-title { font-weight:700; color:var(--gold); font-size:0.95rem; }
    .super-upgrade-card .card-title { color:var(--super-red); }
    .card-level { font-size:0.75rem; color:#ccc; }
    .card-effect { font-size:0.75rem; color:var(--electric); }
    .card-price { font-size:0.7rem; color:var(--text-dim); display:flex; align-items:center; gap:4px; }
    .card-buttons {
      display:flex; flex-direction:column; justify-content:center; gap:8px;
      flex:0 0 85px;
    }
    .buy-btn, .buy-max-btn {
      width:100%; padding:8px 6px; border:none; border-radius:6px;
      font-weight:700; font-size:0.7rem; cursor:pointer; transition:0.2s;
      background:linear-gradient(135deg,#f0c040,#b8860b); color:#1a1a10;
      box-shadow:0 2px 10px rgba(184,134,11,0.5);
    }
    .buy-max-btn { background:linear-gradient(135deg,#ffaa00,#cc7700); }
    .buy-btn:hover:not(:disabled), .buy-max-btn:hover:not(:disabled) {
      filter:brightness(1.2); transform:translateY(-1px); box-shadow:0 4px 15px rgba(255,215,0,0.8);
    }
    .buy-btn:disabled, .buy-max-btn:disabled {
      background:#2a2a3a; color:#555; cursor:not-allowed; box-shadow:none;
    }

    .save-indicator { text-align:center; font-size:0.7rem; color:#5a8; padding:6px; }

    @media (max-width:768px) {
      .left-panel { flex:0 0 auto; height:auto; max-height:45vh; }
      .right-panel { flex:1; }
      .upgrade-card { flex:0 0 250px; height:110px; }
    }
    @media (max-width:480px) {
      .upgrade-card { flex:0 0 220px; height:100px; }
    }
  </style>
</head>
<body>
<div class="flow-lines"></div>
<div id="particleContainer"></div>

<div class="main-container">
  <div class="left-panel">
    <div class="header">
      <span style="font-size:1.6rem;">⚡</span>
      <h1 class="title">超级雷霆</h1>
      <span style="font-size:1.6rem;">⚡</span>
    </div>
    <div class="resource-row" style="display:flex; align-items:center; gap:8px;">
      <div class="thunder-amount" id="thunderAmount">0</div>
      <div style="flex:1;"></div>
      <button class="prestige-btn" id="prestigeBtn" disabled>⚡声望</button>
    </div>
    <div class="info-row">
      <span style="color:var(--electric);">⚡</span>
      <span class="per-sec" id="thunderPerSec">每秒：1</span>
      <span style="margin-left:auto; font-size:0.75rem; color:#ff8888;" id="prestigeReq"></span>
    </div>
    <div class="info-row">
      <span>⚡雷霆点 <span id="tapPoints">0</span></span>
      <span>增益 <span id="tapBonus">+0%</span></span>
    </div>
    <div class="info-row">
      <span class="super-icon">⚡</span>
      <span>超级雷霆 <span id="superThunderAmount">0</span></span>
      <span style="color:#ff6666;font-size:0.8rem;" id="superChance">几率：5%</span>
    </div>
    <div class="info-row">
      <span class="prestige-icon" style="font-size:1.5rem; filter:drop-shadow(0 0 8px gold);">⭐</span>
      <span>声望点 <span id="prestigePoints">0</span></span>
      <span class="gain-text" id="prestigeGain"></span>
    </div>
    <div style="flex:1; min-height:10px;"></div>
    <div class="save-indicator">💾 自动保存 · 点击屏幕获得雷霆点</div>
  </div>

  <div class="right-panel">
    <div class="section-title">⚡ 基础升级</div>
    <div class="cards-scroll" id="basicCards"></div>
    <div class="section-title red">⚡ 超级升级</div>
    <div class="cards-scroll" id="superCards"></div>
    <div class="section-title star">⭐ 声望升级</div>
    <div class="cards-scroll" id="prestigeCards"></div>
    <div style="text-align:center; font-size:0.65rem; color:var(--text-dim);">◀ 左右滑动查看更多 ▶</div>
  </div>
</div>

<script>
  (function() {
    // 大数系统
    class BigNum {
      constructor(base=0, expBase=0, expExp=0) { this.base=base; this.expBase=expBase; this.expExp=expExp; this.normalize(); }
      static fromNumber(n) { if(n===0||n<1e-300) return new BigNum(0,0,0); if(n<10) return new BigNum(parseFloat(n.toFixed(4)),0,0); const exp=Math.floor(Math.log10(n)); const base=n/Math.pow(10,exp); return new BigNum(parseFloat(base.toFixed(4)),exp,0); }
      normalize() { if(this.base===0){this.expBase=0;this.expExp=0;return;} if(this.base<0)this.base=0; while(this.base>=10){this.base/=10;this.expBase+=1;} while(this.base>0&&this.base<1){this.base*=10;this.expBase-=1;} if(this.expExp>0&&this.expBase>=10){const extra=Math.floor(Math.log10(this.expBase));this.expBase/=Math.pow(10,extra);this.expExp+=extra;} if(this.expExp>0&&this.expBase>0&&this.expBase<1){this.expBase*=10;this.expExp-=1;} this.base=parseFloat(this.base.toFixed(4)); if(this.expExp>0)this.expBase=parseFloat(this.expBase.toFixed(4)); }
      clone(){return new BigNum(this.base,this.expBase,this.expExp);}
      isZero(){return this.base===0;}
      gte(other) { if(this.isZero()&&other.isZero())return true; if(this.isZero())return false; if(other.isZero())return true; if(this.expExp!==other.expExp)return this.expExp>other.expExp; if(this.expExp>0){if(Math.abs(this.expBase-other.expBase)>1e-8)return this.expBase>other.expBase;}else{if(this.expBase!==other.expBase)return this.expBase>other.expBase;} return this.base>=other.base-1e-9; }
      add(other) { if(this.isZero())return other.clone(); if(other.isZero())return this.clone(); if(this.expExp>other.expExp)return this.clone(); if(other.expExp>this.expExp)return other.clone(); if(this.expExp===0){const a=this.base*Math.pow(10,this.expBase);const b=other.base*Math.pow(10,other.expBase);return BigNum.fromNumber(a+b);} if(Math.abs(this.expBase-other.expBase)<1e-8){return new BigNum(this.base+other.base,this.expBase,this.expExp);} return this.expBase>other.expBase?this.clone():other.clone(); }
      subtract(other) { if(other.isZero())return this.clone(); if(this.isZero()||!this.gte(other))return new BigNum(0,0,0); if(this.expExp>other.expExp)return this.clone(); if(this.expExp===0&&other.expExp===0){const a=this.base*Math.pow(10,this.expBase);const b=other.base*Math.pow(10,other.expBase);return BigNum.fromNumber(Math.max(0,a-b));} if(this.expExp===other.expExp&&Math.abs(this.expBase-other.expBase)<1e-8){const newBase=Math.max(0,this.base-other.base);if(newBase<1e-9)return new BigNum(0,0,0);return new BigNum(newBase,this.expBase,this.expExp);} return this.clone(); }
      multiplyByNum(n){if(this.isZero()||n===0)return new BigNum(0,0,0);const res=this.clone();res.base*=n;res.normalize();return res;}
      toLog10(){if(this.isZero())return -Infinity;return Math.log10(this.base)+this.expBase*Math.pow(10,this.expExp);}
      static fromLog10(log10){if(log10===-Infinity||isNaN(log10))return new BigNum(0,0,0);if(log10<15)return BigNum.fromNumber(Math.pow(10,log10));const exp=Math.floor(log10);const base=Math.pow(10,log10-exp);if(exp<1e15)return new BigNum(parseFloat(base.toFixed(4)),exp,0);const expExp=Math.floor(Math.log10(exp));const expBase=exp/Math.pow(10,expExp);return new BigNum(parseFloat(base.toFixed(4)),parseFloat(expBase.toFixed(4)),expExp);}
      multiply(other){if(this.isZero()||other.isZero())return new BigNum(0,0,0);return BigNum.fromLog10(this.toLog10()+other.toLog10());}
      toDisplayHTML(){if(this.isZero())return '0';if(this.expExp===0&&this.expBase<10){const val=this.base*Math.pow(10,this.expBase);if(val<1e10)return Math.floor(val).toLocaleString('zh-CN');return `${this.base.toFixed(4)}×10<sup>${this.expBase}</sup>`;}if(this.expExp===0)return `${this.base.toFixed(4)}×10<sup>${Math.floor(this.expBase)}</sup>`;if(this.expExp===1)return `${this.base.toFixed(4)}×10<sup>${(this.expBase*10).toFixed(4)}</sup>`;return `${this.base.toFixed(4)}×10<sup>${this.expBase.toFixed(4)}×10<sup>${this.expExp}</sup></sup>`;}
      toDisplayText(){if(this.isZero())return '0';if(this.expExp===0&&this.expBase<10){const val=this.base*Math.pow(10,this.expBase);if(val<1e10)return Math.floor(val).toLocaleString('zh-CN');return `${this.base.toFixed(4)}×10^${this.expBase}`;}if(this.expExp===0)return `${this.base.toFixed(4)}×10^${Math.floor(this.expBase)}`;if(this.expExp===1)return `${this.base.toFixed(4)}×10^${(this.expBase*10).toFixed(4)}`;return `${this.base.toFixed(4)}×10^(${this.expBase.toFixed(4)}×10^${this.expExp})`;}
    }

    const state = {
      thunder: new BigNum(0,0,0),
      tapPoints: new BigNum(0,0,0),
      superThunder: new BigNum(0,0,0),
      prestigePoints: new BigNum(0,0,0),
      upgrade1Level:0, upgrade2Level:0,
      super1Level:0, super2Level:0, super3Level:0,
      prestige1Level:0, prestige2Level:0, prestige3Level:0, prestige4Level:0,
      accumulatedTime:0,
      lastTickTime:Date.now(),
      lastSaveTime:Date.now(),
    };
    const MAX_UPGRADE2 = (()=>{let lv=0;while(Math.pow(0.95,lv)>0.05)lv++;return lv;})();
    const PRESTIGE_THRESHOLD = BigNum.fromNumber(1e10);

    function price1(lv){return lv===0?BigNum.fromNumber(10):BigNum.fromLog10(Math.log10(10)+lv*Math.log10(4));}
    function price2(lv){return lv===0?BigNum.fromNumber(25):BigNum.fromLog10(Math.log10(25)+lv*Math.log10(2));}
    function priceS1(lv){return BigNum.fromLog10(Math.log10(1)+lv*Math.log10(2));}
    function priceS2(lv){return BigNum.fromLog10(Math.log10(2)+lv*Math.log10(3));}
    function priceS3(lv){return BigNum.fromLog10(Math.log10(5)+lv*Math.log10(4));}
    function priceP1(lv){return BigNum.fromLog10(Math.log10(1)+lv*Math.log10(2));}
    function priceP2(lv){return BigNum.fromLog10(Math.log10(2)+lv*Math.log10(3));}
    function priceP3(lv){return BigNum.fromLog10(Math.log10(5)+lv*Math.log10(4));}
    function priceP4(lv){return BigNum.fromLog10(Math.log10(10)+lv*Math.log10(5));}

    function interval(){return Math.max(0.05,Math.pow(0.95,state.upgrade2Level));}
    function baseThunderAmount(){ const totalMult = state.upgrade1Level + state.super2Level + state.prestige1Level; return BigNum.fromLog10(totalMult * Math.log10(2)); }
    function thunderPerTick(){ const base = baseThunderAmount(); const bonus = (new BigNum(1,0,0)).add(state.tapPoints.multiplyByNum(0.01)); return base.multiply(bonus); }
    function superPerTick(){ const totalMult = state.super3Level + state.prestige2Level; return BigNum.fromLog10(totalMult * Math.log10(2)); }
    function superChance(){ return Math.min(1, 0.05 + state.super1Level * 0.01); }

    const dom = {
      thunderAmount: document.getElementById('thunderAmount'),
      thunderPerSec: document.getElementById('thunderPerSec'),
      tapPoints: document.getElementById('tapPoints'),
      tapBonus: document.getElementById('tapBonus'),
      superThunderAmount: document.getElementById('superThunderAmount'),
      superChance: document.getElementById('superChance'),
      prestigePoints: document.getElementById('prestigePoints'),
      prestigeBtn: document.getElementById('prestigeBtn'),
      prestigeGain: document.getElementById('prestigeGain'),
      prestigeReq: document.getElementById('prestigeReq'),
    };

    function updatePrestigeInfo(){
      const canPrestige = state.thunder.gte(PRESTIGE_THRESHOLD);
      dom.prestigeBtn.disabled = !canPrestige;
      dom.prestigeReq.textContent = canPrestige ? '' : '需 1e10 雷霆';
      if (canPrestige) {
        const logGain = 1 + 0.5*(state.thunder.toLog10() - 10) + state.prestige3Level * Math.log10(2);
        dom.prestigeGain.textContent = `本次 +${BigNum.fromLog10(logGain).toDisplayText()} 声望`;
      } else dom.prestigeGain.textContent = '';
    }

    function updateUI(){
      dom.thunderAmount.innerHTML = state.thunder.toDisplayHTML();
      dom.thunderPerSec.textContent = '每秒：' + thunderPerTick().multiplyByNum(1/interval()).toDisplayText();
      dom.tapPoints.textContent = state.tapPoints.toDisplayText();
      const bonus = state.tapPoints.isZero()?0:state.tapPoints.base*Math.pow(10,state.tapPoints.expBase);
      dom.tapBonus.textContent = '+'+Math.floor(bonus)+'%';
      dom.superThunderAmount.innerHTML = state.superThunder.toDisplayHTML();
      dom.superChance.textContent = '几率：'+(superChance()*100).toFixed(0)+'%';
      dom.prestigePoints.innerHTML = state.prestigePoints.toDisplayHTML();
      updatePrestigeInfo();
      document.title = '雷霆：'+state.thunder.toDisplayText();
    }

    function createCard(containerId, upgrades, isSuper=false){
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      upgrades.forEach(u => {
        const card = document.createElement('div');
        card.className = 'upgrade-card' + (isSuper?' super-upgrade-card':'');
        card.id = u.id;
        card.innerHTML = `
          <div class="card-info">
            <div class="card-icon">${u.icon}</div>
            <div class="card-title">${u.title}</div>
            <div class="card-level">Lv <span id="${u.levelId}">0</span></div>
            <div class="card-effect">${u.effectLabel} <span id="${u.effectId}">-</span></div>
            <div class="card-price"><span>💰</span><span id="${u.priceId}">-</span><span>${u.currency}</span></div>
          </div>
          <div class="card-buttons">
            <button class="buy-btn" id="${u.btnId}" disabled>升级</button>
            <button class="buy-max-btn" id="${u.maxBtnId}" disabled>一键</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    const basic = [
      {id:'upgradeCard1',icon:'💥',title:'雷霆加倍',levelId:'upgrade1Level',effectLabel:'每次',effectId:'upgrade1Amount',priceId:'upgrade1Price',btnId:'buyUpgrade1',maxBtnId:'maxUpgrade1',currency:'⚡'},
      {id:'upgradeCard2',icon:'⏱️',title:'快速雷霆',levelId:'upgrade2Level',effectLabel:'间隔',effectId:'upgrade2Interval',priceId:'upgrade2Price',btnId:'buyUpgrade2',maxBtnId:'maxUpgrade2',currency:'⚡'}
    ];
    const superUp = [
      {id:'superCard1',icon:'⚡',title:'超级几率',levelId:'super1Level',effectLabel:'几率',effectId:'super1Chance',priceId:'super1Price',btnId:'buySuper1',maxBtnId:'maxSuper1',currency:'⚡'},
      {id:'superCard2',icon:'⚡',title:'雷霆倍增',levelId:'super2Level',effectLabel:'倍率',effectId:'super2Mult',priceId:'super2Price',btnId:'buySuper2',maxBtnId:'maxSuper2',currency:'⚡'},
      {id:'superCard3',icon:'⚡',title:'超级加倍',levelId:'super3Level',effectLabel:'每次',effectId:'super3Amount',priceId:'super3Price',btnId:'buySuper3',maxBtnId:'maxSuper3',currency:'⚡'}
    ];
    const prestige = [
      {id:'prestigeCard1',icon:'💪',title:'雷霆万钧',levelId:'prestige1Level',effectLabel:'倍率',effectId:'prestige1Mult',priceId:'prestige1Price',btnId:'buyPrestige1',maxBtnId:'maxPrestige1',currency:'⭐'},
      {id:'prestigeCard2',icon:'💎',title:'超级倍增',levelId:'prestige2Level',effectLabel:'倍率',effectId:'prestige2Mult',priceId:'prestige2Price',btnId:'buyPrestige2',maxBtnId:'maxPrestige2',currency:'⭐'},
      {id:'prestigeCard3',icon:'✨',title:'声望加倍',levelId:'prestige3Level',effectLabel:'倍率',effectId:'prestige3Mult',priceId:'prestige3Price',btnId:'buyPrestige3',maxBtnId:'maxPrestige3',currency:'⭐'},
      {id:'prestigeCard4',icon:'🔱',title:'雷霆点加倍',levelId:'prestige4Level',effectLabel:'倍率',effectId:'prestige4Mult',priceId:'prestige4Price',btnId:'buyPrestige4',maxBtnId:'maxPrestige4',currency:'⭐'}
    ];
    createCard('basicCards', basic);
    createCard('superCards', superUp, true);
    createCard('prestigeCards', prestige);

    function updateCards(){
      // 基础
      document.getElementById('upgrade1Level').textContent = state.upgrade1Level;
      document.getElementById('upgrade1Amount').innerHTML = baseThunderAmount().toDisplayHTML();
      const p1 = price1(state.upgrade1Level);
      document.getElementById('upgrade1Price').innerHTML = p1.toDisplayHTML();
      const can1 = state.thunder.gte(p1);
      document.getElementById('buyUpgrade1').disabled = !can1;
      document.getElementById('maxUpgrade1').disabled = !can1;
      document.getElementById('upgradeCard1').classList.toggle('affordable', can1);

      document.getElementById('upgrade2Level').textContent = state.upgrade2Level;
      document.getElementById('upgrade2Interval').textContent = interval().toFixed(4);
      const isMax2 = state.upgrade2Level >= MAX_UPGRADE2;
      const btn2 = document.getElementById('buyUpgrade2');
      const maxBtn2 = document.getElementById('maxUpgrade2');
      if(isMax2){
        btn2.disabled = true; btn2.textContent = '已满级';
        maxBtn2.disabled = true;
      } else {
        const p2 = price2(state.upgrade2Level);
        document.getElementById('upgrade2Price').innerHTML = p2.toDisplayHTML();
        const can2 = state.thunder.gte(p2);
        btn2.disabled = !can2; btn2.textContent = '升级';
        maxBtn2.disabled = !can2;
        document.getElementById('upgradeCard2').classList.toggle('affordable', can2);
      }

      // 超级
      document.getElementById('super1Level').textContent = state.super1Level;
      document.getElementById('super1Chance').textContent = (superChance()*100).toFixed(0);
      const sp1 = priceS1(state.super1Level);
      document.getElementById('super1Price').innerHTML = sp1.toDisplayHTML();
      const canS1 = state.superThunder.gte(sp1);
      document.getElementById('buySuper1').disabled = !canS1;
      document.getElementById('maxSuper1').disabled = !canS1;
      document.getElementById('superCard1').classList.toggle('affordable', canS1);

      document.getElementById('super2Level').textContent = state.super2Level;
      document.getElementById('super2Mult').textContent = Math.pow(2,state.super2Level).toLocaleString();
      const sp2 = priceS2(state.super2Level);
      document.getElementById('super2Price').innerHTML = sp2.toDisplayHTML();
      const canS2 = state.superThunder.gte(sp2);
      document.getElementById('buySuper2').disabled = !canS2;
      document.getElementById('maxSuper2').disabled = !canS2;
      document.getElementById('superCard2').classList.toggle('affordable', canS2);

      document.getElementById('super3Level').textContent = state.super3Level;
      document.getElementById('super3Amount').innerHTML = superPerTick().toDisplayHTML();
      const sp3 = priceS3(state.super3Level);
      document.getElementById('super3Price').innerHTML = sp3.toDisplayHTML();
      const canS3 = state.superThunder.gte(sp3);
      document.getElementById('buySuper3').disabled = !canS3;
      document.getElementById('maxSuper3').disabled = !canS3;
      document.getElementById('superCard3').classList.toggle('affordable', canS3);

      // 声望
      document.getElementById('prestige1Level').textContent = state.prestige1Level;
      document.getElementById('prestige1Mult').textContent = Math.pow(2,state.prestige1Level).toLocaleString();
      const pp1 = priceP1(state.prestige1Level);
      document.getElementById('prestige1Price').innerHTML = pp1.toDisplayHTML();
      const canP1 = state.prestigePoints.gte(pp1);
      document.getElementById('buyPrestige1').disabled = !canP1;
      document.getElementById('maxPrestige1').disabled = !canP1;
      document.getElementById('prestigeCard1').classList.toggle('affordable', canP1);

      document.getElementById('prestige2Level').textContent = state.prestige2Level;
      document.getElementById('prestige2Mult').textContent = Math.pow(2,state.prestige2Level).toLocaleString();
      const pp2 = priceP2(state.prestige2Level);
      document.getElementById('prestige2Price').innerHTML = pp2.toDisplayHTML();
      const canP2 = state.prestigePoints.gte(pp2);
      document.getElementById('buyPrestige2').disabled = !canP2;
      document.getElementById('maxPrestige2').disabled = !canP2;
      document.getElementById('prestigeCard2').classList.toggle('affordable', canP2);

      document.getElementById('prestige3Level').textContent = state.prestige3Level;
      document.getElementById('prestige3Mult').textContent = Math.pow(2,state.prestige3Level).toLocaleString();
      const pp3 = priceP3(state.prestige3Level);
      document.getElementById('prestige3Price').innerHTML = pp3.toDisplayHTML();
      const canP3 = state.prestigePoints.gte(pp3);
      document.getElementById('buyPrestige3').disabled = !canP3;
      document.getElementById('maxPrestige3').disabled = !canP3;
      document.getElementById('prestigeCard3').classList.toggle('affordable', canP3);

      document.getElementById('prestige4Level').textContent = state.prestige4Level;
      document.getElementById('prestige4Mult').textContent = Math.pow(2,state.prestige4Level).toLocaleString();
      const pp4 = priceP4(state.prestige4Level);
      document.getElementById('prestige4Price').innerHTML = pp4.toDisplayHTML();
      const canP4 = state.prestigePoints.gte(pp4);
      document.getElementById('buyPrestige4').disabled = !canP4;
      document.getElementById('maxPrestige4').disabled = !canP4;
      document.getElementById('prestigeCard4').classList.toggle('affordable', canP4);
    }

    function refreshAll(){ updateUI(); updateCards(); }

    function buy(priceFn, getCurrency, setCurrency, level, setLevel){
      const cost = priceFn(level);
      if(!getCurrency().gte(cost)) return;
      setCurrency(getCurrency().subtract(cost));
      setLevel(level+1);
      refreshAll(); save();
    }
    function buyMax(priceFn, getCurrency, setCurrency, level, setLevel){
      let currency = getCurrency();
      let lvl = level;
      let count = 0;
      while(currency.gte(priceFn(lvl)) && count < 1000){
        currency = currency.subtract(priceFn(lvl));
        lvl++;
        count++;
      }
      if(count > 0){
        setCurrency(currency);
        setLevel(lvl);
        refreshAll(); save();
      }
    }

    // 事件绑定
    document.getElementById('buyUpgrade1').addEventListener('click', ()=>buy(price1, ()=>state.thunder, v=>state.thunder=v, state.upgrade1Level, v=>state.upgrade1Level=v));
    document.getElementById('maxUpgrade1').addEventListener('click', ()=>buyMax(price1, ()=>state.thunder, v=>state.thunder=v, state.upgrade1Level, v=>state.upgrade1Level=v));
    document.getElementById('buyUpgrade2').addEventListener('click', ()=>{
      if(state.upgrade2Level>=MAX_UPGRADE2)return;
      buy(price2, ()=>state.thunder, v=>state.thunder=v, state.upgrade2Level, v=>state.upgrade2Level=v);
    });
    document.getElementById('maxUpgrade2').addEventListener('click', ()=>{
      if(state.upgrade2Level>=MAX_UPGRADE2)return;
      buyMax(price2, ()=>state.thunder, v=>state.thunder=v, state.upgrade2Level, v=>state.upgrade2Level=v);
    });
    document.getElementById('buySuper1').addEventListener('click', ()=>buy(priceS1, ()=>state.superThunder, v=>state.superThunder=v, state.super1Level, v=>state.super1Level=v));
    document.getElementById('maxSuper1').addEventListener('click', ()=>buyMax(priceS1, ()=>state.superThunder, v=>state.superThunder=v, state.super1Level, v=>state.super1Level=v));
    document.getElementById('buySuper2').addEventListener('click', ()=>buy(priceS2, ()=>state.superThunder, v=>state.superThunder=v, state.super2Level, v=>state.super2Level=v));
    document.getElementById('maxSuper2').addEventListener('click', ()=>buyMax(priceS2, ()=>state.superThunder, v=>state.superThunder=v, state.super2Level, v=>state.super2Level=v));
    document.getElementById('buySuper3').addEventListener('click', ()=>buy(priceS3, ()=>state.superThunder, v=>state.superThunder=v, state.super3Level, v=>state.super3Level=v));
    document.getElementById('maxSuper3').addEventListener('click', ()=>buyMax(priceS3, ()=>state.superThunder, v=>state.superThunder=v, state.super3Level, v=>state.super3Level=v));
    document.getElementById('buyPrestige1').addEventListener('click', ()=>buy(priceP1, ()=>state.prestigePoints, v=>state.prestigePoints=v, state.prestige1Level, v=>state.prestige1Level=v));
    document.getElementById('maxPrestige1').addEventListener('click', ()=>buyMax(priceP1, ()=>state.prestigePoints, v=>state.prestigePoints=v, state.prestige1Level, v=>state.prestige1Level=v));
    document.getElementById('buyPrestige2').addEventListener('click', ()=>buy(priceP2, ()=>state.prestigePoints, v=>state.prestigePoints=v, state.prestige2Level, v=>state.prestige2Level=v));
    document.getElementById('maxPrestige2').addEventListener('click', ()=>buyMax(priceP2, ()=>state.prestigePoints, v=>state.prestigePoints=v, state.prestige2Level, v=>state.prestige2Level=v));
    document.getElementById('buyPrestige3').addEventListener('click', ()=>buy(priceP3, ()=>state.prestigePoints, v=>state.prestigePoints=v, state.prestige3Level, v=>state.prestige3Level=v));
    document.getElementById('maxPrestige3').addEventListener('click', ()=>buyMax(priceP3, ()=>state.prestigePoints, v=>state.prestigePoints=v, state.prestige3Level, v=>state.prestige3Level=v));
    document.getElementById('buyPrestige4').addEventListener('click', ()=>buy(priceP4, ()=>state.prestigePoints, v=>state.prestigePoints=v, state.prestige4Level, v=>state.prestige4Level=v));
    document.getElementById('maxPrestige4').addEventListener('click', ()=>buyMax(priceP4, ()=>state.prestigePoints, v=>state.prestigePoints=v, state.prestige4Level, v=>state.prestige4Level=v));

    document.getElementById('prestigeBtn').addEventListener('click', ()=>{
      if(!state.thunder.gte(PRESTIGE_THRESHOLD)) return;
      const logGain = 1 + 0.5*(state.thunder.toLog10() - 10) + state.prestige3Level * Math.log10(2);
      state.prestigePoints = state.prestigePoints.add(BigNum.fromLog10(logGain));
      state.thunder = new BigNum(0,0,0);
      state.tapPoints = new BigNum(0,0,0);
      state.superThunder = new BigNum(0,0,0);
      state.upgrade1Level = 0; state.upgrade2Level = 0;
      state.super1Level = 0; state.super2Level = 0; state.super3Level = 0;
      state.accumulatedTime = 0;
      refreshAll(); save();
    });

    document.addEventListener('click', (e)=>{
      if(e.target.tagName === 'BUTTON') return;
      const points = BigNum.fromLog10(state.prestige4Level * Math.log10(2));
      state.tapPoints = state.tapPoints.add(points);
      refreshAll();
      const p = document.createElement('span');
      p.style.cssText = `position:fixed;pointer-events:none;z-index:999;font-size:1.3rem;left:${e.clientX}px;top:${e.clientY}px;--px:${Math.random()*60-30}px;--py:${Math.random()*-60-20}px;animation:particleBurst 0.7s ease-out forwards;`;
      p.textContent = '⚡';
      document.body.appendChild(p);
      p.addEventListener('animationend', ()=>p.remove());
    });

    function gameTick(){
      const now = Date.now();
      let delta = now - state.lastTickTime;
      if(delta < 0) delta = 0;
      if(delta > 60000) delta = 60000;
      state.lastTickTime = now;
      state.accumulatedTime += delta/1000;
      const intv = interval();
      const amt = thunderPerTick();
      const sAmt = superPerTick();
      const chance = superChance();
      while(state.accumulatedTime >= intv){
        state.thunder = state.thunder.add(amt);
        if(Math.random() < chance) state.superThunder = state.superThunder.add(sAmt);
        state.accumulatedTime -= intv;
      }
      refreshAll();
      if(now - state.lastSaveTime >= 2000) save();
      setTimeout(gameTick, Math.max(40, intv*800));
    }

    function save(){
      const data = {
        tB:state.thunder.base,tEB:state.thunder.expBase,tEE:state.thunder.expExp,
        pB:state.tapPoints.base,pEB:state.tapPoints.expBase,pEE:state.tapPoints.expExp,
        sB:state.superThunder.base,sEB:state.superThunder.expBase,sEE:state.superThunder.expExp,
        ppB:state.prestigePoints.base,ppEB:state.prestigePoints.expBase,ppEE:state.prestigePoints.expExp,
        u1:state.upgrade1Level,u2:state.upgrade2Level,
        s1:state.super1Level,s2:state.super2Level,s3:state.super3Level,
        p1:state.prestige1Level,p2:state.prestige2Level,p3:state.prestige3Level,p4:state.prestige4Level,
        acc:state.accumulatedTime,last:state.lastTickTime,ts:Date.now()
      };
      localStorage.setItem('superThunder_v11', JSON.stringify(data));
      state.lastSaveTime = Date.now();
    }
    function load(){
      const raw = localStorage.getItem('superThunder_v11');
      if(!raw) return false;
      try{
        const d = JSON.parse(raw);
        state.thunder = new BigNum(d.tB??0,d.tEB??0,d.tEE??0);
        state.tapPoints = new BigNum(d.pB??0,d.pEB??0,d.pEE??0);
        state.superThunder = new BigNum(d.sB??0,d.sEB??0,d.sEE??0);
        state.prestigePoints = new BigNum(d.ppB??0,d.ppEB??0,d.ppEE??0);
        state.upgrade1Level = d.u1??0; state.upgrade2Level = d.u2??0;
        state.super1Level = d.s1??0; state.super2Level = d.s2??0; state.super3Level = d.s3??0;
        state.prestige1Level = d.p1??0; state.prestige2Level = d.p2??0; state.prestige3Level = d.p3??0; state.prestige4Level = d.p4??0;
        state.accumulatedTime = d.acc??0;
        const now = Date.now();
        const elapsed = Math.min((now - (d.last??now))/1000, 86400);
        if(elapsed > 0.05){
          const perSec = thunderPerTick().multiplyByNum(1/interval());
          state.thunder = state.thunder.add(perSec.multiplyByNum(elapsed));
          let earned = new BigNum(0,0,0);
          const ticks = Math.floor(elapsed/interval());
          for(let i=0; i<Math.min(ticks,10000); i++) if(Math.random() < superChance()) earned = earned.add(superPerTick());
          state.superThunder = state.superThunder.add(earned);
        }
        state.lastTickTime = now; state.lastSaveTime = now;
        return true;
      }catch(e){ return false; }
    }

    function init(){
      // 背景粒子
      const container = document.getElementById('particleContainer');
      for(let i=0; i<12; i++){
        const p = document.createElement('span');
        p.className = 'bg-particle';
        p.textContent = ['⚡','✨','💫','⚡','🌟','⚡','🔥'][i%7];
        p.style.cssText = `left:${Math.random()*95}%;--dur:${8+Math.random()*20}s;--delay:${Math.random()*15}s;color:${['gold','cyan','red'][i%3]};`;
        container.appendChild(p);
      }
      if(!load()){ state.lastTickTime = Date.now(); state.lastSaveTime = Date.now(); }
      refreshAll(); save();
      setTimeout(gameTick, 100);
      document.addEventListener('visibilitychange', ()=>{
        if(document.visibilityState === 'visible'){
          const now = Date.now();
          const delta = now - state.lastTickTime;
          if(delta > 2000){
            state.accumulatedTime += Math.min(delta/1000, 86400);
            const intv = interval(); const amt = thunderPerTick(); const sAmt = superPerTick(); const chance = superChance();
            while(state.accumulatedTime >= intv){
              state.thunder = state.thunder.add(amt);
              if(Math.random() < chance) state.superThunder = state.superThunder.add(sAmt);
              state.accumulatedTime -= intv;
            }
            state.lastTickTime = now;
            refreshAll();
            if(now - state.lastSaveTime >= 2000) save();
          }
        }
      });
    }
    init();
  })();
</script>
</body>
</html>
