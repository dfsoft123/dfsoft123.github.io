<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>抽卡</title>
    <style>
        :root {
            --gold: #ffd700;
            --diamond: #b9f2ff;
            --rebirth: #e056fd;
            --super: #ff8c00;
            --bg-dark: #04040e;
            --panel-bg: rgba(20, 24, 40, 0.55);
            --border-glow: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #8a8d9b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* 动态深空背景 */
        .bg-animated {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: 
                radial-gradient(circle at 10% 20%, rgba(138, 43, 226, 0.15), transparent 35%),
                radial-gradient(circle at 90% 80%, rgba(0, 255, 255, 0.1), transparent 35%),
                radial-gradient(circle at 50% 50%, rgba(255, 215, 0, 0.03), transparent 60%);
            animation: bg-pulse 10s infinite alternate ease-in-out;
        }
        @keyframes bg-pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.1); opacity: 1; } }

        /* 顶部状态栏 */
        header {
            background: rgba(4, 4, 14, 0.85);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--border-glow);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            gap: 20px;
        }
        .logo {
            font-size: 1.8em; font-weight: 800; letter-spacing: 4px; flex-shrink: 0;
            background: linear-gradient(to right, #fff, #b9f2ff, #e056fd);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(185, 242, 255, 0.3);
        }
        .stats-bar { display: flex; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }
        .stat-box {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255, 255, 255, 0.04);
            padding: 6px 14px; border-radius: 8px;
            border: 1px solid var(--border-glow);
            transition: all 0.3s;
        }
        .stat-box:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255,255,255,0.2); }
        .stat-icon { font-size: 1.1em; }
        .stat-info { display: flex; flex-direction: column; line-height: 1.2; }
        .stat-label { font-size: 0.65em; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1em; font-weight: 700; color: var(--text-main); }
        .stat-value.gold { color: var(--gold); text-shadow: 0 0 8px rgba(255, 215, 0, 0.4); }
        .stat-value.diamond { color: var(--diamond); text-shadow: 0 0 8px rgba(185, 242, 255, 0.4); }
        .stat-value.rebirth { color: var(--rebirth); text-shadow: 0 0 8px rgba(224, 86, 253, 0.4); }

        /* 控制与卡包面板 */
        .main-panel {
            padding: 20px 30px;
            background: linear-gradient(to bottom, rgba(10, 12, 25, 0.6), transparent);
        }
        
        /* 模块化按钮组 */
        .controls-row {
            display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px;
            align-items: stretch;
        }
        .ctrl-group {
            display: flex; gap: 10px; align-items: center;
            background: var(--panel-bg);
            padding: 8px; border-radius: 12px;
            border: 1px solid var(--border-glow);
            backdrop-filter: blur(10px);
        }

        .btn {
            padding: 10px 20px; border: none; border-radius: 8px;
            font-size: 0.85em; font-weight: 600; cursor: pointer;
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
            color: #fff; position: relative; overflow: hidden;
            display: flex; align-items: center; gap: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.2); box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        
        /* 按钮流光特效 */
        .btn::after {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }
        .btn:hover:not(:disabled)::after { left: 100%; }

        .btn-gacha { background: linear-gradient(135deg, #8a2be2, #ff416c); }
        .btn-upgrade { background: linear-gradient(135deg, #005c97, #363795); }
        .btn-rebirth-pull { background: linear-gradient(135deg, #c31432, #240b36); }
        .btn-super-rebirth-pull { background: linear-gradient(135deg, #8e2de2, #ff8c00); }
        .btn-rebirth { background: linear-gradient(135deg, #f12711, #f5af19); color: #000; }
        .btn-auto { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .btn-auto.active { background: linear-gradient(135deg, #cb2d3e, #ef473a); }
        .btn-super { background: linear-gradient(135deg, #8e2de2, #ff8c00); }
        .btn-super.active { box-shadow: 0 0 15px var(--super), inset 0 0 10px rgba(255,255,255,0.3); }
        .btn-breakthrough { background: linear-gradient(135deg, #fc4a1a, #f7b733); color: #000; box-shadow: 0 4px 12px rgba(252, 74, 26, 0.4); }
        .btn-sort { background: rgba(255,255,255,0.1); border: 1px solid var(--border-glow); }
        .btn-reset { background: linear-gradient(135deg, #6b0f1a, #c31432); box-shadow: 0 4px 10px rgba(195, 20, 50, 0.4); }

        .packs-wrapper { margin-bottom: 10px; }
        .packs-title { font-size: 0.8em; color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; padding-left: 5px; }
        .packs-list { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
        .packs-list::-webkit-scrollbar { height: 6px; }
        .packs-list::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        
        .pack-card {
            min-width: 180px; padding: 12px; border-radius: 10px;
            background: var(--panel-bg); border: 1px solid var(--border-glow);
            transition: all 0.3s; backdrop-filter: blur(5px);
            flex-shrink: 0;
        }
        .pack-card.active { border-color: var(--gold); background: rgba(255, 215, 0, 0.08); box-shadow: 0 0 20px rgba(255,215,0,0.2); }
        .pack-card.super-pack { border-color: var(--super); background: rgba(255, 140, 0, 0.08); box-shadow: 0 0 20px rgba(255,140,0,0.2); }
        .pack-card.reborn-pack { border-color: var(--rebirth); }
        .pack-card.super-reborn-pack { border-color: var(--super); background: rgba(255, 140, 0, 0.05); }
        .pack-card-head { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9em; }
        .pack-name { font-weight: 700; color: #fff; }
        .pack-price { color: var(--gold); font-weight: 600; }
        .pack-price.super-price { color: var(--super); }
        .pack-drops { font-size: 0.7em; color: var(--text-dim); line-height: 1.5; }
        .pack-drop-item { display: flex; justify-content: space-between; }

        /* 卡片图鉴 */
        #collection {
            flex: 1; padding: 20px 30px 40px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px; align-content: start;
            perspective: 1000px;
        }

        .card {
            border-radius: 12px; padding: 12px; position: relative; overflow: hidden;
            border-width: 1.5px; border-style: solid; height: 110px;
            display: none; flex-direction: column; justify-content: space-between;
            transition: transform 0.2s, box-shadow 0.2s;
            transform-style: preserve-3d;
        }
        .card.owned { display: flex; }
        .card.owned:hover { 
            transform: translateY(-6px) scale(1.06) rotateZ(1deg); 
            z-index: 10; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); 
        }
        
        .card-top { font-weight: 700; font-size: 0.9em; text-shadow: 0 2px 4px rgba(0,0,0,0.8); z-index: 2; }
        .card-mid { font-size: 0.7em; color: rgba(255,255,255,0.85); z-index: 2; }
        .card-bot { display: flex; justify-content: space-between; align-items: flex-end; z-index: 2; }
        .card-count { font-size: 1.1em; font-weight: 800; color: #fff; }
        .card-total { font-size: 0.7em; color: var(--gold); text-align: right; font-weight: 600; }
        .card-percent { font-size: 0.65em; color: var(--diamond); text-align: right; margin-top: 2px; font-weight: 600; }

        /* 普通卡稀有度 */
        .r-common { border-color: #7f8c8d; background: linear-gradient(145deg, #2c3e50, #1a252f); }
        .r-uncommon { border-color: #2ecc71; background: linear-gradient(145deg, #27ae60, #1e8449); }
        .r-rare { border-color: #3498db; background: linear-gradient(145deg, #2980b9, #1f618d); }
        .r-epic { border-color: #9b59b6; background: linear-gradient(145deg, #8e44ad, #6c3483); }
        .r-legend { border-color: #f1c40f; background: linear-gradient(145deg, #d35400, #a04000); animation: legend-anim 2s infinite alternate; }
        .r-myth { border-color: #e74c3c; background: linear-gradient(145deg, #c0392b, #922b21); animation: myth-anim 1s infinite alternate; }
        .r-divine { border-color: #00ffff; background: linear-gradient(145deg, #00b3b3, #008080); animation: divine-anim 0.5s infinite alternate; }
        .r-supreme { border-color: #ff00ff; background: linear-gradient(145deg, #8a2be2, #4b0082); animation: supreme-anim 0.4s infinite alternate; }
        .r-beyond { 
            border-color: #fff; 
            background: linear-gradient(45deg, #ffffff, #f0e6ff, #ffffff, #e6f7ff, #ffffff); 
            background-size: 400% 400%;
            animation: beyond-anim 2s infinite linear; 
            box-shadow: 0 0 40px #ffffff, inset 0 0 20px rgba(255,255,255,0.8); 
        }
        .r-beyond .card-top, .r-beyond .card-mid, .r-beyond .card-count, .r-beyond .card-percent { color: #000; text-shadow: 0 1px 2px rgba(255,255,255,0.5); }
        .r-beyond .card-total { color: #d35400; }
        @keyframes beyond-anim { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* 特殊变异 */
        .s-gold { box-shadow: 0 0 20px var(--gold); border-color: var(--gold) !important; }
        .s-gold::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,215,0,0.4), transparent); animation: shine 3s infinite linear; z-index: 1; }
        .s-diamond { box-shadow: 0 0 20px var(--diamond); border-color: var(--diamond) !important; }
        
        .s-rainbow { 
            background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3) !important;
            border: 2px solid rgba(255,255,255,0.9) !important;
            animation: rainbow-rot 3s infinite linear; 
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5), inset 0 0 10px rgba(255,255,255,0.2);
        }
        .s-rainbow::before {
            content: ''; position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.28);
            z-index: 1;
        }
        
        .s-transcendent { 
            border-color: rgba(255,255,255,0.8) !important; 
            background: radial-gradient(circle at center, #1a0a2e, #000) !important; 
            box-shadow: 0 0 35px rgba(138, 43, 226, 1), 0 0 60px rgba(0, 255, 255, 0.4), inset 0 0 20px rgba(255,255,255,0.2);
            overflow: hidden;
        }
        .s-transcendent::after { 
            content: ''; position: absolute; top: 50%; left: 50%; width: 150%; height: 150%; 
            background: conic-gradient(from 0deg, transparent 0%, #8a2be2 15%, #ffd700 30%, #00ffff 45%, #ff416c 60%, #8a2be2 75%, transparent 100%); 
            border-radius: 50%; transform: translate(-50%, -50%) scale(0.8) rotate(0deg); 
            animation: blackhole-spin 4s linear infinite; 
            z-index: 1; filter: blur(8px); opacity: 0.9;
        }
        .s-transcendent::before { 
            content: ''; position: absolute; top: 50%; left: 50%; width: 70%; height: 70%; 
            background: #000; border-radius: 50%; transform: translate(-50%, -50%); z-index: 2; 
            box-shadow: 0 0 30px rgba(255,255,255,0.9) inset, 0 0 15px rgba(138,43,226,0.9) inset; 
            animation: blackhole-core 2s infinite alternate;
        }

        /* 重生卡特效 */
        .card.reborn { border-width: 2px; }
        .rb-N { background: #050505; border-color: #333; color: #fff; }
        .rb-R { background: #050505; border-color: #555; animation: rb-flash 1.5s infinite alternate; }
        .rb-SR { background: #050505; border-color: #0055ff; animation: rb-flash-blue 1.2s infinite alternate; }
        .rb-SSR { background: linear-gradient(135deg, #001f3f, #ffd700); border-color: #ffd700; animation: rb-flash-gold 1s infinite alternate; }
        .rb-UR { background: linear-gradient(135deg, #ff0000, #0000ff); border-color: #ff00ff; animation: rb-flash-rb 0.8s infinite alternate; }
        .rb-SUR { background: linear-gradient(135deg, #000, #fff); border-color: #fff; animation: rb-flash-bw 0.6s infinite alternate; box-shadow: 0 0 20px #fff; }
        .rb-SP { background: linear-gradient(135deg, #000, #ffd700,#000); border-color: #ffd700; animation: rb-flash-gold 0.5s infinite alternate; box-shadow: 0 0 30px #000; }
        
        .rb-SSP { background: #000; border-color: #fff; overflow: hidden; box-shadow: 0 0 30px rgba(255,255,255,0.5); }
        .rb-SSP::before { content: ''; position: absolute; top: 50%; left: 50%; width: 140%; height: 140%; transform: translate(-50%, -50%); background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='white'/><path d='M50 5 A45 45 0 0 1 50 95 A22.5 22.5 0 0 1 50 50 A22.5 22.5 0 0 0 50 5 Z' fill='black'/><circle cx='50' cy='27.5' r='6' fill='white'/><circle cx='50' cy='72.5' r='6' fill='black'/></svg>"); background-size: contain; background-repeat: no-repeat; background-position: center; animation: spin 4s linear infinite; opacity: 0.9; z-index: 1; filter: drop-shadow(0 0 5px #fff); }
        .rb-SSP::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, transparent 40%, rgba(255,255,255,0.2) 100%); z-index: 2; }
        
        .rb-SUP { background: linear-gradient(45deg, #001f3f, #8a2be2, #ff416c, #001f3f); background-size: 400% 400%; animation: galaxy 3s ease infinite; border-color: #fff; box-shadow: 0 0 40px rgba(255,255,255,0.8), 0 0 80px rgba(138, 43, 226, 0.5); overflow: hidden; }
        .rb-SUP::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(2px 2px at 20px 30px, #fff, transparent), radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.9), transparent), radial-gradient(2px 2px at 90px 40px, #fff, transparent); background-size: 100px 100px; animation: starTwinkle 1.5s infinite alternate; z-index: 1; }
        .rb-SUP::after { content: ''; position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, transparent 50%); transform: translate(-50%, -50%); border-radius: 50%; animation: pulse 2s infinite; z-index: 1; }

        .rb-EX { 
            background: #000;
            border: 2px solid transparent;
            background-image: linear-gradient(#050505, #050505), linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff, #00ffff);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            box-shadow: 0 0 30px #ff00ff, 0 0 60px #00ffff, inset 0 0 20px rgba(255,255,255,0.2);
            overflow: hidden;
        }
        .rb-EX::before { 
            content: ''; position: absolute; inset: -50%; 
            background: conic-gradient(from 0deg, transparent 0%, #ff00ff 20%, transparent 40%, #00ffff 60%, transparent 80%, #ff00ff 100%); 
            animation: ex-spin 3s linear infinite; z-index: 0; filter: blur(12px); opacity: 0.9;
        }

        /* 新增超高阶重生卡特效 */
        .rb-EXp { 
            background: #000;
            border: 2px solid transparent;
            background-image: linear-gradient(#000, #000), conic-gradient(from 0deg, #ffd700, #ff00ff, #00ffff, #ffd700);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            box-shadow: 0 0 40px #ffd700, 0 0 80px #00ffff;
            overflow: hidden;
        }
        .rb-EXp::before { 
            content: ''; position: absolute; inset: -50%; 
            background: conic-gradient(from 0deg, transparent 0%, #ffd700 20%, transparent 40%, #00ffff 60%, transparent 80%, #ffd700 100%); 
            animation: ex-spin 2s linear infinite; z-index: 0; filter: blur(15px); opacity: 1;
        }

        .rb-SEX {
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff, #00ffff);
            background-size: 400% 400%;
            border: 2px solid #fff;
            box-shadow: 0 0 40px #fff, inset 0 0 20px rgba(255,255,255,0.5);
            animation: galaxy 1s ease infinite, ex-spin 3s linear infinite;
        }

        .rb-SEXp {
            background: radial-gradient(circle, #fff, #000, #fff);
            background-size: 200% 200%;
            border: 2px solid #fff;
            box-shadow: 0 0 50px #fff, inset 0 0 30px #ff00ff;
            animation: galaxy 0.5s ease infinite;
        }

        .rb-UEX { 
            background: #000; 
            border: 2px solid transparent;
            background-image: linear-gradient(#000, #000), conic-gradient(from 0deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            box-shadow: 0 0 50px #fff, inset 0 0 30px rgba(255,255,255,0.5);
            animation: ex-spin 0.5s linear infinite;
        }

        @keyframes supreme-anim { from { box-shadow: 0 0 30px #ff00ff, inset 0 0 15px #4b0082; } to { box-shadow: 0 0 60px #ffffff, inset 0 0 30px #ff00ff; filter: brightness(1.5); } }
        @keyframes legend-anim { from { box-shadow: 0 0 10px #e67e22; } to { box-shadow: 0 0 30px #f1c40f, inset 0 0 15px #f1c40f; } }
        @keyframes myth-anim { from { box-shadow: 0 0 15px #e74c3c; filter: brightness(1); } to { box-shadow: 0 0 40px #ff0000; filter: brightness(1.3); } }
        @keyframes divine-anim { from { box-shadow: 0 0 20px #00ffff; } to { box-shadow: 0 0 60px #ffffff; filter: brightness(1.5); } }
        @keyframes shine { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes rainbow-rot { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        @keyframes blackhole-spin { 0% { transform: translate(-50%, -50%) scale(0.8) rotate(0deg); } 100% { transform: translate(-50%, -50%) scale(0.8) rotate(360deg); } }
        @keyframes blackhole-core { from { box-shadow: 0 0 30px rgba(255,255,255,0.9) inset, 0 0 15px rgba(138,43,226,0.9) inset; } to { box-shadow: 0 0 50px rgba(255,255,255,1) inset, 0 0 30px rgba(138,43,226,1) inset; } }
        @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes galaxy { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes starTwinkle { 0% { opacity: 0.3; } 100% { opacity: 0.9; } }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.9; } }
        @keyframes rb-flash { from { box-shadow: 0 0 5px #555; } to { box-shadow: 0 0 20px #fff; } }
        @keyframes rb-flash-blue { from { box-shadow: 0 0 5px #0055ff; } to { box-shadow: 0 0 25px #00aaff; } }
        @keyframes rb-flash-gold { from { box-shadow: 0 0 10px #ffd700; } to { box-shadow: 0 0 30px #fff, 0 0 50px #ffd700; } }
        @keyframes rb-flash-rb { from { box-shadow: 0 0 10px #ff0000; } to { box-shadow: 0 0 30px #0000ff; } }
        @keyframes rb-flash-bw { from { box-shadow: 0 0 10px #000; } to { box-shadow: 0 0 30px #fff; } }
        @keyframes ex-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 重置确认模态框 */
        .reset-modal-overlay, .df-console-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px);
            z-index: 9999; display: none;
            justify-content: center; align-items: center;
        }
        .reset-modal-overlay.show { display: flex; }
        .df-console-overlay.show { display: flex; z-index: 10000; }

        .reset-modal {
            background: linear-gradient(145deg, #1a1020, #0a0510);
            border: 1px solid rgba(255, 65, 108, 0.35);
            border-radius: 16px; padding: 32px;
            max-width: 400px; width: 90%;
            box-shadow: 0 20px 60px rgba(195, 20, 50, 0.4), 0 0 50px rgba(255, 65, 108, 0.15);
            text-align: center;
            animation: modalIn 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        @keyframes modalIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .reset-modal-icon { font-size: 2.5em; margin-bottom: 10px; filter: drop-shadow(0 0 12px rgba(255, 65, 108, 0.6)); }
        .reset-modal h3 {
            color: #ff416c; font-size: 1.3em; margin-bottom: 12px;
            text-shadow: 0 0 15px rgba(255, 65, 108, 0.5); letter-spacing: 1px;
        }
        .reset-modal p { color: var(--text-dim); margin-bottom: 28px; line-height: 1.7; font-size: 0.88em; }
        .reset-modal p strong { color: #ff416c; }
        .reset-modal-btns { display: flex; gap: 12px; justify-content: center; }
        .reset-modal-btn {
            padding: 10px 28px; border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer; transition: all 0.25s;
            font-size: 0.9em;
        }
        .reset-modal-btn:hover { transform: translateY(-2px); filter: brightness(1.2); }

<script>
    const RARITY_NAMES = ['common', 'uncommon', 'rare', 'epic', 'legend', 'myth', 'divine', 'supreme', 'beyond'];
    const RARITY_DISPLAY = ['常见', '罕见', '稀有', '史诗', '传说', '神话', '神圣', '至高', '超越'];
    const SPECIALS = [
        { key: 'normal', name: '', mult: 1, prob: 88.89 },
        { key: 'gold', name: '黄金', mult: 2, prob: 10 },
        { key: 'diamond', name: '钻石', mult: 5, prob: 1 },
        { key: 'rainbow', name: '彩虹', mult: 20, prob: 0.1 },
        { key: 'transcendent', name: '超凡', mult: 100, prob: 0.01 }
    ];

    const PACKS = [
        [1, 10, [[0, 1, 1, 50], [1, 1, 1.5, 30], [2, 1, 2, 15], [3, 1, 2.5, 5]]],
        [2, 50, [[0, 2, 2, 50], [1, 2, 3, 30], [2, 2, 4, 15], [3, 2, 5, 5]]],
        [3, 1000, [[0, 3, 5, 40], [1, 3, 7.5, 30], [2, 3, 10, 20], [3, 3, 12.5, 7.5], [4, 3, 40, 2.5]]],
        [4, 20000, [[0, 4, 20, 40], [1, 4, 30, 30], [2, 4, 40, 20], [3, 4, 50, 7.5], [4, 4, 160, 2.5]]],
        [5, 1000000, [[0, 5, 50, 40], [1, 5, 75, 30], [2, 5, 100, 20], [3, 5, 125, 7.5], [4, 5, 400, 2], [5, 5, 1000, 0.5]]],
        [6, 100000000, [[0, 6, 250, 40], [1, 6, 375, 30], [2, 6, 500, 20], [3, 6, 675, 7.5], [4, 6, 2000, 2], [5, 6, 5000, 0.5]]],
        [7, 25000000000, [[0, 7, 1000, 40], [1, 7, 1500, 30], [2, 7, 2000, 20], [3, 7, 2500, 7.5], [4, 7, 8000, 2], [5, 7, 20000, 0.4], [6, 7, 50000, 0.1]]],
        [8, 10000000000000, [[0, 8, 5000, 40], [1, 8, 7500, 30], [2, 8, 10000, 20], [3, 8, 12500, 7.5], [4, 8, 40000, 2], [5, 8, 100000, 0.4], [6, 8, 250000, 0.1]]],
        [9, 10000000000000000, [[0, 9, 30000, 40], [1, 9, 45000, 30], [2, 9, 60000, 20], [3, 9, 75000, 7.5], [4, 9, 240000, 2], [5, 9, 600000, 0.4], [6, 9, 1500000, 0.08], [7, 9, 4500000, 0.02]]],
        [10, 100000000000000000000, [[0, 10, 150000, 40], [1, 10, 225000, 30], [2, 10, 300000, 20], [3, 10, 375000, 7.5], [4, 10, 1200000, 2], [5, 10, 3000000, 0.4], [6, 10, 7500000, 0.08], [7, 10, 22500000, 0.02]]],
        [11, 10000000000000000000000000, [[0, 11, 1500000, 40], [1, 11, 2250000, 30], [2, 11, 3000000, 20], [3, 11, 3750000, 7.5], [4, 11, 12000000, 2], [5, 11, 30000000, 0.4], [6, 11, 75000000, 0.08], [7, 11, 22500000, 0.015], [8, 11, 45000000, 0.005]]]
    ];

    const SUPER_DROPS = {
        1: [[3, 100]],
        2: [[3, 100]],
        3: [[3, 75], [4, 25]],
        4: [[3, 75], [4, 25]],
        5: [[3, 75], [4, 20], [5, 5]],
        6: [[3, 75], [4, 20], [5, 5]],
        7: [[3, 75], [4, 20], [5, 4], [6, 1]],
        8: [[3, 75], [4, 20], [5, 4], [6, 1]],
        9: [[3, 75], [4, 20], [5, 4], [6, 0.8], [7, 0.2]],
        10: [[3, 75], [4, 20], [5, 4], [6, 0.8], [7, 0.2]],
        11: [[3, 75], [4, 20], [5, 4], [6, 0.8], [7, 0.15], [8, 0.05]]
    };

    const REBIRTH_DROPS = [
        { name: 'N', prob: 40, mult: 0.1 }, { name: 'R', prob: 30, mult: 0.2 },
        { name: 'SR', prob: 20, mult: 0.3 }, { name: 'SSR', prob: 7.5, mult: 0.5 },
        { name: 'UR', prob: 2, mult: 1 }, { name: 'SUR', prob: 0.4, mult: 2 },
        { name: 'SP', prob: 0.07, mult: 3 }, { name: 'SSP', prob: 0.02, mult: 5 },
        { name: 'SUP', prob: 0.008, mult: 10 }, 
        { name: 'EX', prob: 0.002, mult: 25 }
    ];

    const SUPER_REBIRTH_DROPS = [
        { name: 'SP', prob: 70, mult: 3 },
        { name: 'SSP', prob: 20, mult: 5 },
        { name: 'SUP', prob: 7.5, mult: 10 },
        { name: 'EX', prob: 1.5, mult: 25 },
        { name: 'EX+', prob: 0.8, mult: 50 },
        { name: 'SEX', prob: 0.15, mult: 100 },
        { name: 'SEX+', prob: 0.04, mult: 200 },
        { name: 'UEX', prob: 0.01, mult: 500 }
    ];

    const REBIRTH_BREAKTHROUGH_BASE_COST = 1e24; // 1杼
    const REBIRTH_BREAKTHROUGH_CAP = 22;

    const SAVE_KEY = 'cardGameStellarV1';

    function getInitialState() {
        return {
            coins: 1, cards: { "1_0_1_0": 1 }, rebirthCards: {}, multiLvl: 0, multiPrice: 100,
            autoPull: false, autoRebirth: false, autoBulkRebirthPull: false, superMode: false, baseIncome: 1, income: 1, lastTime: Date.now(),
            rebirthCount: 0, rebirthCoins: 0, rebirthBreakthrough: 0, sortMode: 'single',
            startTime: Date.now(), onlineSeconds: 0
        };
    }

    let state = getInitialState();

    const $ = id => document.getElementById(id);
    const collectionEl = $('collection');

    function getRebirthCap() {
        return 2200000 * (1 + state.rebirthBreakthrough);
    }

    function getAutoRebirthCoinRate() {
        return getRebirthCap() * 0.1001;
    }

    function getBreakthroughCost() {
        return REBIRTH_BREAKTHROUGH_BASE_COST * Math.pow(2, state.rebirthBreakthrough);
    }

    function getPullAmount() {
        return (state.multiLvl + 1) * (state.rebirthBreakthrough + 1);
    }

    function findRebirthDrop(type) {
        return REBIRTH_DROPS.find(d => d.name === type) || SUPER_REBIRTH_DROPS.find(d => d.name === type);
    }

    function getCurrentDrops(pack) {
        if (!state.superMode) return pack[2];
        let superData = SUPER_DROPS[pack[0]];
        let result = [];
        superData.forEach(([rarityIdx, prob]) => {
            let normalDrop = pack[2].find(d => d[0] === rarityIdx);
            if (normalDrop) {
                result.push([rarityIdx, normalDrop[1], normalDrop[2], prob]);
            }
        });
        return result;
    }

    function getPackPrice(pack) {
        return state.superMode ? pack[1] * 10000 : pack[1];
    }

    function getProbStr(probNum) {
        if (probNum > 0 && probNum < 0.01) {
            return `1/${Math.round(100 / probNum)}`;
        } else {
            return probNum.toFixed(4) + '%';
        }
    }

    function renderPacks() {
        let html = '';
        PACKS.forEach(pack => {
            let drops = getCurrentDrops(pack);
            let dropsHtml = drops.map(d => `<div class="pack-drop-item"><span>${RARITY_DISPLAY[d[0]]}${d[1]}级</span><span>${getProbStr(d[3])}</span></div>`).join('');
            let price = getPackPrice(pack);
            let isSuper = state.superMode;
            html += `
                <div class="pack-card ${isSuper ? 'super-pack' : ''}" id="pack_${pack[0]}">
                    <div class="pack-card-head">
                        <span class="pack-name">${pack[0]}级卡包 ${isSuper ? '⚡' : ''}</span>
                        <span class="pack-price ${isSuper ? 'super-price' : ''}">${formatNum(price)}</span>
                    </div>
                    <div class="pack-drops">${dropsHtml}</div>
                </div>
            `;
        });
        let rebirthDropsHtml = REBIRTH_DROPS.map(d => `<div class="pack-drop-item"><span>${d.name}级</span><span>${getProbStr(d.prob)}</span></div>`).join('');
        html += `
            <div class="pack-card reborn-pack" id="pack_rebirth">
                <div class="pack-card-head">
                    <span class="pack-name" style="color: var(--rebirth);">🌌 重生卡包</span>
                    <span class="pack-price" style="color: var(--rebirth);">10 🔮</span>
                </div>
                <div class="pack-drops">${rebirthDropsHtml}</div>
            </div>
        `;
        let superRebirthDropsHtml = SUPER_REBIRTH_DROPS.map(d => `<div class="pack-drop-item"><span>${d.name}级</span><span>${getProbStr(d.prob)}</span></div>`).join('');
        html += `
            <div class="pack-card super-reborn-pack" id="pack_super_rebirth">
                <div class="pack-card-head">
                    <span class="pack-name" style="color: var(--super);">⚡ 超级重生卡包</span>
                    <span class="pack-price super-price">10万 🔮</span>
                </div>
                <div class="pack-drops">${superRebirthDropsHtml}</div>
            </div>
        `;
        $('packsContainer').innerHTML = html;
    }

    const cardElements = {};
    function generateCardLibrary() {
        PACKS.forEach(pack => {
            pack[2].forEach(drop => {
                let [rarityIdx, baseLevel, baseIncome, dropProb] = drop;
                SPECIALS.forEach((special, sIdx) => {
                    let id = `${pack[0]}_${rarityIdx}_${baseLevel}_${sIdx}`;
                    let actualIncome = baseIncome * special.mult;
                    let probNum = dropProb * special.prob / 100;
                    let displayName = `${special.name}${RARITY_DISPLAY[rarityIdx]}${baseLevel}级`;
                    
                    let div = document.createElement('div');
                    div.className = `card r-${RARITY_NAMES[rarityIdx]} s-${special.key}`;
                    div.id = `card_${id}`;
                    div.dataset.sortSingle = actualIncome;
                    div.dataset.sortTotal = 0;
                    div.innerHTML = `
                        <div class="card-top">${displayName}</div>
                        <div class="card-mid">${formatNum(actualIncome)}/s | ${getProbStr(probNum)}</div>
                        <div class="card-bot">
                            <div class="card-count" id="count_${id}">×0</div>
                            <div>
                                <div class="card-total" id="total_${id}">0/s</div>
                                <div class="card-percent" id="percent_${id}">0%</div>
                            </div>
                        </div>
                    `;
                    collectionEl.appendChild(div);
                    cardElements[id] = div;
                });
            });
        });
    }

    function updateUpgradeBtn() {
        $('upgradeBtn').textContent = `⬆ 升级多重 (Lv.${state.multiLvl} | ${formatNum(state.multiPrice)})`;
    }

    function getMaxSingleIncome() {
        let maxIncome = 1;
        for (let id in state.cards) {
            if (state.cards[id] > 0) {
                let parts = id.split('_');
                let pack = PACKS.find(p => p[0] == parts[0]);
                let drop = pack[2].find(d => d[0] == parts[1] && d[1] == parts[2]);
                let income = drop[2] * SPECIALS[parts[3]].mult;
                if (income > maxIncome) maxIncome = income;
            }
        }
        return maxIncome;
    }

    function pullRebirthCard() {
        if (state.rebirthCoins < 10) return false;
        state.rebirthCoins -= 10;
        let rand = Math.random() * 100, acc = 0, chosen = REBIRTH_DROPS[0];
        for (let drop of REBIRTH_DROPS) { acc += drop.prob; if (rand <= acc) { chosen = drop; break; } }
        let type = chosen.name;
        state.rebirthCards[type] = (state.rebirthCards[type] || 0) + 1;
        return true;
    }

    function pullSuperRebirthCard() {
        if (state.rebirthCoins < 100000) return false;
        state.rebirthCoins -= 100000;
        let rand = Math.random() * 100, acc = 0, chosen = SUPER_REBIRTH_DROPS[0];
        for (let drop of SUPER_REBIRTH_DROPS) { acc += drop.prob; if (rand <= acc) { chosen = drop; break; } }
        let type = chosen.name;
        state.rebirthCards[type] = (state.rebirthCards[type] || 0) + 1;
        return true;
    }

    function bulkPullRebirthCards() {
        let superCount = Math.floor(state.rebirthCoins / 100000);
        let remainingCoins = state.rebirthCoins % 100000;
        let normalCount = Math.floor(remainingCoins / 10);
        remainingCoins = remainingCoins % 10;

        if (superCount === 0 && normalCount === 0) return;
        state.rebirthCoins = remainingCoins;
        
        let newCards = {};
        if (superCount > 0) {
            if (superCount > 100000) {
                SUPER_REBIRTH_DROPS.forEach(drop => {
                    let expected = superCount * (drop.prob / 100);
                    let variance = expected * 0.05;
                    let amount = Math.round(expected + (Math.random() * 2 - 1) * variance);
                    if (amount > 0) newCards[drop.name] = (newCards[drop.name] || 0) + amount;
                });
            } else {
                for (let i = 0; i < superCount; i++) {
                    let rand = Math.random() * 100, acc = 0, chosen = SUPER_REBIRTH_DROPS[0];
                    for (let drop of SUPER_REBIRTH_DROPS) { acc += drop.prob; if (rand <= acc) { chosen = drop; break; } }
                    newCards[chosen.name] = (newCards[chosen.name] || 0) + 1;
                }
            }
        }

        if (normalCount > 0) {
            if (normalCount > 100000) {
                REBIRTH_DROPS.forEach(drop => {
                    let expected = normalCount * (drop.prob / 100);
                    let variance = expected * 0.05;
                    let amount = Math.round(expected + (Math.random() * 2 - 1) * variance);
                    if (amount > 0) newCards[drop.name] = (newCards[drop.name] || 0) + amount;
                });
            } else {
                for (let i = 0; i < normalCount; i++) {
                    let rand = Math.random() * 100, acc = 0, chosen = REBIRTH_DROPS[0];
                    for (let drop of REBIRTH_DROPS) { acc += drop.prob; if (rand <= acc) { chosen = drop; break; } }
                    newCards[chosen.name] = (newCards[chosen.name] || 0) + 1;
                }
            }
        }
        
        let pulledTypes = new Set();
        for (let type in newCards) {
            state.rebirthCards[type] = (state.rebirthCards[type] || 0) + newCards[type];
            let key = 'rebirth_' + type.replace('+', 'p');
            if (!cardElements[key]) createRebirthCardDOM(type);
            pulledTypes.add(key);
        }
        
        pulledTypes.forEach(key => updateCardUI(key, true));
        calcIncome();
        sortCards();
        updateRebirthUI();
    }

    function createRebirthCardDOM(type) {
        let safeType = type.replace('+', 'p');
        let key = 'rebirth_' + safeType;
        let div = document.createElement('div');
        div.className = `card reborn rb-${safeType}`;
        div.id = `card_${key}`;
        div.dataset.sortSingle = 0;
        div.dataset.sortTotal = 0;
        div.dataset.isRebirth = 'true';
        div.innerHTML = `
            <div class="card-top">${type}级重生卡</div>
            <div class="card-mid" id="mid_${key}">实时收益</div>
            <div class="card-bot">
                <div class="card-count" id="count_${key}">×0</div>
                <div>
                    <div class="card-total" id="total_${key}">0/s</div>
                    <div class="card-percent" id="percent_${key}">0%</div>
                </div>
            </div>
        `;
        collectionEl.appendChild(div);
        cardElements[key] = div;
    }

    function updateCardUI(id, isRebirth=false) {
        let count = 0;
        let el = cardElements[id];
        if (!el) return;

        if (isRebirth) {
            let type = id.replace('rebirth_', '').replace('p', '+');
            count = state.rebirthCards[type] || 0;
        } else {
            count = state.cards[id] || 0;
        }
        
        if (count > 0) {
            el.classList.add('owned');
            $(`count_${id}`).textContent = `×${formatNum(count)}`;
            let totalIncome = 0;
            let maxIncome = getMaxSingleIncome();
            
            if (isRebirth) {
                let type = id.replace('rebirth_', '').replace('p', '+');
                let drop = findRebirthDrop(type);
                let income = maxIncome * drop.mult;
                totalIncome = income * count;
                $(`mid_${id}`).textContent = `${formatNum(income)}/s | 倍率 x${drop.mult}`;
                el.dataset.sortSingle = income;
            } else {
                let parts = id.split('_');
                let pack = PACKS.find(p => p[0] == parts[0]);
                let drop = pack[2].find(d => d[0] == parts[1] && d[1] == parts[2]);
                totalIncome = drop[2] * SPECIALS[parts[3]].mult * count;
            }
            $(`total_${id}`).textContent = `${formatNum(totalIncome)}/s`;
            el.dataset.sortTotal = totalIncome;
        } else {
            el.classList.remove('owned');
        }
    }

    function calcIncome() {
        let baseTotal = 0;
        let cardCount = 0;
        for (let id in state.cards) {
            if (state.cards[id] > 0) {
                cardCount += state.cards[id];
                let parts = id.split('_');
                let pack = PACKS.find(p => p[0] == parts[0]);
                let drop = pack[2].find(d => d[0] == parts[1] && d[1] == parts[2]);
                baseTotal += drop[2] * SPECIALS[parts[3]].mult * state.cards[id];
            }
        }
        
        let maxIncome = getMaxSingleIncome();
        for (let type in state.rebirthCards) {
            if (state.rebirthCards[type] > 0) {
                cardCount += state.rebirthCards[type];
                let drop = findRebirthDrop(type);
                let income = maxIncome * drop.mult;
                baseTotal += income * state.rebirthCards[type];
            }
        }
        
        state.baseIncome = baseTotal;
        state.income = baseTotal * (1 + state.rebirthCount);
        
        $('baseIncome').textContent = formatNum(state.baseIncome);
        $('income').textContent = formatNum(state.income);
        $('mult').textContent = (1 + state.rebirthCount);
        $('totalCards').textContent = formatNum(cardCount);

        document.querySelectorAll('.card.owned').forEach(el => {
            let id = el.id.replace('card_', '');
            let totalIncome = 0;
            let maxInc = getMaxSingleIncome();

            if (el.dataset.isRebirth) {
                let type = id.replace('rebirth_', '').replace('p', '+');
                let drop = findRebirthDrop(type);
                let income = maxInc * drop.mult;
                totalIncome = income * state.rebirthCards[type];
                $(`mid_${id}`).textContent = `${formatNum(income)}/s | 倍率 x${drop.mult}`;
                el.dataset.sortSingle = income;
            } else {
                let parts = id.split('_');
                let pack = PACKS.find(p => p[0] == parts[0]);
                let drop = pack[2].find(d => d[0] == parts[1] && d[1] == parts[2]);
                totalIncome = drop[2] * SPECIALS[parts[3]].mult * state.cards[id];
            }
            
            el.dataset.sortTotal = totalIncome;
            $(`total_${id}`).textContent = `${formatNum(totalIncome)}/s`;
            
            let percent = state.baseIncome > 0 ? (totalIncome / state.baseIncome * 100) : 0;
            $(`percent_${id}`).textContent = percent.toFixed(2) + '%';
        });
    }

    function getHighestPack() {
        for (let i = PACKS.length - 1; i >= 0; i--) {
            if (state.coins >= getPackPrice(PACKS[i]) * getPullAmount()) return PACKS[i];
        }
        for (let i = PACKS.length - 1; i >= 0; i--) {
            if (state.coins >= getPackPrice(PACKS[i])) return PACKS[i];
        }
        return PACKS[0];
    }

    function pullCard() {
        let pack = getHighestPack();
        let cost = getPackPrice(pack), amount = getPullAmount(), totalCost = cost * amount;
        if (state.coins < totalCost) {
            amount = Math.floor(state.coins / cost);
            if (amount === 0) return false;
            totalCost = cost * amount;
        }
        state.coins -= totalCost;

        let drops = getCurrentDrops(pack);
        let pulledCards = new Set();
        for (let i = 0; i < amount; i++) {
            let rand = Math.random() * 100, acc = 0, chosenDrop = null;
            for (let drop of drops) { acc += drop[3]; if (rand <= acc) { chosenDrop = drop; break; } }
            let sRand = Math.random() * 100, sAcc = 0, chosenSpecial = 0;
            for (let j = 0; j < SPECIALS.length; j++) { sAcc += SPECIALS[j].prob; if (sRand <= sAcc) { chosenSpecial = j; break; } }
            let id = `${pack[0]}_${chosenDrop[0]}_${chosenDrop[1]}_${chosenSpecial}`;
            state.cards[id] = (state.cards[id] || 0) + 1;
            pulledCards.add(id);
        }
        
        pulledCards.forEach(id => updateCardUI(id));
        calcIncome();
        sortCards();
        return true;
    }

    function doRebirth() {
        if (state.rebirthCount >= getRebirthCap()) return false;
        let price = 100000 * (1 + state.rebirthCount);
        if (state.coins >= price) {
            state.coins -= price;
            state.rebirthCount++;
            state.rebirthCoins += 10;
            calcIncome();
            updateRebirthUI();
            checkAutoRebirthUnlock();
            return true;
        }
        return false;
    }

    function doRebirthBreakthrough() {
        if (state.rebirthBreakthrough >= REBIRTH_BREAKTHROUGH_CAP) return false;
        let cost = getBreakthroughCost();
        if (state.coins >= cost) {
            state.coins -= cost;
            state.rebirthBreakthrough++;
            state.rebirthCount = 0;
            state.rebirthCoins = 0;
            state.rebirthCards = {};

            for (let key in cardElements) {
                if (cardElements[key].dataset.isRebirth) {
                    cardElements[key].remove();
                    delete cardElements[key];
                }
            }

            calcIncome();
            updateRebirthUI();
            checkAutoRebirthUnlock();
            updateBreakthroughUI();
            sortCards();
            return true;
        }
        return false;
    }

    function bulkRebirth() {
        let c = state.rebirthCount;
        let C = state.coins;
        if (c >= getRebirthCap()) return;
        let maxN = getRebirthCap() - c;
        
        let nextPrice = 100000 * (c + 1);
        if (C < nextPrice) return;

        let K = C / 50000;
        let b = 2 * c + 1;
        let N = Math.floor((-b + Math.sqrt(b * b + 4 * K)) / 2);

        if (N > maxN) N = maxN;

        if (N > 0) {
            let totalCost = 50000 * (N * N + N * b);
            state.coins -= totalCost;
            state.rebirthCount += N;
            state.rebirthCoins += 10 * N;
            
            calcIncome();
            updateRebirthUI();
            checkAutoRebirthUnlock();
            sortCards();
        }
    }

    function updateRebirthUI() {
        $('rebirthCount').textContent = `${formatNum(state.rebirthCount)} / ${formatNum(getRebirthCap())}`;
        $('rebirthCoins').textContent = formatNum(state.rebirthCoins);
        let price = 100000 * (1 + state.rebirthCount);
        if (state.rebirthCount >= getRebirthCap()) {
            $('rebirthBtn').textContent = `🔄 重生 (已达上限)`;
            $('rebirthBtn').disabled = true;
            $('bulkRebirthBtn').disabled = true;
        } else {
            $('rebirthBtn').textContent = `🔄 重生 (${formatNum(price)})`;
            $('rebirthBtn').disabled = false;
            $('bulkRebirthBtn').disabled = false;
        }
    }

    function updateBreakthroughUI() {
        $('breakthroughCount').textContent = `${state.rebirthBreakthrough} / ${REBIRTH_BREAKTHROUGH_CAP}`;
        let btn = $('breakthroughBtn');
        if (state.rebirthBreakthrough >= REBIRTH_BREAKTHROUGH_CAP) {
            btn.textContent = `✨ 突破 (已满级)`;
            btn.disabled = true;
        } else {
            btn.textContent = `✨ 突破 (${formatNum(getBreakthroughCost())})`;
        }
    }

    function checkAutoRebirthUnlock() {
        let btn = $('autoBulkRebirthPullBtn');
        if (state.rebirthCount >= getRebirthCap()) {
            btn.disabled = false;
            if (!state.autoBulkRebirthPull) btn.textContent = '🌌 自动抽重生';
        } else {
            btn.disabled = true;
            btn.textContent = '🌌 自动抽重生 (锁定)';
        }
    }

    function sortCards() {
        const cards = Array.from(document.querySelectorAll('.card.owned'));
        cards.sort((a, b) => {
            let valA = state.sortMode === 'single' ? parseFloat(a.dataset.sortSingle) : parseFloat(a.dataset.sortTotal);
            let valB = state.sortMode === 'single' ? parseFloat(b.dataset.sortSingle) : parseFloat(b.dataset.sortTotal);
            return valB - valA;
        });
        cards.forEach((c, index) => {
            c.style.order = index;
        });
    }

    let isPulling = false;
    $('pullBtn').addEventListener('click', () => {
        if (state.autoPull || isPulling) return;
        isPulling = true; $('pullBtn').disabled = true;
        pullCard();
        setTimeout(() => { isPulling = false; if (!state.autoPull) $('pullBtn').disabled = false; }, 200);
    });

    $('upgradeBtn').addEventListener('click', () => {
        if (state.coins >= state.multiPrice) {
            state.coins -= state.multiPrice;
            state.multiLvl++; state.multiPrice *= 2;
            updateUpgradeBtn();
        }
    });

    let autoPullInterval = null;
    $('autoBtn').addEventListener('click', () => {
        state.autoPull = !state.autoPull;
        $('autoBtn').classList.toggle('active', state.autoPull);
        $('autoBtn').textContent = state.autoPull ? '🤖 关闭自动' : '🤖 自动抽卡';
        $('pullBtn').disabled = state.autoPull;
        if (state.autoPull) autoPullInterval = setInterval(pullCard, 200);
        else clearInterval(autoPullInterval);
    });

    $('superModeBtn').addEventListener('click', () => {
        state.superMode = !state.superMode;
        $('superModeBtn').classList.toggle('active', state.superMode);
        $('superModeBtn').textContent = state.superMode ? '⚡ 超级卡包 (开启)' : '⚡ 超级卡包 (关闭)';
        renderPacks();
    });

    $('rebirthPullBtn').addEventListener('click', () => {
        if (pullRebirthCard()) {
            let type = Object.keys(state.rebirthCards).pop();
            let key = 'rebirth_' + type.replace('+', 'p');
            updateCardUI(key, true);
            calcIncome();
            sortCards();
            updateRebirthUI();
        }
    });

    $('superRebirthPullBtn').addEventListener('click', () => {
        if (pullSuperRebirthCard()) {
            let type = Object.keys(state.rebirthCards).pop();
            let key = 'rebirth_' + type.replace('+', 'p');
            if (!cardElements[key]) createRebirthCardDOM(type);
            updateCardUI(key, true);
            calcIncome();
            sortCards();
            updateRebirthUI();
        }
    });

    $('bulkRebirthPullBtn').addEventListener('click', bulkPullRebirthCards);

    let autoBulkRebirthPullInterval = null;
    $('autoBulkRebirthPullBtn').addEventListener('click', () => {
        state.autoBulkRebirthPull = !state.autoBulkRebirthPull;
        $('autoBulkRebirthPullBtn').classList.toggle('active', state.autoBulkRebirthPull);
        $('autoBulkRebirthPullBtn').textContent = state.autoBulkRebirthPull ? '🌌 关闭自动抽重生' : '🌌 自动抽重生';
        if (state.autoBulkRebirthPull) autoBulkRebirthPullInterval = setInterval(bulkPullRebirthCards, 500);
        else clearInterval(autoBulkRebirthPullInterval);
    });

    $('rebirthBtn').addEventListener('click', () => { if (doRebirth()) sortCards(); });
    $('bulkRebirthBtn').addEventListener('click', bulkRebirth);
    $('breakthroughBtn').addEventListener('click', () => { if(doRebirthBreakthrough()) sortCards(); });

    let autoRebirthInterval = null;
    $('autoRebirthBtn').addEventListener('click', () => {
        state.autoRebirth = !state.autoRebirth;
        $('autoRebirthBtn').classList.toggle('active', state.autoRebirth);
        $('autoRebirthBtn').textContent = state.autoRebirth ? '⏱ 关闭自动重生' : '⏱ 自动重生';
        if (state.autoRebirth) autoRebirthInterval = setInterval(() => { if(doRebirth()) sortCards(); }, 1000);
        else clearInterval(autoRebirthInterval);
    });

    $('sortBtn').addEventListener('click', () => {
        if (state.sortMode === 'single') {
            state.sortMode = 'total';
            $('sortBtn').textContent = '📊 按总收益排序';
        } else {
            state.sortMode = 'single';
            $('sortBtn').textContent = '📊 按单张收益排序';
        }
        sortCards();
    });

    function resetGame() {
        if (autoPullInterval) { clearInterval(autoPullInterval); autoPullInterval = null; }
        if (autoRebirthInterval) { clearInterval(autoRebirthInterval); autoRebirthInterval = null; }
        if (autoBulkRebirthPullInterval) { clearInterval(autoBulkRebirthPullInterval); autoBulkRebirthPullInterval = null; }

        localStorage.removeItem(SAVE_KEY);

        for (let key in cardElements) {
            if (cardElements[key].dataset.isRebirth) {
                cardElements[key].remove();
                delete cardElements[key];
            } else {
                cardElements[key].classList.remove('owned');
                cardElements[key].style.order = 9999;
            }
        }

        state = getInitialState();

        $('autoBtn').classList.remove('active');
        $('autoBtn').textContent = '🤖 自动抽卡';
        $('pullBtn').disabled = false;
        $('autoRebirthBtn').classList.remove('active');
        $('autoRebirthBtn').textContent = '⏱ 自动重生';
        $('autoBulkRebirthPullBtn').classList.remove('active');
        $('superModeBtn').classList.remove('active');
        $('superModeBtn').textContent = '⚡ 超级卡包 (关闭)';
        $('sortBtn').textContent = '📊 按单张收益排序';

        updateCardUI("1_0_1_0");
        updateUpgradeBtn();
        updateRebirthUI();
        updateBreakthroughUI();
        checkAutoRebirthUnlock();
        calcIncome();
        sortCards();
        renderPacks();
    }

    $('resetBtn').addEventListener('click', () => $('resetModal').classList.add('show'));
    $('cancelResetBtn').addEventListener('click', () => $('resetModal').classList.remove('show'));
    $('confirmResetBtn').addEventListener('click', () => {
        $('resetModal').classList.remove('show');
        resetGame();
    });
    $('resetModal').addEventListener('click', (e) => {
        if (e.target === $('resetModal')) $('resetModal').classList.remove('show');
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') $('resetModal').classList.remove('show');
    });

    function formatNum(num) {
        if (!isFinite(num)) return "无限";
        if (num < 10000) return num.toFixed(2);
        const units = [
            { val: 1e88, name: "超限数" }, 
            { val: 1e84, name: "不可数不可数转" }, 
            { val: 1e80, name: "矜羯罗" }, 
            { val: 1e76, name: "频波罗" }, 
            { val: 1e72, name: "常仕佯" }, 
            { val: 1e68, name: "大数" }, 
            { val: 1e64, name: "无量" }, 
            { val: 1e60, name: "那由他" }, 
            { val: 1e56, name: "阿曾祇" }, 
            { val: 1e52, name: "恒河沙" }, 
            { val: 1e48, name: "极" }, 
            { val: 1e44, name: "载" }, 
            { val: 1e40, name: "正" }, 
            { val: 1e36, name: "涧" }, 
            { val: 1e32, name: "沟" }, 
            { val: 1e28, name: "穰" },
            { val: 1e24, name: "杼" }, 
            { val: 1e20, name: "垓" },
            { val: 1e16, name: "京" }, 
            { val: 1e12, name: "兆" },
            { val: 1e8, name: "亿" }, 
            { val: 1e4, name: "万" }
        ];
        for (let i = 0; i < units.length; i++) {
            if (num >= units[i].val) return (num / units[i].val).toFixed(2) + units[i].name;
        }
        return num.toFixed(2);
    }

    function formatTime(seconds) {
        let h = Math.floor(seconds / 3600);
        let m = Math.floor((seconds % 3600) / 60);
        let s = Math.floor(seconds % 60);
        return `${h}时${m}分${s}秒`;
    }

    function gameTick() {
        let now = Date.now(), delta = (now - state.lastTime) / 1000;
        state.lastTime = now;
        state.onlineSeconds += delta;
        
        state.coins += state.income * delta;
        
        if (state.rebirthCount >= getRebirthCap()) {
            state.rebirthCoins += getAutoRebirthCoinRate() * delta;
        }
        
        $('coins').textContent = formatNum(state.coins);
        $('onlineTime').textContent = formatTime(state.onlineSeconds);
        $('rebirthCoins').textContent = formatNum(state.rebirthCoins);

        let pack = getHighestPack();
        let packName = `${pack[0]}级${state.superMode ? '超级' : ''}`;
        $('pullBtn').textContent = `🎴 抽卡 (${packName} x${getPullAmount()})`;
        
        document.querySelectorAll('.pack-card:not(.reborn-pack):not(.super-reborn-pack)').forEach(el => el.classList.remove('active'));
        document.getElementById(`pack_${pack[0]}`).classList.add('active');

        $('upgradeBtn').disabled = state.coins < state.multiPrice;
        $('breakthroughBtn').disabled = state.coins < getBreakthroughCost() || state.rebirthBreakthrough >= REBIRTH_BREAKTHROUGH_CAP;
    }

    function save() { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }
    function load() {
        let saved = localStorage.getItem(SAVE_KEY);
        if (saved) {
            Object.assign(state, JSON.parse(saved));
            state.lastTime = Date.now();
            updateUpgradeBtn();
            if (state.autoPull) { state.autoPull = false; $('autoBtn').click(); }
            if (state.autoRebirth) { state.autoRebirth = false; $('autoRebirthBtn').click(); }
            if (state.sortMode === 'total') $('sortBtn').textContent = '📊 按总收益排序';
            
            if (state.superMode) {
                $('superModeBtn').classList.add('active');
                $('superModeBtn').textContent = '⚡ 超级卡包 (开启)';
            }
            
            let newRebirthCards = {};
            for (let key in state.rebirthCards) {
                let type = key.split('_')[0];
                if (findRebirthDrop(type)) {
                    newRebirthCards[type] = (newRebirthCards[type] || 0) + state.rebirthCards[key];
                } else if (findRebirthDrop(key)) {
                    newRebirthCards[key] = (newRebirthCards[key] || 0) + state.rebirthCards[key];
                }
            }
            state.rebirthCards = newRebirthCards;

            for (let id in state.cards) updateCardUI(id);
            for (let type in state.rebirthCards) {
                let key = 'rebirth_' + type.replace('+', 'p');
                if (!cardElements[key]) createRebirthCardDOM(type);
                updateCardUI(key, true);
            }
            updateRebirthUI();
            updateBreakthroughUI();
            checkAutoRebirthUnlock();
            if (state.autoBulkRebirthPull) { 
                state.autoBulkRebirthPull = false; 
                $('autoBulkRebirthPullBtn').click(); 
            }
            calcIncome();
        }
    }

    // ================= 开发者控制台逻辑 =================
    let secretCode = '';
    const targetCode = 'dfsoft123';
    document.addEventListener('keydown', (e) => {
        if (e.key.length === 1) {
            secretCode += e.key.toLowerCase();
            if (secretCode.length > targetCode.length) {
                secretCode = secretCode.slice(-targetCode.length);
            }
            if (secretCode === targetCode) {
                toggleDevConsole();
                secretCode = '';
            }
        }
    });

    function toggleDevConsole() {
        const el = $('dfConsole');
        if (el.classList.contains('show')) {
            el.classList.remove('show');
        } else {
            buildConsoleUI();
            el.classList.add('show');
        }
    }

    function buildConsoleUI() {
        let html = '';
        PACKS.forEach(pack => {
            html += `<h3>${pack[0]}级卡包</h3>`;
            pack[2].forEach(drop => {
                SPECIALS.forEach((sp, idx) => {
                    let id = `${pack[0]}_${drop[0]}_${drop[1]}_${idx}`;
                    let count = state.cards[id] || 0;
                    html += `<div class="df-console-row">
                        <span>${sp.name}${RARITY_DISPLAY[drop[0]]}${drop[1]}级</span>
                        <input type="number" data-id="${id}" value="${count}" min="0">
                    </div>`;
                });
            });
        });
        
        html += `<h3>普通重生卡</h3>`;
        REBIRTH_DROPS.forEach(d => {
            let count = state.rebirthCards[d.name] || 0;
            html += `<div class="df-console-row">
                <span>${d.name}级重生卡</span>
                <input type="number" data-type="${d.name}" value="${count}" min="0">
            </div>`;
        });
        
        html += `<h3>超级重生卡</h3>`;
        SUPER_REBIRTH_DROPS.forEach(d => {
            let count = state.rebirthCards[d.name] || 0;
            html += `<div class="df-console-row">
                <span>${d.name}级超级重生卡</span>
                <input type="number" data-type="${d.name}" value="${count}" min="0">
            </div>`;
        });
        
        $('dfConsoleBody').innerHTML = html;
    }

    $('dfConsoleBody').addEventListener('change', (e) => {
        if (e.target.tagName === 'INPUT') {
            let val = parseInt(e.target.value) || 0;
            if (val < 0) val = 0;
            
            if (e.target.dataset.id) {
                let id = e.target.dataset.id;
                if (val > 0) {
                    state.cards[id] = val;
                } else {
                    delete state.cards[id];
                }
                updateCardUI(id);
            } else if (e.target.dataset.type) {
                let type = e.target.dataset.type;
                if (val > 0) {
                    state.rebirthCards[type] = val;
                    let key = 'rebirth_' + type.replace('+', 'p');
                    if (!cardElements[key]) createRebirthCardDOM(type);
                    updateCardUI(key, true);
                } else {
                    delete state.rebirthCards[type];
                    let key = 'rebirth_' + type.replace('+', 'p');
                    updateCardUI(key, true);
                }
            }
            calcIncome();
            sortCards();
        }
    });

    renderPacks();
    generateCardLibrary();
    load();
    if (!state.cards["1_0_1_0"]) { state.cards["1_0_1_0"] = 1; } 
    updateCardUI("1_0_1_0");
    updateUpgradeBtn();
    updateRebirthUI();
    updateBreakthroughUI();
    checkAutoRebirthUnlock();
    sortCards();
    
    setInterval(gameTick, 100);
    setInterval(save, 1000);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) state.lastTime = Date.now(); });
</script>
</body>
</html>
